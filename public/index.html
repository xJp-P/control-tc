    const mb = cuotaNum != null ? (compra._bolsilloCuota || 0) : (compra.monto_bolsillo || 0);
    const isPartial = mb > 0 && mb < target;
    const compraConCuota = cuotaNum != null ? Object.assign({}, compra, { monto_bolsillo: mb, _cuota_num: cuotaNum }) : compra;
    setBolsilloModal({ compra: compraConCuota, target, monto: isPartial ? '' : String(mb || '') });
  }
  async function saveBolsilloTercero() {
    if (!bolsilloModal) return;
    const { compra, target } = bolsilloModal;
    const _mb = compra.monto_bolsillo || 0;
    const _isAgregar = _mb > 0 && _mb < target;
    let monto;
    if (_isAgregar) {
      const adicional = parseFloat(bolsilloModal.monto) || 0;
      monto = Math.min(_mb + adicional, target);
    } else {
      monto = parseFloat(bolsilloModal.monto) || 0;
    }
    if (monto < 0) return;
    const bodyT = { monto_bolsillo: monto, desde_terceros: true };
    if (compra._cuota_num != null) bodyT.cuota_num = compra._cuota_num;
    const resp = await api('/compras/' + compra.id + '/bolsillo', { method: 'PUT', body: bodyT });
    setBolsilloModal(null);
    loadData();
    if (resp && resp.capped) toast('Se apartó el máximo de la compra: ' + fmtCOP(resp.tope));
    else toast(monto > 0 ? 'Bolsillo actualizado' : 'Bolsillo quitado');
  }

  // ── Saldo a favor: cruce de cuentas (aplicar a una deuda del mismo tercero) y liquidación (cashout) ──
  async function aplicarSaldo() {
    if (!aplicarSel || !aplicarSel.compra_destino_id) { toastErr('Elige una deuda destino.'); return; }
    const monto = parseFloat(aplicarSel.monto) || 0;
    if (monto <= 0) { toastErr('Ingresa un monto válido.'); return; }
    const resp = await api('/saldos-favor/' + aplicarSel.creditoId + '/aplicar', { method: 'POST', body: { compra_destino_id: Number(aplicarSel.compra_destino_id), monto } });
    if (resp && resp.error) { toastErr(resp.error); return; }
    setAplicarSel(null);
    toast('Saldo a favor aplicado a la deuda.');
    loadData();
  }
  async function liquidarSaldo(creditoId) {
    const resp = await api('/saldos-favor/' + creditoId + '/liquidar', { method: 'POST', body: { notas: 'Devolución en efectivo/transferencia' } });
    if (resp && resp.error) { toastErr(resp.error); return; }
    toast('Saldo a favor liquidado (devuelto en efectivo).');
    loadData();
  }
  // Deshace un movimiento (cruce o liquidación): restaura la compra destino y devuelve el disponible al crédito.
  async function deshacerAplicacion(aplId) {
    const resp = await api('/saldos-favor/aplicaciones/' + aplId, { method: 'DELETE' });
    if (resp && resp.error) { toastErr(resp.error); return; }
    toast('Movimiento deshecho; el saldo a favor se restauró.');
    loadData();
  }

  // Solo Bancolombia Visa cobra intereses sobre compras intl en COP (validado con extracto real).
  const _frT = tarjeta.franquicia ? tarjeta.franquicia.toLowerCase() : '';
  const _dualT = _frT.includes('mastercard') || _frT.includes('amex') || _frT.includes('american express');
  const aplicaIntl = !!(tarjeta.banco && tarjeta.banco.toLowerCase().includes('bancolombia') && !_dualT);

  // Interés intl para compras de terceros (misma fórmula que backend)
  const calcInteresIntlTercero = (compra) => {
    if (!aplicaIntl) return 0;
    if (compra.es_diferida) return 0;
    if (!compra.es_internacional) return 0;
    const saldo = compra.valor_cop;
    if (saldo <= 0) return 0;
    // Snapshot histórico: tasa congelada de la compra si existe; si no, la global actual de la tarjeta.
    const tasaIntl = (compra.tasa_intl != null ? compra.tasa_intl : tarjeta.tasa_mv_avances);
    if (!tasaIntl || !compra.ciclo) return 0;
    const [yr, mo] = compra.ciclo.split('-').map(Number);
    const lastDay = new Date(yr, mo, 0).getDate();
    const fechaCorteIntl = new Date(yr, mo - 1, Math.min(tarjeta.dia_corte, lastDay)).toISOString().slice(0, 10);
    const dias = Math.round((new Date(fechaCorteIntl + 'T12:00:00') - new Date(compra.fecha + 'T12:00:00')) / 86400000);
    if (dias <= 0) return 0;
    return Math.round(saldo * tasaIntl * (dias / 30));
  };

  // Columna DINERO unificada (compras 1-cuota y cuotas de diferida): "Pagado" (verde) si el tercero
  // saldó — sea por el toggle "Recibido" o porque el bolsillo/reembolso cubre el total —; "Pendiente"
  // (rojo) si aún debe. En parcial conserva el detalle "$apartado / $total · Falta" (sigue pendiente).
  const dineroCell = (settled, bol, total) => {
    if (settled) return e('span', { className: 'badge badge-pagado' }, 'Pagado');
    if (bol > 0 && total > 0 && bol < total) {
      const falta = Math.max(0, total - bol);
      const pct = Math.min(100, Math.round(bol / total * 100));
      return e('div', null,
        e('span', { className: 'badge badge-vencido' }, 'Pendiente'),
        e('div', { style: { fontSize: 11, color: 'var(--purple)', fontWeight: 600, marginTop: 3 } }, fmtCOP(bol) + ' / ' + fmtCOP(total)),
        e('div', { style: { background: 'var(--bg-tertiary)', borderRadius: 4, height: 4, marginTop: 3, width: 80 } },
          e('div', { style: { background: 'var(--purple)', borderRadius: 4, height: 4, width: pct + '%' } })),
        e('div', { style: { fontSize: 10, color: 'var(--text-muted)', marginTop: 2 } }, 'Falta: ' + fmtCOP(falta))
      );
    }
    return e('span', { className: 'badge badge-vencido' }, 'Pendiente');
  };

  // Group by persona
  const grouped = {};
  compras.forEach(c => {
    const key = c.persona_id;
    if (!grouped[key]) grouped[key] = { persona_id: c.persona_id, nombre: c.persona_nombre, color: c.persona_color, compras: [], totalPendiente: 0, totalPendienteUsd: 0, totalRecibido: 0, totalRecibidoUsd: 0 };
    grouped[key].compras.push(c);
    if (c.tercero_pagado) {
      grouped[key].totalRecibido += c.valor_cop;
      if (c.valor_usd && c.valor_usd > 0) grouped[key].totalRecibidoUsd += c.valor_usd;
    } else if (c.es_diferida) {
      const cubiertas = (c.cuotas || []).filter(q => q.cubierta_bolsillo).reduce((s, q) => s + q.total, 0);
      grouped[key].totalPendiente += c.valor_pendiente || 0;
      grouped[key].totalPendienteUsd += c.valor_usd_pendiente || 0;
      grouped[key].totalRecibido += cubiertas;
    } else {
      const bol = c.monto_bolsillo || 0;
      const intl = calcInteresIntlTercero(c);
      grouped[key].totalPendiente += c.valor_cop - bol + intl;
      grouped[key].totalRecibido += bol;
      if (c.valor_usd && c.valor_usd > 0) grouped[key].totalPendienteUsd += c.valor_usd;
    }
  });
  const personas = Object.values(grouped);
  const totalPendiente = compras.filter(c => !c.tercero_pagado).reduce((s, c) => s + (c.es_diferida ? (c.valor_pendiente || 0) : c.valor_cop - (c.monto_bolsillo || 0) + calcInteresIntlTercero(c)), 0);
  const totalPendienteUsd = compras.filter(c => !c.tercero_pagado).reduce((s, c) => s + (c.es_diferida ? (c.valor_usd_pendiente || 0) : (c.valor_usd || 0)), 0);
  const totalRecibido = compras.reduce((s, c) => {
    if (c.tercero_pagado) return s + c.valor_cop;
    if (c.es_diferida) return s + (c.cuotas || []).filter(q => q.cubierta_bolsillo).reduce((a, q) => a + q.total, 0);
    return s + (c.monto_bolsillo || 0);
  }, 0);
  const fmtUsd = (n) => 'USD $' + new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n || 0);

  // Compras que recibieron un cruce de saldo a favor: su estado/bolsillo NO se tocan por la vía directa
  // (Desmarcar / quitar bolsillo) porque descuadraría el crédito. Se gestionan con "Deshacer" en el
  // modal de Dinero a favor. Se derivan de las aplicaciones que ya trae saldosFavor.creditos.
  const compraIdsConCruce = new Set();
  (saldosFavor.creditos || []).forEach(cr => (cr.aplicaciones || []).forEach(ap => {
    if (ap.tipo === 'cruce' && ap.compra_destino_id != null) compraIdsConCruce.add(String(ap.compra_destino_id));
  }));

  return e('div', null,
    // Summary cards
    e('div', { className: 'cards-row' },
      bimonCard({
        variant: 'warning',
        title: 'Me Deben',
        copValue: fmtCOP(totalPendiente),
        usdValue: fmtUsd(totalPendienteUsd),
        hasUsd: totalPendienteUsd > 0,
        footerSub: compras.filter(c => !c.tercero_pagado).length + ' compras pendientes'
      })
    ),

    personas.length === 0
      ? e('div', { className: 'empty-state' }, e('div', { className: 'icon' }, e(Ico, { name: 'users', size: 48, color: 'var(--text-muted)' })), e('div', null, 'No hay compras asignadas a terceros'))
      : personas.map(p => {
          // Agrupar compras por ciclo (más reciente primero)

          p.compras.forEach(c => {

            } else {

              if (!ciclosMap[cic]) ciclosMap[cic] = [];
              ciclosMap[cic].push({ _compra: c, _cuota: null });
            }
          });
          const ciclos = Object.keys(ciclosMap).sort((a, b) => b.localeCompare(a));
          const fmtCicloLabel = cic => {
            if (cic === 'Sin ciclo') return cic;
            const [y, m] = cic.split('-');
            return new Date(y, m - 1).toLocaleDateString('es-CO', { month: 'long', year: 'numeric' });
          };

          return e('div', { key: p.nombre, className: 'persona-card', style: { marginBottom: 20 } },
            e('div', { className: 'persona-card-header' },
              e('div', { className: 'persona-name' }, e('span', { className: 'persona-dot', style: { background: p.color } }), p.nombre),
              e('div', { style: { display: 'flex', gap: 8, alignItems: 'center' } },
                e('span', { style: { fontSize: 11, fontWeight: 700, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1, marginRight: 4 } }, 'Total deudor'),
                (p.totalPendiente > 0 || (p.totalPendienteUsd || 0) > 0) && e('div', { style: {
                  background: 'rgba(251,191,36,0.10)', border: '1px solid rgba(251,191,36,0.25)',
                  borderRadius: 8, padding: '4px 12px', display: 'flex', flexDirection: 'column', alignItems: 'flex-end'
                } },
                  e('span', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1 } }, 'Pendiente'),
                  e('span', { style: { fontSize: 14, fontWeight: 700, color: 'var(--warning)', fontFamily: 'monospace' } }, fmtCOP(p.totalPendiente)),
                  (p.totalPendienteUsd || 0) > 0 && e('span', { style: { fontSize: 12, fontWeight: 700, color: '#4FC3F7', fontFamily: 'monospace' } }, fmtUsd(p.totalPendienteUsd))
                ),
                (p.totalRecibido > 0 || (p.totalRecibidoUsd || 0) > 0) && e('div', { style: {
                  background: 'rgba(52,211,153,0.10)', border: '1px solid rgba(52,211,153,0.25)',
                  borderRadius: 8, padding: '4px 12px', display: 'flex', flexDirection: 'column', alignItems: 'flex-end'
                } },
                  e('span', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1 } }, 'Recibido'),
                  e('span', { style: { fontSize: 14, fontWeight: 700, color: 'var(--success)', fontFamily: 'monospace' } }, fmtCOP(p.totalRecibido)),
                  (p.totalRecibidoUsd || 0) > 0 && e('span', { style: { fontSize: 12, fontWeight: 700, color: '#4FC3F7', fontFamily: 'monospace' } }, fmtUsd(p.totalRecibidoUsd))
                ),
                // Saldo a favor del tercero (reversos): chip clickable → abre el modal de gestión.
                // Se muestra con disponible activo (verde) O si tiene créditos ya consumidos/liquidados
                // (gris, "ver") para poder deshacer sus movimientos.
                ((saldosFavor.porPersona[p.persona_id] || 0) > 0 || (saldosFavor.creditos || []).some(cr => String(cr.persona_id) === String(p.persona_id))) && (() => {
                  const disp = saldosFavor.porPersona[p.persona_id] || 0;
                  const activo = disp > 0;
                  return e('div', {
                    className: 'badge-clickable',
                    style: { display: 'inline-flex', alignItems: 'center', gap: 8, background: activo ? 'rgba(52,211,153,0.16)' : 'var(--bg-input)', border: '1px solid ' + (activo ? 'rgba(52,211,153,0.55)' : 'var(--border)'), borderRadius: 8, padding: '6px 10px', cursor: 'pointer' },
                    onClick: () => { setAplicarSel(null); setFavorModal({ persona_id: p.persona_id, nombre: p.nombre, color: p.color }); },
                    title: 'Gestionar saldo a favor de ' + p.nombre
                  },
                    e(Ico, { name: 'dollar', size: 15, color: activo ? 'var(--success)' : 'var(--text-muted)' }),
                    e('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'flex-start', lineHeight: 1.15, gap: 3 } },
                      e('span', { style: { fontSize: 9.5, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1, fontWeight: 700 } }, 'Dinero a favor'),
                      e('span', { style: { fontSize: 13, fontWeight: 700, fontFamily: 'monospace', color: activo ? 'var(--success)' : 'var(--text-secondary)' } }, activo ? fmtCOP(disp) : 'Gestionar')
                    ),
                    e(Ico, { name: 'chevron-right', size: 14, color: activo ? 'var(--success)' : 'var(--text-muted)' })
                  );
                })()
              )
            ),
            e('div', { className: 'persona-card-body' },
              ciclos.map(cic => {
                const rows = ciclosMap[cic];
                const subPendiente = rows.reduce((s, { _compra: c, _cuota: q }) => {
                  if (q) return s + (c.tercero_pagado || q.cubierta_bolsillo ? 0 : q.total);
                  return s + (c.tercero_pagado ? 0 : c.valor_cop - (c.monto_bolsillo || 0) + calcInteresIntlTercero(c));
                }, 0);
                const subRecibido = rows.reduce((s, { _compra: c, _cuota: q }) => {
                  if (q) return s + (c.tercero_pagado || q.cubierta_bolsillo ? q.total : 0);
                  return s + (c.tercero_pagado ? c.valor_cop : (c.monto_bolsillo || 0));
                }, 0);
                return e('div', { key: cic, style: { marginBottom: 12 } },
                  e('div', { style: { display: 'flex', alignItems: 'center', background: 'var(--bg-tertiary)', borderRadius: 6, padding: '7px 12px', marginBottom: 8, gap: 10 } },
                    e('span', { style: { fontWeight: 700, fontSize: 13, color: 'var(--accent)' } }, fmtCicloLabel(cic)),
                    subPendiente > 0 && e('span', { style: { fontSize: 12, color: 'var(--text-muted)', fontWeight: 400 } }, '—'),
                    subPendiente > 0 && e('span', { style: { fontSize: 12, color: 'var(--warning)', fontWeight: 600 } }, 'Pendiente: ' + fmtCOP(subPendiente)),
                    subRecibido  > 0 && e('span', { style: { fontSize: 12, color: 'var(--text-muted)', fontWeight: 400 } }, subPendiente > 0 ? '·' : '—'),
                    subRecibido  > 0 && e('span', { style: { fontSize: 12, color: 'var(--success)', fontWeight: 600 } }, 'Recibido: ' + fmtCOP(subRecibido))
                  ),
                  e('table', null,
                    e('thead', null, e('tr', null,
                      e('th', null, 'Fecha'), e('th', null, 'Descripcion'),
                      e('th', { className: 'text-right' }, 'Valor COP'),
                      e('th', { className: 'text-right', style: { whiteSpace: 'nowrap', color: '#4FC3F7' } }, 'Valor USD'),
                      aplicaIntl && e('th', { className: 'text-right', style: { whiteSpace: 'nowrap' } }, 'Tasa'),
                      aplicaIntl && e('th', { className: 'text-right', style: { whiteSpace: 'nowrap' } }, 'Int Intl'),
                      aplicaIntl && e('th', { className: 'text-right', style: { whiteSpace: 'nowrap' } }, 'Total'),
                      e('th', null, 'Estado TC'), e('th', null, 'Dinero'), e('th', null, '')
                    )),
                    e('tbody', null,
                      rows.map(({ _compra: c, _cuota: q }) => {
                        if (q) {
                          // Per-cuota bolsillo: cada cuota tiene su propio monto independiente
                          const bolCuota = q.monto_bolsillo_cuota || 0;
                          const cubierta = !!q.cubierta_bolsillo;
                          const bolsilloParcial = !cubierta && bolCuota > 0;
                          const hecha = c.tercero_pagado || cubierta;
                          return e('tr', { key: c.id + '-q' + q.num, style: hecha ? { background: 'rgba(52,211,153,0.06)' } : bolsilloParcial ? { background: 'rgba(167,139,250,0.06)' } : null },
                            e('td', null, fmtDate(q.fecha_corte)),
                            e('td', { style: { fontWeight: 600 } },
                              c.descripcion,
                              // Contador de cuota como mini "pastilla" sutil (tema oscuro), no texto plano.
                              e('span', { className: 'badge', style: { marginLeft: 8, fontSize: 10, fontWeight: 600, background: 'var(--bg-tertiary)', color: 'var(--text-muted)', padding: '2px 6px', borderRadius: 4 } }, 'Cuota ' + q.num + '/' + c.cuotas.length)
                            ),
                            e('td', { className: 'text-right text-mono', style: { fontWeight: 600, color: hecha ? 'var(--success)' : undefined } },
                              (c.valor_usd && c.valor_usd > 0 && !q.total)
                                ? e('span', { style: { color: 'var(--text-muted)' } }, '—')
                                : fmtCOP(q.total)
                            ),
                            e('td', { className: 'text-right text-mono', style: { color: '#4FC3F7', fontWeight: 600 } },
                              c.valor_usd && c.valor_usd > 0
                                ? 'USD $' + new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(c.valor_usd / c.cuotas.length)
                                : e('span', { style: { color: 'var(--text-muted)' } }, '—')
                            ),
                            aplicaIntl && e('td', { className: 'text-right text-mono', style: { fontSize: 12 } }, e('span', { style: { color: 'var(--text-muted)' } }, '—')),
                            aplicaIntl && e('td', { className: 'text-right text-mono', style: { fontSize: 12 } }, e('span', { style: { color: 'var(--text-muted)' } }, '—')),
                            aplicaIntl && e('td', { className: 'text-right text-mono', style: { fontSize: 12 } }, e('span', { style: { color: 'var(--text-muted)' } }, '—')),
                            // ESTADO TC = estado REAL con el banco de ESTA cuota (no el redundante "diferida").
                            // Pagado si el extracto de su ciclo ya se pagó; si no, Pendiente. Mismo criterio
                            // (y mismas clases de color) que la fila simple de abajo.
                            e('td', null, e('span', { className: 'badge badge-' + (q.ciclo_pagado ? 'pagado' : 'pendiente') }, q.ciclo_pagado ? 'Pagado' : 'Pendiente')),
                            e('td', null, dineroCell(hecha, bolCuota, q.total)),
                            e('td', { style: { whiteSpace: 'nowrap', textAlign: 'right' } },
                              (q.ciclo_pagado && hecha)
                                // Cuota con corte pagado Y saldada por el tercero: el dinero reservado ya se
                                // usó al pagar el extracto -> no hay bolsillo que apartar ni retirar.
                                ? e('span', { className: 'badge', style: { background: 'rgba(148,163,184,0.15)', color: 'var(--text-muted)' } }, 'Saldada')
                                : c.tercero_pagado
                                  ? e('button', { className: 'btn btn-sm btn-danger', onClick: () => togglePagado(c.id) }, 'Desmarcar')
                                  : e('button', {
                                      className: 'btn btn-sm btn-success',
                                      onClick: () => openBolsilloTercero(Object.assign({}, c, { _bolsilloCuota: bolCuota }), q.total, q.num)
                                    }, 'Bolsillo')
                            )
                          );
                        }
                        const bol = c.monto_bolsillo || 0;
                        const intlTercero = calcInteresIntlTercero(c);
                        // El tercero debe su valor + su porción proporcional del interés intl de su
                        // división (v4.8.2): el bolsillo cubre cuando alcanza valor+intl, igual que la
                        // tabla principal (renderSingleRow) y la card "Me Deben" del dashboard.
                        const objetivoTercero = c.valor_cop + intlTercero;
                        const bolCubre = bol >= objetivoTercero;
                        const faltaBol = Math.max(0, objetivoTercero - bol);
                        const pctBol = objetivoTercero > 0 ? Math.min(100, Math.round(bol / objetivoTercero * 100)) : 0;
                        return e('tr', { key: c.id, style: (c.tercero_pagado || bolCubre) ? { background: 'rgba(52,211,153,0.08)' } : bol > 0 ? { background: 'rgba(167,139,250,0.06)' } : null },
                          e('td', null, fmtDate(c.fecha)),
                          e('td', { style: { fontWeight: 600 } }, c.descripcion,
                            c.nota_personal && e('div', { style: { fontSize: 11, color: 'var(--text-muted)', fontWeight: 400, marginTop: 1 } }, c.nota_personal)
                          ),
                          e('td', { className: 'text-right text-mono', style: { fontWeight: 600, color: (c.tercero_pagado || bolCubre) ? 'var(--success)' : undefined } },
                            (c.valor_usd && c.valor_usd > 0 && !c.valor_cop)
                              ? e('span', { style: { color: 'var(--text-muted)' } }, '—')
                              : fmtCOP(c.valor_cop)
                          ),
                          e('td', { className: 'text-right text-mono', style: { color: '#4FC3F7', fontWeight: 600 } },
                            c.valor_usd && c.valor_usd > 0
                              ? 'USD $' + new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(c.valor_usd)
                              : e('span', { style: { color: 'var(--text-muted)' } }, '—')
                          ),
                          aplicaIntl && tasaIntlTd(c, tarjeta),
                          aplicaIntl && e('td', { className: 'text-right text-mono', style: { fontSize: 12 } }, intlTercero > 0 ? fmtCOP(intlTercero) : e('span', { style: { color: 'var(--text-muted)' } }, '—')),

                          // ESTADO TC = estado con el BANCO: ignora el bolsillo (que es plata del usuario, no
                          // del banco). Una compra de tercero visible aquí aún no está pagada al banco → 'Pendiente'.
                          // (La columna "Dinero" ya muestra si el tercero reembolsó; si el ciclo se paga, la compra
                          // desaparece de Terceros.)
                          e('td', null, e('span', { className: 'badge badge-' + (c.estado === 'pagado' ? 'pagado' : 'pendiente') }, c.estado === 'pagado' ? 'Pagado' : 'Pendiente')),
                          e('td', null, dineroCell(c.tercero_pagado || bolCubre, bol, objetivoTercero)),
                          e('td', { style: { whiteSpace: 'nowrap', textAlign: 'right' } },
                            // Con cruce: atenuado y protegido SOLO si el cruce ya cubre el 100%. Si el
                            // cruce es PARCIAL, cae al botón Bolsillo activo para completar el resto en
                            // efectivo (el backend impide bajar del monto ya cruzado). v4.8.1.
                            (compraIdsConCruce.has(String(c.id)) && (bolCubre || c.tercero_pagado))
                              ? e('button', {
                                  className: 'btn btn-sm btn-success',
                                  style: { opacity: 0.5, cursor: 'not-allowed' },
                                  title: 'Esta compra recibió un saldo a favor cruzado. Gestiónalo desde "Dinero a favor" (arriba).',
                                  onClick: () => { setAplicarSel(null); setFavorModal({ persona_id: p.persona_id, nombre: p.nombre, color: p.color }); }
                                }, 'Bolsillo')
                              : c.tercero_pagado
                                ? e('button', { className: 'btn btn-sm btn-danger', onClick: () => togglePagado(c.id) }, 'Desmarcar')
                                : e('button', {
                                    className: 'btn btn-sm btn-success',
                                    onClick: () => openBolsilloTercero(c, c.valor_cop + calcInteresIntlTercero(c))
                                  }, 'Bolsillo')
                          )
                        );
                      })
                    )
                  )
                );
              })
            )
          );
        }),

    // Modal bolsillo (diferidas y compras normales de terceros)
    bolsilloModal && (() => {
      const { compra, target } = bolsilloModal;
      const actualMb = compra.monto_bolsillo || 0;  // monto ya guardado en BD
      const bState = actualMb >= target ? 'bolsillo' : actualMb > 0 ? 'bolsillo_parcial' : 'pendiente';
      const modalTitle = bState === 'pendiente' ? 'Apartar en Bolsillo' : bState === 'bolsillo' ? 'Retirar de Bolsillo' : 'Gestionar Bolsillo';
      return e('div', { className: 'modal-overlay', onClick: () => setBolsilloModal(null) },
        e('div', { className: 'modal', onClick: ev => ev.stopPropagation() },
          e('div', { className: 'modal-header' },
            e('div', { className: 'modal-title' }, modalTitle),
            e('button', { type: 'button', className: 'modal-close-btn', onClick: () => setBolsilloModal(null), title: 'Cerrar' }, '\u2715')
          ),
          e('div', { style: { padding: '16px 20px' } },
            e('div', { style: { marginBottom: 16, padding: '12px 16px', background: 'var(--bg-tertiary)', borderRadius: 8 } },
              e('div', { style: { fontSize: 13, color: 'var(--text-secondary)', marginBottom: 4 } }, compra.descripcion),
              compra.persona_nombre && e('div', { style: { fontSize: 12, color: 'var(--accent)', marginBottom: 4 } }, compra.persona_nombre),
              e('div', { style: { fontSize: 18, fontWeight: 700 } }, compra.es_diferida ? 'Cuota' + (compra._cuota_num ? ' ' + compra._cuota_num : '') + ': ' : 'Total: ', fmtCOP(target)),
              compra.monto_bolsillo > 0 && e('div', { style: { fontSize: 13, color: 'var(--success)', marginTop: 4 } }, 'Apartado actualmente: ', fmtCOP(compra.monto_bolsillo))
            ),

                  .then(() => { setBolsilloModal(null); loadData(); toast('Apartado en bolsillo'); });

            ),
            bState === 'bolsillo_parcial' && e('button', { type: 'button', className: 'btn btn-success', style: { width: '100%', marginBottom: 12, marginTop: 12 }, onClick: () => {
                var bodyRest = { monto_bolsillo: target, desde_terceros: true };
                if (compra._cuota_num != null) bodyRest.cuota_num = compra._cuota_num;
                api('/compras/' + compra.id + '/bolsillo', { method: 'PUT', body: bodyRest })
                  .then(() => { setBolsilloModal(null); loadData(); toast('Apartado en bolsillo'); });
              } }, 'Apartar restante (' + fmtCOP(target - actualMb) + ')'),
            e('div', { className: 'form-group' },
              e('label', { className: 'form-label' }, bState === 'bolsillo_parcial' ? 'Monto a agregar' : 'Monto apartado'),
              e(MoneyInput, { value: bolsilloModal.monto, onChange: val => setBolsilloModal(prev => ({ ...prev, monto: val })), placeholder: 'Ej: 50.000' }),
              (() => {
                var val = parseFloat(bolsilloModal.monto) || 0;
                if (!val) return null;
                if (bState === 'bolsillo_parcial') {
                  var totalR = actualMb + val;
                  return totalR >= target
                    ? e('div', { className: 'form-hint', style: { color: 'var(--success)' } }, 'Total resultante: ' + fmtCOP(totalR) + ' — Cubre el total')
                    : e('div', { className: 'form-hint', style: { color: 'var(--warning)' } }, 'Total resultante: ' + fmtCOP(totalR) + ' · Faltaria: ' + fmtCOP(target - totalR));
                }
                return val < target
                  ? e('div', { className: 'form-hint', style: { color: 'var(--warning)' } }, 'Faltaria: ' + fmtCOP(target - val))
                  : e('div', { className: 'form-hint', style: { color: 'var(--success)' } }, 'Cubre el total — se marcara como Pagado');
              })()
            ),
            e('div', { className: 'modal-actions', style: { marginTop: 16 } },
              bState !== 'pendiente' && e('button', { type: 'button', className: 'btn btn-danger', onClick: () => {
                var bodyQuitar = { monto_bolsillo: 0, desde_terceros: true };
                if (compra._cuota_num != null) bodyQuitar.cuota_num = compra._cuota_num;
                api('/compras/' + compra.id + '/bolsillo', { method: 'PUT', body: bodyQuitar })
                  .then(() => { setBolsilloModal(null); loadData(); toast('Bolsillo quitado'); });
              } }, 'Quitar de bolsillo'),
              e('button', { type: 'button', className: 'btn', onClick: () => setBolsilloModal(null) }, 'Cancelar'),
              e('button', { type: 'button', className: 'btn btn-primary', onClick: saveBolsilloTercero }, 'Guardar')
            )
          )
        )
      );
    })(),

    // Modal: gestión del Saldo a Favor de un tercero (cruce contra sus deudas o liquidación en efectivo).
    favorModal && (() => {
      const pid = favorModal.persona_id;
      const creditos = (saldosFavor.creditos || [])
        .filter(cr => String(cr.persona_id) === String(pid))
        .sort((a, b) => (a.estado === 'activo' ? 0 : 1) - (b.estado === 'activo' ? 0 : 1));
      const deudas = compras.filter(c => String(c.persona_id) === String(pid) && !c.es_diferida && (c.valor_cop - (c.monto_bolsillo || 0)) > 0);

        e('div', { className: 'modal', onClick: ev => ev.stopPropagation() },
          e('div', { className: 'modal-header' },
            e('div', { className: 'modal-title', style: { display: 'inline-flex', alignItems: 'center', gap: 8 } },
              e('span', { className: 'persona-dot', style: { background: favorModal.color } }), 'Saldo a favor de ' + favorModal.nombre),
            e('button', { type: 'button', className: 'modal-close-btn', onClick: () => { setFavorModal(null); setAplicarSel(null); }, title: 'Cerrar' }, '✕')
          ),

                  const maxCruce = dSel ? Math.min(disp, Math.round(dSel.valor_cop - (dSel.monto_bolsillo || 0))) : disp;
                  const aps = cr.aplicaciones || [];
                  const estadoLabel = cr.estado === 'liquidado' ? 'Liquidado' : (disp > 0 ? 'Disponible' : 'Consumido');
                  return e('div', { key: cr.id, style: { border: '1px solid var(--border)', borderRadius: 8, padding: '10px 12px', marginBottom: 10, background: 'var(--bg-input)' } },
                    e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, flexWrap: 'wrap' } },
                      e('div', null,
                        e('div', { style: { fontSize: 13, fontWeight: 600 } }, cr.descripcion || 'Reverso'),
                        e('div', { style: { fontSize: 11, color: 'var(--text-muted)' } }, (cr.origen_tipo || 'reverso') + ' · ' + fmtDate(cr.fecha) + ' · crédito de ' + fmtCOP(Math.round(cr.monto)))
                      ),
                      e('div', { style: { textAlign: 'right' } },
                        e('div', { style: { fontSize: 15, fontWeight: 700, color: disp > 0 ? 'var(--success)' : 'var(--text-muted)', fontFamily: 'monospace' } }, fmtCOP(disp)),
                        e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.5 } }, estadoLabel)
                      )
                    ),
                    disp > 0 && e('div', { style: { display: 'flex', gap: 8, marginTop: 8, flexWrap: 'wrap' } },
                      e('button', { type: 'button', className: 'btn btn-sm btn-primary', onClick: () => setAplicarSel(abierto ? null : { creditoId: cr.id, compra_destino_id: (deudas[0] ? String(deudas[0].id) : ''), monto: '' }) }, abierto ? 'Cerrar' : 'Aplicar a una deuda'),
                      e('button', { type: 'button', className: 'btn btn-sm', onClick: () => liquidarSaldo(cr.id) }, 'Liquidar (efectivo)')
                    ),
                    abierto && e('div', { style: { marginTop: 10, paddingTop: 10, borderTop: '1px dashed var(--border)' } },
                      deudas.length === 0
                        ? e('div', { style: { fontSize: 12.5, color: 'var(--warning)' } }, 'Este tercero no tiene otras deudas de 1 cuota pendientes; puedes liquidar el crédito en efectivo.')
                        : e('div', null,
                            e('div', { className: 'form-group', style: { marginBottom: 8 } },
                              e('label', { className: 'form-label' }, 'Aplicar a la deuda'),
                              e('select', { className: 'form-select', value: aplicarSel.compra_destino_id, onChange: ev => setAplicarSel(prev => ({ ...prev, compra_destino_id: ev.target.value })) },
                                deudas.map(d => e('option', { key: d.id, value: String(d.id) }, d.descripcion + ' — debe ' + fmtCOP(d.valor_cop + calcInteresIntlTercero(d) - (d.monto_bolsillo || 0)))))
                            ),
                            e('div', { className: 'form-group', style: { marginBottom: 6 } },
                              e('label', { className: 'form-label' }, 'Monto a cruzar'),
                              e(MoneyInput, { value: aplicarSel.monto, onChange: val => setAplicarSel(prev => ({ ...prev, monto: val })), placeholder: 'Ej: ' + maxCruce })
                            ),
                            e('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginBottom: 10 } }, 'Máximo aquí: ' + fmtCOP(maxCruce) + '  ',
                              e('span', { style: { color: 'var(--accent)', cursor: 'pointer', fontWeight: 600 }, onClick: () => setAplicarSel(prev => ({ ...prev, monto: String(maxCruce) })) }, 'usar máximo')),
                            e('button', { type: 'button', className: 'btn btn-sm btn-success', onClick: aplicarSaldo }, 'Aplicar cruce')
                          )
                    ),
                    aps.length > 0 && e('div', { style: { marginTop: 10, paddingTop: 8, borderTop: '1px solid var(--border)' } },
                      e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 1, marginBottom: 6 } }, 'Movimientos aplicados'),
                      aps.map(ap => e('div', { key: ap.id, style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: 8, padding: '4px 0' } },
                        e('div', { style: { fontSize: 12 } },
                          e('span', { style: { fontFamily: 'monospace', fontWeight: 600 } }, fmtCOP(Math.round(ap.monto))),
                          e('span', { style: { color: 'var(--text-muted)' } }, ' · ' + (ap.tipo === 'liquidacion' ? 'Liquidación (efectivo)' : ('cruce a ' + (ap.compra_desc || ('compra #' + ap.compra_destino_id)))))
                        ),
                        e('button', { type: 'button', className: 'btn btn-sm', style: { color: 'var(--danger)' }, onClick: () => deshacerAplicacion(ap.id), title: 'Deshacer este movimiento' }, 'Deshacer')
                      ))
                    )
                  );
                })
          )
        )
      );
    })()
  );
}

// CARD VIEW — Container with tabs
// ═══════════════════════════════════════════════════════════════════
const CARD_TABS = [
  { id: 'resumen', label: 'Resumen', icoName: 'bar-chart' },
  { id: 'pagos', label: 'Pagos', icoName: 'credit-card' },
  { id: 'terceros', label: 'Terceros', icoName: 'users' },
  { id: 'proyecciones', label: 'Proyecciones', icoName: 'trending' }
];

function CardView({ tarjetaId, initialTab, onBack, onRefreshTarjetas }) {
  const [tarjeta, setTarjeta] = useState(null);
  const [tab, setTab] = useState(initialTab || 'resumen');
  const [showEditModal, setShowEditModal] = useState(false);

  useEffect(() => { api('/tarjetas/' + tarjetaId).then(setTarjeta); }, [tarjetaId]);

  function saveTarjeta(data) {
    api('/tarjetas/' + tarjetaId, { method: 'PUT', body: data }).then(() => {
      setShowEditModal(false);
      api('/tarjetas/' + tarjetaId).then(setTarjeta);
      if (onRefreshTarjetas) onRefreshTarjetas();
      toast('Tarjeta actualizada');
    });
  }

  async function deleteTarjeta() {
    if (!await confirmDialog('ATENCION: Esto eliminara la tarjeta y TODOS sus registros (compras, avances, diferidas, pagos). Continuar?', { confirmText: 'Eliminar', title: 'Eliminar Tarjeta' })) return;
    api('/tarjetas/' + tarjetaId, { method: 'DELETE' }).then(() => {
      toast('Tarjeta eliminada');
      if (onRefreshTarjetas) onRefreshTarjetas();
      onBack();
    });
  }

  async function updateRatesFromWeb() {
    if (!tarjeta.url_tasas) { toastErr('Configura una URL de tasas primero'); return; }
    try {
      const r = await api('/tarjetas/' + tarjetaId + '/actualizar-tasas', { method: 'POST' });
      if (r.ok && r.found) {
        toast('Tasas actualizadas desde la web');
        api('/tarjetas/' + tarjetaId).then(setTarjeta);
      } else if (r.ok && !r.found) {
        toastErr('No se encontraron tasas en la pagina. Ingresalas manualmente en la configuracion de la tarjeta.');
      } else { toastErr(r.error || 'Error al actualizar tasas'); }
    } catch (err) { toastErr(err.message); }
  }

  if (!tarjeta) return e('div', { className: 'loading' }, 'Cargando tarjeta...');

  const tabViews = {
    resumen: () => e(CardResumen, { tarjeta, onDataChange: () => { if (onRefreshTarjetas) onRefreshTarjetas(); } }),
    pagos: () => e(Pagos, { tarjeta, onDataChange: () => { if (onRefreshTarjetas) onRefreshTarjetas(); } }),
    terceros: () => e(Terceros, { tarjeta }),
    proyecciones: () => e(Proyecciones, { tarjeta })
  };

  return e('div', null,
    // Card header
    e('div', { style: { display: 'flex', alignItems: 'center', gap: 14, marginBottom: 20 } },
      e('button', { className: 'btn btn-sm', onClick: onBack }, 'Volver'),
      tarjeta.imagen
        ? e('img', { src: tarjeta.imagen, style: { width: 64, height: 40, objectFit: 'cover', borderRadius: 6, border: '1px solid var(--border)' } })
        : e('div', { className: 'tarjeta-card-dot', style: { background: tarjeta.color, width: 16, height: 16 } }),
      e('div', { style: { flex: 1 } },
        e('div', { style: { fontSize: 20, fontWeight: 700 } }, tarjeta.nombre),
        e('div', { style: { fontSize: 13, color: 'var(--text-muted)' } }, tarjeta.banco || '')
      ),
      tarjeta.url_tasas && e('button', { className: 'rate-fetch-btn', onClick: updateRatesFromWeb, title: 'Actualizar tasas desde la web' }, 'Actualizar Tasas'),
      e('button', { className: 'btn btn-sm', onClick: () => setShowEditModal(true) }, e(Ico, { name: 'edit', size: 14 }), ' Editar'),
      e('button', { className: 'btn btn-sm btn-danger', onClick: deleteTarjeta }, e(Ico, { name: 'trash', size: 14, color: 'currentColor' }))
    ),

    // Tabs
    e('div', { className: 'tab-bar' },
      CARD_TABS.map(t =>
        e('div', { key: t.id, className: 'tab-item' + (tab === t.id ? ' active' : ''), onClick: () => setTab(t.id) },
          e(Ico, { name: t.icoName, size: 14, color: tab === t.id ? 'var(--accent)' : 'var(--text-secondary)' }), ' ' + t.label
        )
      )
    ),

    // Tab content
    (tabViews[tab] || tabViews.resumen)(),

    // Edit modal
    e(Modal, { show: showEditModal, onClose: () => setShowEditModal(false), title: 'Editar Tarjeta', large: true },
      e(TarjetaForm, { item: tarjeta, onSave: saveTarjeta, onCancel: () => setShowEditModal(false) })
    )
  );
}

// ═══════════════════════════════════════════════════════════════════
// APP ROOT
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [view, setView] = useState('dashboard');
  const [showInactivasNav, setShowInactivasNav] = useState(false); // sección "Historial / Inactivas" colapsada por defecto
  const [tarjetas, setTarjetas] = useState([]);
  const [selectedCardId, setSelectedCardId] = useState(null);
  const [sidebarOpen, setSidebarOpen] = useState(true);
  const [theme, setTheme] = useState(localStorage.getItem('theme') || 'dark');
  const [showNewCardModal, setShowNewCardModal] = useState(false);
  const [updateStatus, setUpdateStatus] = useState(null);
  const [needsRestart, setNeedsRestart] = useState(false);
  const [changelogDlg, setChangelogDlg] = useState(null);
  const [appVersion, setAppVersion] = useState('');
  // Estado de la config de IA (provider/model/hasKey). Reactivo: Configuracion lo
  // recarga al guardar/borrar y se refleja al instante en la seccion IA Asistente.
  const [iaConfig, setIaConfig] = useState({ provider: null, model: '', hasKey: false, encryptionAvailable: false });
  // Modo Demo: estado de sesion (NO se persiste). Al reiniciar, sin key real → tutorial.
  const [iaDemo, setIaDemo] = useState(false);
  // IaAsistente se monta perezosamente al entrar la primera vez y NO se desmonta al cambiar de
  // vista (se oculta con CSS): preserva la vista previa y el analisis, sin re-gastar tokens.
  const [iaMontado, setIaMontado] = useState(false);
  useEffect(() => { if (view === 'ia') setIaMontado(true); }, [view]);
  const reloadIaConfig = useCallback(() => {
    if (window.electronAPI && window.electronAPI.iaGetConfig) window.electronAPI.iaGetConfig().then(setIaConfig);
  }, []);
  useEffect(() => { reloadIaConfig(); }, [reloadIaConfig]);

  // Expose restart setter globally so Configuracion can trigger it
  window.__setNeedsRestart = setNeedsRestart;

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('theme', theme);
  }, [theme]);

  // Get app version + show changelog if updated
  useEffect(() => {
    if (window.electronAPI && window.electronAPI.getVersion) {
      window.electronAPI.getVersion().then(v => {
        setAppVersion(v);
        const lastSeen = localStorage.getItem('lastSeenVersion');
        if (lastSeen && lastSeen !== v) {
          setChangelogDlg({ version: v, items: CHANGELOG[v] || ['Mejoras y correcciones generales'] });
        }
        localStorage.setItem('lastSeenVersion', v);
      });
    }
  }, []);

  // Auto-update listeners
  useEffect(() => {
    if (!window.electronAPI) return;
    if (window.electronAPI.onUpdateAvailable) {
      window.electronAPI.onUpdateAvailable((info) => {
        setUpdateStatus({ status: 'available', version: info.version });
      });
    }
    if (window.electronAPI.onDownloadProgress) {
      window.electronAPI.onDownloadProgress((progress) => {
        setUpdateStatus(s => s ? { ...s, status: 'downloading', percent: Math.round(progress.percent || 0) } : s);
      });
    }
    if (window.electronAPI.onUpdateDownloaded) {
      window.electronAPI.onUpdateDownloaded(() => {
        setUpdateStatus(s => s ? { ...s, status: 'downloaded' } : { status: 'downloaded', version: '' });
      });
    }
  }, []);

  const loadTarjetas = useCallback(() => { api('/tarjetas').then(setTarjetas); }, []);
  useEffect(() => { loadTarjetas(); }, [loadTarjetas]);

  // Load saved bank URLs into global presets
  useEffect(() => {
    api('/config').then(cfg => {
      if (cfg.bancos_urls) {
        try {
          const saved = JSON.parse(cfg.bancos_urls);
          saved.forEach(s => {
            const preset = BANCOS_PRESETS.find(p => p.nombre === s.nombre);
            if (preset) preset.url = s.url;
            else if (!s.builtin) BANCOS_PRESETS.push({ nombre: s.nombre, url: s.url, color: s.color || '#666' });
          });
        } catch (e) {}
      }
    });
  }, []);

  // One-time notice: ask Bancolombia users to set franquicia
  const franquiciaCheckRef = useRef(false);
  useEffect(() => {
    if (franquiciaCheckRef.current || !tarjetas.length) return;
    franquiciaCheckRef.current = true;
    const sinFranquicia = tarjetas.filter(t => t.banco === 'Bancolombia' && !t.franquicia);
    if (sinFranquicia.length === 0) return;
    const already = localStorage.getItem('franquicia_notice_shown');
    if (already) return;
    localStorage.setItem('franquicia_notice_shown', '1');
    const nombres = sinFranquicia.map(t => '• ' + t.nombre).join('\n');
    infoDialog('Las siguientes tarjetas Bancolombia no tienen franquicia asignada:\n\n' + nombres + '\n\nPor favor ve a editar cada tarjeta y selecciona su franquicia (Visa, Mastercard o American Express).\n\nCada franquicia maneja las compras internacionales de forma diferente.', 'Franquicia requerida');
  }, [tarjetas]);

  // Data sync on startup
  const syncDoneRef = useRef(false);
  useEffect(() => {
    if (syncDoneRef.current) return;
    syncDoneRef.current = true;
    api('/sync', { method: 'POST' }).then(r => {
      if (r && r.fixes > 0) {
        console.log('[Sync] ' + r.fixes + ' correcciones aplicadas');
        loadTarjetas();
      }
    });
  }, []);

  // Modal bloqueante: tarjetas Bancolombia que no tienen difiere_intereses_cuota1 configurado
  const [bancolombiaPendientes, setBancolombiaPendientes] = useState([]);
  const [bancolombiaSelections, setBancolombiaSelections] = useState({}); // id → 0 | 1
  const [savingBancolombia, setSavingBancolombia] = useState(false);
  useEffect(() => {
    api('/tarjetas/pendientes-config').then(list => {
      if (Array.isArray(list)) setBancolombiaPendientes(list);
    });
  }, [tarjetas]);
  function selectBancolombia(id, value) {
    setBancolombiaSelections(s => ({ ...s, [id]: value }));
  }
  async function saveBancolombiaConfig() {
    if (savingBancolombia) return;
    const todas = bancolombiaPendientes.every(t => bancolombiaSelections[t.id] === 0 || bancolombiaSelections[t.id] === 1);
    if (!todas) {
      toastErr('Debés elegir una opción para cada tarjeta');
      return;
    }
    setSavingBancolombia(true);
    try {
      await Promise.all(bancolombiaPendientes.map(t =>
        api('/tarjetas/' + t.id + '/difiere-intereses', { method: 'PUT', body: { difiere: bancolombiaSelections[t.id] } })
      ));
      setBancolombiaPendientes([]);
      setBancolombiaSelections({});
      loadTarjetas();
      toast('Configuración guardada');
    } catch (err) {
      toastErr('Error al guardar: ' + (err.message || 'desconocido'));
    }
    setSavingBancolombia(false);
  }

  // Auto-update rates on app startup for cards that have a URL configured
  const ratesUpdatedRef = useRef(false);
  useEffect(() => {
    if (ratesUpdatedRef.current || tarjetas.length === 0) return;
    ratesUpdatedRef.current = true;
    const cardsWithUrl = tarjetas.filter(t => t.url_tasas && t.estado === 'activa');
    if (cardsWithUrl.length === 0) return;
    console.log('[Tasas] Actualizando tasas para ' + cardsWithUrl.length + ' tarjeta(s)...');
    Promise.allSettled(
      cardsWithUrl.map(t =>
        api('/tarjetas/' + t.id + '/actualizar-tasas', { method: 'POST' })
          .then(r => {
            if (r.ok && r.found) console.log('[Tasas] ' + t.nombre + ' actualizada:', r.rates);
            else if (r.ok && !r.found) console.log('[Tasas] ' + t.nombre + ': no se encontraron tasas en la pagina');
            else console.warn('[Tasas] ' + t.nombre + ' error:', r.error);
            return r;
          })
      )
    ).then(results => {
      const updated = results.filter(r => r.status === 'fulfilled' && r.value && r.value.ok && r.value.found).length;
      if (updated > 0) {
        loadTarjetas();
        toast('Tasas actualizadas para ' + updated + ' tarjeta(s)');
      }
    });
  }, [tarjetas]);

  const [initialTab, setInitialTab] = useState(null);
  function selectCard(id, tab) { setSelectedCardId(id); setInitialTab(tab || null); setView('card'); }
  function goToDashboard() { setView('dashboard'); setSelectedCardId(null); loadTarjetas(); }

  function saveNewCard(data) {
    api('/tarjetas', { method: 'POST', body: data }).then(r => {
      setShowNewCardModal(false);
      loadTarjetas();
      selectCard(r.id);
      toast('Tarjeta creada');
    });
  }

  const headerTitle = view === 'dashboard' ? e(Fragment, null, e(Ico, { name: 'bar-chart', size: 18, color: 'var(--accent)' }), ' Dashboard') :
                      view === 'ia' ? e(Fragment, null, e(Ico, { name: 'sparkles', size: 18, color: 'var(--accent)', className: 'ai-glow' }), ' IA Asistente') :
                      view === 'config' ? e(Fragment, null, e(Ico, { name: 'settings', size: 18, color: 'var(--accent)' }), ' Configuracion') :
                      view === 'historial' ? e(Fragment, null, e(Ico, { name: 'activity', size: 18, color: 'var(--accent)' }), ' Historial') :
                      view === 'calculadora' ? e(Fragment, null, e(Ico, { name: 'calculator', size: 18, color: 'var(--accent)' }), ' Calculadora') :
                      view === 'card' ? '' : '';

  return e('div', { className: 'app-layout' },
    // Sidebar
    e('div', { className: 'sidebar' + (sidebarOpen ? '' : ' collapsed') },
      e('div', { className: 'sidebar-header' },
        e(Ico, { name: 'credit-card', size: 20, color: 'var(--accent)' }),
        e('div', { className: 'sidebar-logo' }, 'Gestor TC')
      ),
      e('div', { className: 'sidebar-nav' },
        // Dashboard
        e('div', { className: 'nav-item' + (view === 'dashboard' ? ' active' : ''), onClick: goToDashboard },
          e(Ico, { name: 'home', size: 18, color: view === 'dashboard' ? 'var(--accent)' : 'var(--text-secondary)' }), 'Dashboard'
        ),

        // Tarjetas section — solo activas
        (() => {
          const tjActivas = tarjetas.filter(t => t.estado === 'activa');
          const tjInactivas = tarjetas.filter(t => t.estado === 'inactiva');
          return e(Fragment, null,
            e('div', { className: 'nav-section-title' }, 'Mis Tarjetas'),
            tjActivas.map(t =>
              e('div', { key: t.id, className: 'nav-item nav-card-item' + (view === 'card' && selectedCardId === t.id ? ' active' : ''), onClick: () => selectCard(t.id) },
                t.imagen
                  ? e('img', { src: t.imagen, style: { width: 28, height: 18, objectFit: 'cover', borderRadius: 3, flexShrink: 0 } })
                  : e('span', { className: 'nav-card-dot', style: { background: t.color } }),
                e('span', { className: 'nav-card-name' }, t.nombre),
                t.deudaTotal > 0 && e('span', { className: 'nav-card-badge' }, fmtCOP(t.deudaTotal))
              )
            ),
            e('div', { className: 'nav-item nav-add-btn', onClick: () => setShowNewCardModal(true) },
              e(Ico, { name: 'plus', size: 16, color: 'var(--accent)' }), 'Nueva Tarjeta'
            ),
            // Sección colapsable de tarjetas inactivas — solo se renderiza si hay alguna.
            tjInactivas.length > 0 && e(Fragment, null,
              e('div', {
                className: 'nav-section-title',
                style: { cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 4, userSelect: 'none' },
                onClick: () => setShowInactivasNav(v => !v),
                title: showInactivasNav ? 'Ocultar' : 'Mostrar'
              },
                e(Ico, { name: showInactivasNav ? 'chevron-down' : 'chevron-right', size: 10, color: 'currentColor' }),
                'Historial / Inactivas',
                e('span', { style: { marginLeft: 'auto', opacity: 0.6 } }, '(' + tjInactivas.length + ')')
              ),
              showInactivasNav && tjInactivas.map(t =>
                e('div', { key: t.id, className: 'nav-item nav-card-item' + (view === 'card' && selectedCardId === t.id ? ' active' : ''), style: { opacity: 0.7 }, onClick: () => selectCard(t.id) },
                  t.imagen
                    ? e('img', { src: t.imagen, style: { width: 28, height: 18, objectFit: 'cover', borderRadius: 3, flexShrink: 0, filter: 'grayscale(0.4)' } })
                    : e('span', { className: 'nav-card-dot', style: { background: t.color, opacity: 0.6 } }),
                  e('span', { className: 'nav-card-name' }, t.nombre)
                )
              )
            )
          );
        })(),

        // Calculadora, Historial & Config
        e('div', { className: 'nav-section-title', style: { marginTop: 12 } }, ''),
        e('div', { className: 'nav-item' + (view === 'calculadora' ? ' active' : ''), onClick: () => { setView('calculadora'); setSelectedCardId(null); } },
          e(Ico, { name: 'calculator', size: 18, color: view === 'calculadora' ? 'var(--accent)' : 'var(--text-secondary)' }), 'Calculadora'
        ),
        e('div', { className: 'nav-item' + (view === 'historial' ? ' active' : ''), onClick: () => { setView('historial'); setSelectedCardId(null); } },
          e(Ico, { name: 'activity', size: 18, color: view === 'historial' ? 'var(--accent)' : 'var(--text-secondary)' }), 'Historial'
        ),
        e('div', { className: 'nav-item' + (view === 'ia' ? ' active' : ''), onClick: () => { setView('ia'); setSelectedCardId(null); } },
          e(Ico, { name: 'sparkles', size: 18, color: 'var(--accent)', className: 'ai-glow' }), 'IA Asistente'
        ),
        e('div', { className: 'nav-item' + (view === 'config' ? ' active' : ''), onClick: () => { setView('config'); setSelectedCardId(null); } },
          e(Ico, { name: 'settings', size: 18, color: view === 'config' ? 'var(--accent)' : 'var(--text-secondary)' }), 'Configuracion'
        )
      ),
      e('div', { className: 'sidebar-footer' }, appVersion ? 'v' + appVersion : 'v1.0.1')
    ),

    // Main
    e('div', { className: 'main-area' },
      e('div', { className: 'header' },
        e('button', { className: 'hamburger', onClick: () => setSidebarOpen(s => !s) }, e(Ico, { name: 'menu', size: 20, color: 'var(--text-primary)' })),
        e('div', { className: 'header-title' }, headerTitle),
        e('div', { className: 'header-actions' },
          e('button', { className: 'theme-toggle', onClick: () => setTheme(t => t === 'dark' ? 'light' : 'dark'), title: 'Cambiar tema', style: { display: 'flex', alignItems: 'center', justifyContent: 'center' } },
            e(Ico, { name: theme === 'dark' ? 'sun' : 'moon', size: 16, color: 'var(--text-primary)' })
          )
        )
      ),
      // Update banner
      updateStatus && updateStatus.status === 'available' && e('div', { style: { background: 'var(--success-bg)', border: '1px solid var(--success)', padding: '10px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, flexShrink: 0 } },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
          e(Ico, { name: 'download', size: 16, color: 'var(--success)' }),
          e('span', { style: { fontSize: 12, color: 'var(--success)', fontWeight: 600 } }, 'Nueva version v' + updateStatus.version + ' disponible')
        ),
        e('div', { style: { display: 'flex', gap: 8 } },
          e('button', { onClick: () => { if (window.electronAPI) window.electronAPI.downloadUpdate(); }, style: { background: 'var(--success)', color: '#fff', border: 'none', borderRadius: 8, padding: '6px 14px', fontSize: 11, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' } }, 'Descargar'),
          e('button', { onClick: () => setUpdateStatus(null), style: { background: 'none', border: 'none', cursor: 'pointer', padding: 4, color: 'var(--success)', fontSize: 16 } }, '\u2715')
        )
      ),
      updateStatus && updateStatus.status === 'downloading' && e('div', { style: { background: 'var(--accent-bg)', border: '1px solid var(--accent)', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10, flexShrink: 0 } },
        e(Ico, { name: 'download', size: 16, color: 'var(--accent)' }),
        e('div', { style: { flex: 1 } },
          e('div', { style: { fontSize: 12, color: 'var(--accent)', fontWeight: 600, marginBottom: 4 } }, 'Descargando actualizacion... ' + (updateStatus.percent || 0) + '%'),
          e('div', { style: { background: 'var(--border)', borderRadius: 6, height: 5, overflow: 'hidden' } },
            e('div', { style: { width: (updateStatus.percent || 0) + '%', height: '100%', background: 'linear-gradient(90deg,#2ea043,#3fb950)', borderRadius: 6, transition: 'width 0.3s' } })
          )
        )
      ),
      updateStatus && updateStatus.status === 'downloaded' && e('div', { style: { background: 'var(--success-bg)', border: '1px solid var(--success)', padding: '10px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 10, flexShrink: 0 } },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 8 } },
          e(Ico, { name: 'check', size: 16, color: 'var(--success)' }),
          e('span', { style: { fontSize: 12, color: 'var(--success)', fontWeight: 600 } }, 'v' + (updateStatus.version || '') + ' lista para instalar')
        ),
        e('button', { onClick: () => { if (window.electronAPI) window.electronAPI.installUpdate(); }, style: { background: 'var(--success)', color: '#fff', border: 'none', borderRadius: 8, padding: '6px 14px', fontSize: 11, fontWeight: 600, cursor: 'pointer', fontFamily: 'inherit' } }, 'Reiniciar e instalar')
      ),

      e('div', { className: 'content' },
        view === 'dashboard' && e(GlobalDashboard, { tarjetas, onSelectCard: selectCard, onNewCard: () => setShowNewCardModal(true) }),
        view === 'card' && selectedCardId && e(CardView, { tarjetaId: selectedCardId, initialTab, onBack: goToDashboard, onRefreshTarjetas: loadTarjetas }),
        view === 'calculadora' && e(Calculadora, { tarjetas }),
        view === 'historial' && e(Historial),
        iaMontado && e('div', { key: 'ia-wrap', style: { display: view === 'ia' ? 'block' : 'none' } }, e(IaAsistente, { iaConfig, onIaConfigChange: reloadIaConfig, tarjetas, onGoConfig: () => setView('config'), demoMode: iaDemo, onActivarDemo: () => { setIaDemo(true); toast('Modo Demo activado (solo esta sesion)'); }, onSalirDemo: () => setIaDemo(false), onRefrescarTarjetas: loadTarjetas })),
        view === 'config' && e(Configuracion, { iaConfig, onIaConfigChange: reloadIaConfig })
      )
    ),

    // Modal bloqueante: configurar comportamiento de intereses para tarjetas Bancolombia
    bancolombiaPendientes.length > 0 && e('div', { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 998, backdropFilter: 'blur(8px)', padding: 20, overflow: 'auto' } },
      e('div', { style: { background: 'var(--bg-secondary)', borderRadius: 14, padding: 28, maxWidth: 560, width: '100%', maxHeight: '90vh', overflow: 'auto', border: '1px solid var(--border)' } },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 } },
          e(Ico, { name: 'alert-circle', size: 22, color: 'var(--warning)' }),
          e('div', { style: { fontSize: 17, fontWeight: 700, color: 'var(--text-primary)' } }, 'Configuración requerida')
        ),
        e('div', { style: { fontSize: 13, color: 'var(--text-secondary)', marginBottom: 20, lineHeight: 1.5 } },
          'No todas las tarjetas Bancolombia cobran los intereses de las diferidas igual. ',
          'Algunas cobran desde la cuota 1, otras difieren los intereses de la cuota 1 a la cuota 2. ',
          e('br'), e('br'),
          e('strong', null, 'Verificá esta info en la página oficial de tu tarjeta Bancolombia '),
          'y elegí el comportamiento correcto para cada una. Sin esto, tus diferidas pueden calcularse mal.'
        ),
        bancolombiaPendientes.map(t =>
          e('div', { key: t.id, style: { background: 'var(--bg-tertiary)', borderRadius: 10, padding: 14, marginBottom: 12, border: '1px solid var(--border)' } },
            e('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 } },
              t.imagen
                ? e('img', { src: t.imagen, style: { width: 44, height: 28, objectFit: 'cover', borderRadius: 4 } })
                : e('span', { style: { width: 14, height: 14, borderRadius: '50%', background: t.color || '#666' } }),
              e('div', { style: { fontWeight: 600, fontSize: 14, color: 'var(--text-primary)' } }, t.nombre),
              e('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginLeft: 'auto' } }, t.banco)
            ),
            e('div', { style: { display: 'flex', flexDirection: 'column', gap: 6 } },
              e('label', { style: { display: 'flex', alignItems: 'flex-start', gap: 8, padding: '8px 10px', borderRadius: 6, border: '1px solid var(--border)', cursor: 'pointer', background: bancolombiaSelections[t.id] === 1 ? 'var(--bg-secondary)' : 'transparent' } },
                e('input', { type: 'radio', name: 'bcol-' + t.id, checked: bancolombiaSelections[t.id] === 1, onChange: () => selectBancolombia(t.id, 1), style: { marginTop: 2 } }),
                e('div', null,
                  e('div', { style: { fontWeight: 600, fontSize: 13 } }, 'Sí, difiere intereses'),
                  e('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginTop: 2 } }, 'Cuota 1 acumula · cuota 2 cobra interés_1 + interés_2')
                )
              ),
              e('label', { style: { display: 'flex', alignItems: 'flex-start', gap: 8, padding: '8px 10px', borderRadius: 6, border: '1px solid var(--border)', cursor: 'pointer', background: bancolombiaSelections[t.id] === 0 ? 'var(--bg-secondary)' : 'transparent' } },
                e('input', { type: 'radio', name: 'bcol-' + t.id, checked: bancolombiaSelections[t.id] === 0, onChange: () => selectBancolombia(t.id, 0), style: { marginTop: 2 } }),
                e('div', null,
                  e('div', { style: { fontWeight: 600, fontSize: 13 } }, 'No, cobra desde cuota 1'),
                  e('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginTop: 2 } }, 'Cada cuota cobra su propio interés desde la primera')
                )
              )
            )
          )
        ),
        e('button', {
          onClick: saveBancolombiaConfig,
          disabled: savingBancolombia || !bancolombiaPendientes.every(t => bancolombiaSelections[t.id] === 0 || bancolombiaSelections[t.id] === 1),
          style: { width: '100%', padding: '12px 0', background: 'var(--accent)', color: '#fff', border: 'none', borderRadius: 10, fontWeight: 700, fontSize: 14, cursor: 'pointer', fontFamily: 'inherit', marginTop: 8, opacity: (savingBancolombia || !bancolombiaPendientes.every(t => bancolombiaSelections[t.id] === 0 || bancolombiaSelections[t.id] === 1)) ? 0.5 : 1 }
        }, savingBancolombia ? 'Guardando...' : 'Guardar configuración')
      )
    ),

    // Restart overlay (after DB move)
    needsRestart && e('div', { style: { position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.92)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', zIndex: 999, backdropFilter: 'blur(8px)' } },
      e('div', null, e(Ico, { name: 'refresh', size: 40, color: 'var(--accent)' })),
      e('div', { style: { fontSize: 18, fontWeight: 700, color: 'var(--text-primary)', marginTop: 16, marginBottom: 8 } }, 'Ruta actualizada'),
      e('div', { style: { fontSize: 13, color: 'var(--text-secondary)', marginBottom: 24, textAlign: 'center', padding: '0 40px' } }, 'Debes reiniciar la app para usar la nueva ubicacion de la base de datos.'),
      e('button', { onClick: () => { if (window.electronAPI) window.electronAPI.relaunchApp(); }, style: { background: 'var(--success)', color: '#fff', border: 'none', borderRadius: 12, padding: '14px 48px', fontSize: 15, fontWeight: 700, cursor: 'pointer', fontFamily: 'inherit' } }, 'Reiniciar')
    ),

    // Changelog dialog
    // Layout flex-column con maxHeight 70vh: header y botón quedan fijos,
    // solo la lista de items hace scroll cuando hay muchos cambios. Override
    // de .modal { overflow-y: auto } via overflow:hidden en el contenedor.
    changelogDlg && e('div', { className: 'modal-overlay', onClick: () => setChangelogDlg(null) },
      e('div', { className: 'modal', onClick: (ev) => ev.stopPropagation(), style: { maxWidth: 380, maxHeight: '70vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' } },
        e('div', { className: 'modal-handle', style: { flexShrink: 0 } }),
        e('div', { style: { textAlign: 'center', marginBottom: 14, flexShrink: 0 } },
          e('div', { style: { marginBottom: 6 } }, e(Ico, { name: 'check', size: 28, color: 'var(--success)' })),
          e('div', { style: { fontWeight: 700, fontSize: 17, color: 'var(--text-primary)' } }, 'Actualizado a v' + changelogDlg.version)
        ),
        e('div', { style: { marginBottom: 16, overflowY: 'auto', flex: '1 1 auto', minHeight: 0, paddingRight: 6 } },
          changelogDlg.items.map((item, i) =>
            e('div', { key: i, style: { display: 'flex', alignItems: 'flex-start', gap: 10, padding: '8px 0', fontSize: 13, color: 'var(--text-secondary)', lineHeight: 1.45 } },
              // Icono más grande y con un poco de margen superior para alinear con la primera línea del texto.
              e('span', { style: { flexShrink: 0, marginTop: 2 } }, e(Ico, { name: 'check', size: 18, color: 'var(--success)' })),
              e('span', null, item)
            )
          )
        ),
        e('button', { onClick: () => setChangelogDlg(null), style: { width: '100%', padding: '10px 0', background: 'var(--success)', color: '#fff', border: 'none', borderRadius: 10, fontWeight: 700, fontSize: 14, cursor: 'pointer', fontFamily: 'inherit', flexShrink: 0 } }, 'Entendido')
      )
    ),

    e(ToastContainer),
    e(ConfirmDialog),

    // New card modal
    e(Modal, { show: showNewCardModal, onClose: () => setShowNewCardModal(false), title: 'Nueva Tarjeta de Credito', large: true },
      e(TarjetaForm, { item: null, onSave: saveNewCard, onCancel: () => setShowNewCardModal(false) })
    )
  );
}

// ─── Mount ─────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(e(App));
</script>
</body>
</html>
