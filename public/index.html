<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Tarjetas de Credito</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
/* ═══════════════════════════════════════════════════════════════════
   CSS VARIABLES & THEME
   ═══════════════════════════════════════════════════════════════════ */
:root { --transition: 0.2s ease; }
[data-theme="dark"] {
  --bg-primary: #0f1117; --bg-secondary: #1a1d27; --bg-card: #1e2130;
  --bg-card-hover: #252839; --bg-input: #252839; --bg-sidebar: #13151f;
  --border: #2a2d3a; --border-subtle: #1f2233;
  --text-primary: #e8eaed; --text-secondary: #9aa0b0; --text-muted: #5f6578;
  --accent: #4f8cff; --accent-hover: #6ba0ff; --accent-bg: rgba(79,140,255,0.12);
  --success: #34d399; --success-bg: rgba(52,211,153,0.12);
  --danger: #f87171; --danger-bg: rgba(248,113,113,0.12);
  --warning: #fbbf24; --warning-bg: rgba(251,191,36,0.12);
  --purple: #a78bfa; --purple-bg: rgba(167,139,250,0.12);
  --shadow: 0 2px 8px rgba(0,0,0,0.3); --shadow-lg: 0 8px 32px rgba(0,0,0,0.4);
  --bg-tertiary: #1e2030; --bg-main: #161822;
  --info: #38bdf8; --primary: #6366f1;
}
[data-theme="light"] {
  --bg-primary: #f5f6fa; --bg-secondary: #ffffff; --bg-card: #ffffff;
  --bg-card-hover: #f0f2f8; --bg-input: #f0f2f8; --bg-sidebar: #ebedf5;
  --border: #dfe1ea; --border-subtle: #e8eaf2;
  --text-primary: #1a1d27; --text-secondary: #5f6578; --text-muted: #9aa0b0;
  --accent: #3b7dff; --accent-hover: #2b6ae0; --accent-bg: rgba(59,125,255,0.08);
  --success: #059669; --success-bg: rgba(5,150,105,0.08);
  --danger: #dc2626; --danger-bg: rgba(220,38,38,0.08);
  --warning: #d97706; --warning-bg: rgba(217,119,6,0.08);
  --purple: #7c3aed; --purple-bg: rgba(124,58,237,0.08);
  --shadow: 0 2px 8px rgba(0,0,0,0.08); --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  --bg-tertiary: #f1f5f9; --bg-main: #f8fafc;
  --info: #0284c7; --primary: #4f46e5;
}

/* RESET & BASE */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body, #root { height: 100%; width: 100%; overflow: hidden; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-primary); color: var(--text-primary); font-size: 14px; line-height: 1.5; }
a { color: var(--accent); text-decoration: none; }

/* LAYOUT */
.app-layout { display: flex; height: 100vh; }
.sidebar { width: 260px; min-width: 260px; background: var(--bg-sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; transition: transform var(--transition); z-index: 100; }
.sidebar.collapsed { transform: translateX(-260px); width: 0; min-width: 0; overflow: hidden; }
.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.sidebar-logo { font-size: 18px; font-weight: 700; color: var(--accent); }
.sidebar-nav { flex: 1; padding: 8px; overflow-y: auto; }
.nav-section-title { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 16px 12px 6px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 14px; border-radius: 8px; cursor: pointer; color: var(--text-secondary); transition: all var(--transition); font-size: 13px; margin-bottom: 1px; user-select: none; }
.nav-item:hover { background: var(--bg-card); color: var(--text-primary); }
.nav-item.active { background: var(--accent-bg); color: var(--accent); font-weight: 600; }
.nav-icon { font-size: 16px; width: 22px; text-align: center; }
.nav-card-item { padding-left: 20px; }
.nav-card-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.nav-card-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.nav-card-badge { font-size: 10px; color: var(--text-muted); }
.nav-add-btn { border: 1px dashed var(--border); color: var(--text-muted); justify-content: center; font-size: 12px; }
.nav-add-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-bg); }
.sidebar-footer { padding: 12px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-muted); text-align: center; }

.main-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.header { height: 56px; background: var(--bg-secondary); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 16px; flex-shrink: 0; }
.hamburger { background: none; border: none; color: var(--text-primary); font-size: 22px; cursor: pointer; padding: 4px 8px; border-radius: 6px; }
.hamburger:hover { background: var(--bg-card); }
.header-title { font-size: 16px; font-weight: 600; flex: 1; display: flex; align-items: center; gap: 10px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* TABS */
.tab-bar { display: flex; gap: 0; border-bottom: 2px solid var(--border); margin-bottom: 24px; }
.tab-item { padding: 10px 18px; cursor: pointer; font-size: 13px; font-weight: 500; color: var(--text-secondary); border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all var(--transition); }
.tab-item:hover { color: var(--text-primary); }
.tab-item.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }

/* CARDS */
.cards-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; transition: all var(--transition); }
.card:hover { border-color: var(--accent); box-shadow: var(--shadow); }
.card-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.card-value { font-size: 28px; font-weight: 700; }
.card-sub { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }
.card-accent .card-value { color: var(--accent); }
.card-success .card-value { color: var(--success); }
.card-danger .card-value { color: var(--danger); }
.card-warning .card-value { color: var(--warning); }
.card-purple .card-value { color: var(--purple); }

/* TARJETA CARDS (dashboard) */
.tarjeta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-bottom: 24px; }
.tarjeta-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; overflow: hidden; cursor: pointer; transition: all var(--transition); }
.tarjeta-card:hover { border-color: var(--accent); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.tarjeta-card-img { width: 100%; height: 140px; object-fit: cover; display: block; }
.tarjeta-card-header { padding: 20px; display: flex; align-items: center; gap: 14px; }
.tarjeta-card-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
.tarjeta-card-info { flex: 1; }
.tarjeta-card-name { font-size: 16px; font-weight: 700; }
.tarjeta-card-bank { font-size: 12px; color: var(--text-muted); }
.tarjeta-card-body { padding: 0 20px 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.tarjeta-stat-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; }
.tarjeta-stat-value { font-size: 18px; font-weight: 700; }
.tarjeta-stat-value.danger { color: var(--danger); }
.tarjeta-stat-value.accent { color: var(--accent); }

/* TABLES */
.table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border); background: var(--bg-card); }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { background: var(--bg-secondary); padding: 10px 14px; text-align: left; font-weight: 600; font-size: 12px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1; }
tbody td { padding: 10px 14px; border-bottom: 1px solid var(--border-subtle); }
tbody tr:hover { background: var(--bg-card-hover); }
tbody tr:last-child td { border-bottom: none; }
tbody tr.row-highlight { background: var(--accent-bg); }
.text-right { text-align: right; }
.text-center { text-align: center; }
.text-mono { font-family: 'SF Mono', 'Consolas', monospace; font-size: 12.5px; }

/* BUTTONS */
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-card); color: var(--text-primary); font-size: 13px; cursor: pointer; transition: all var(--transition); font-weight: 500; }
.btn:hover { background: var(--bg-card-hover); border-color: var(--accent); }
.btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.btn-primary:hover { background: var(--accent-hover); }
.btn-danger { color: var(--danger); border-color: var(--danger); background: var(--danger-bg); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-success { color: var(--success); border-color: var(--success); background: var(--success-bg); }
.btn-sm { padding: 5px 10px; font-size: 12px; }

/* FORMS */
.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
.form-input, .form-select { width: 100%; padding: 9px 12px; border-radius: 8px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-primary); font-size: 13.5px; transition: border-color var(--transition); }
.form-input:focus, .form-select:focus { outline: none; border-color: var(--accent); }
.form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; }
.form-hint { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* MODAL */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(4px); animation: fadeIn 0.2s ease; }
.modal { background: var(--bg-card); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 90%; max-width: 600px; max-height: 85vh; overflow-y: auto; box-shadow: var(--shadow-lg); animation: slideUp 0.25s cubic-bezier(.32,.72,0,1); position: relative; }
.modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 99px; margin: 0 auto 16px; }
.modal-close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--text-muted); font-size: 18px; cursor: pointer; width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.modal-close-btn:hover { background: var(--border); color: var(--text-primary); }
.tasa-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.tasa-toggle-btn { background: transparent; border: none; color: var(--text-muted); padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
.tasa-toggle-btn.active { background: var(--accent); color: #fff; }
.tasa-toggle-btn:hover:not(.active) { background: var(--border); }
.modal-lg { max-width: 900px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 20px; }
.modal-actions { display: flex; gap: 12px; justify-content: flex-end; margin-top: 24px; }

/* TOAST */
@keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; } }
.toast-container { position: fixed; top: 14px; left: 0; right: 0; z-index: 2000; display: flex; flex-direction: column; align-items: center; gap: 8px; pointer-events: none; }
.toast { padding: 10px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; box-shadow: 0 4px 16px rgba(0,0,0,0.5); animation: toastIn 0.25s ease; min-width: 200px; max-width: 340px; text-align: center; pointer-events: auto; }
.toast-success { background: var(--success); color: #fff; }
.toast-error { background: var(--danger); color: #fff; }
.toast.out { animation: toastOut 0.3s ease forwards; }

/* BADGES */
.badge { display: inline-flex; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.badge-active { background: var(--success-bg); color: var(--success); }
.badge-liquidado, .badge-inactiva { background: var(--text-muted); color: var(--bg-primary); opacity: 0.6; }
.badge-pendiente { background: var(--warning-bg); color: var(--warning); }
.badge-bolsillo { background: var(--success-bg); color: var(--success); }
.badge-bolsillo_parcial { background: var(--purple-bg); color: var(--purple); }
.badge-clickable { cursor: pointer; transition: filter 0.15s, transform 0.15s; }
.badge-clickable:hover { filter: brightness(1.3); transform: scale(1.05); }
.badge-pagado { background: var(--success-bg); color: var(--success); }
.badge-diferida { background: rgba(56,189,248,0.12); color: #38bdf8; }
.badge-vencido { background: var(--danger-bg); color: var(--danger); }
.badge-intl { background: rgba(20,184,166,0.15); color: #14b8a6; }

/* BAR CHART */
.bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 200px; padding: 10px 0; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
.bar { width: 100%; max-width: 40px; background: var(--accent); border-radius: 4px 4px 0 0; min-height: 2px; transition: height 0.3s; }
.bar-label { font-size: 10px; color: var(--text-muted); }
.bar-value { font-size: 10px; color: var(--text-secondary); font-weight: 600; }

/* PERSONA CARDS */
.persona-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
.persona-card-header { padding: 14px 18px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-subtle); }
.persona-name { font-weight: 700; font-size: 15px; display: flex; align-items: center; gap: 8px; }
.persona-dot { width: 10px; height: 10px; border-radius: 50%; }
.persona-total { font-size: 18px; font-weight: 700; color: var(--accent); }
.persona-card-body { padding: 0; }
.persona-card-body table { font-size: 12px; }
.persona-card-body td, .persona-card-body th { padding: 7px 14px; }

/* SECTIONS */
.section-title { font-size: 16px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; }
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.toolbar-spacer { flex: 1; }

/* THEME TOGGLE */
.theme-toggle { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); padding: 6px 10px; border-radius: 8px; cursor: pointer; font-size: 16px; }
.theme-toggle:hover { border-color: var(--accent); }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* SUMMARY BOX */
.summary-box { background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-top: 16px; }
.summary-row { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid var(--border-subtle); }
.summary-row:last-child { border-bottom: none; }
.summary-label { color: var(--text-secondary); font-size: 13px; }
.summary-value { font-weight: 700; font-size: 13px; }
.summary-value.positive { color: var(--success); }
.summary-value.negative { color: var(--danger); }

/* CONFIG */
.config-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
.config-section { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; }
.config-section-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; }

/* LOADING */
.loading { display: flex; align-items: center; justify-content: center; padding: 60px; color: var(--text-muted); }
.spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--success); border-radius: 50%; animation: spin 0.6s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }

/* RATE FETCH INDICATOR */
.rate-fetch-btn { display: inline-flex; align-items: center; gap: 6px; padding: 4px 12px; border-radius: 6px; border: 1px solid var(--success); background: var(--success-bg); color: var(--success); font-size: 11px; cursor: pointer; font-weight: 600; }
.rate-fetch-btn:hover { background: var(--success); color: #fff; }
.rate-fetch-btn.loading { opacity: 0.6; cursor: wait; }
</style>
</head>

<div id="root"></div>

async function api(path, opts) {

function fmtCOP(n) {
  if (n == null || isNaN(n)) return '$0';
  const abs = Math.abs(Math.round(n));
  const s = abs.toLocaleString('es-CO');
  return (n < 0 ? '-' : '') + '$' + s;
}

// Format number with thousand separators for input display (supports decimals with comma)
function fmtNumInput(val) {
  if (val === '' || val == null) return '';
  const str = String(val);
  // Handle decimal: could be '.' or ','
  const normalized = str.replace(',', '.');
  const parts = normalized.split('.');
  const intPart = parts[0].replace(/[^\d]/g, '');
  if (!intPart && !parts[1]) return '';
  const formatted = intPart ? parseInt(intPart).toLocaleString('es-CO') : '0';
  if (parts.length > 1) return formatted + ',' + parts[1].replace(/[^\d]/g, '');
  return formatted;
}
// Parse formatted string back to raw number string
// MoneyInput component - shows formatted number with thousand separators, supports decimals
function MoneyInput({ value, onChange, className, required, placeholder }) {
  const [display, setDisplay] = useState(fmtNumInput(value));
  const ref = useRef(null);
  useEffect(() => {
    if (document.activeElement !== ref.current) setDisplay(fmtNumInput(value));
  }, [value]);
  function handleChange(ev) {
    const input = ev.target.value;
    // Allow digits, dots (thousands), and one comma (decimal separator)
    const cleaned = input.replace(/[^\d.,]/g, '');
    // Normalize: remove thousand dots, keep comma as decimal
    const noThousands = cleaned.replace(/\./g, '');
    // Only allow one comma
    const commaIdx = noThousands.indexOf(',');
    let intPart, decPart;
    if (commaIdx >= 0) {
      intPart = noThousands.slice(0, commaIdx).replace(/[^\d]/g, '');
      decPart = noThousands.slice(commaIdx + 1).replace(/[^\d]/g, '');
    } else {
      intPart = noThousands.replace(/[^\d]/g, '');
      decPart = null;
    }
    const formatted = intPart ? parseInt(intPart).toLocaleString('es-CO') : (commaIdx >= 0 ? '0' : '');
    const displayVal = decPart !== null ? formatted + ',' + decPart : formatted;
    setDisplay(displayVal);
    // Send raw numeric value (with dot as decimal)
    const raw = decPart !== null ? (intPart || '0') + '.' + decPart : intPart;
    onChange(raw || '');
  }
  return e('input', { ref, type: 'text', inputMode: 'decimal', className: className || 'form-input', value: display, onChange: handleChange, required, placeholder });
}

let toastId = 0;
function ToastContainer() {
  const [toasts, setToasts] = useState([]);
  window.__addToast = (msg, type) => {
    const id = ++toastId;
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.map(x => x.id === id ? { ...x, out: true } : x)), 2200);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 2500);
  };
  return e('div', { className: 'toast-container' },
    toasts.map(t => e('div', { key: t.id, className: 'toast toast-' + t.type + (t.out ? ' out' : '') }, t.msg))
  );
}
function toast(msg, type) { if (window.__addToast) window.__addToast(msg, type || 'success'); }
function toastErr(msg) { toast(msg, 'error'); }

// CONFIRM DIALOG (replaces native confirm())
// ═══════════════════════════════════════════════════════════════════
function ConfirmDialog() {
  const [state, setState] = useState(null);
  window.__showConfirm = (message, opts) => {
    return new Promise(resolve => {
      setState({ message, resolve, opts: opts || {} });
    });
  };
  if (!state) return null;
  function respond(val) { state.resolve(val); setState(null); }
  const isInfo = state.opts.mode === 'info';
  const title = state.opts.title || 'Confirmar';
  const confirmText = state.opts.confirmText || 'Confirmar';
  return e('div', { className: 'modal-overlay', onClick: (ev) => { if (ev.target === ev.currentTarget && !isInfo) respond(false); } },
    e('div', { className: 'modal', style: { maxWidth: 420 } },
      e('div', { className: 'modal-title' }, title),
      e('div', { style: { padding: '16px 0', fontSize: 14, color: 'var(--text-secondary)', whiteSpace: 'pre-line' } }, state.message),
      e('div', { className: 'modal-actions' },
        isInfo
          ? e('button', { className: 'btn btn-primary', onClick: () => respond(true) }, 'Aceptar')
          : [
              e('button', { key: 'c', className: 'btn', onClick: () => respond(false) }, 'Cancelar'),
              e('button', { key: 'k', className: 'btn btn-danger', onClick: () => respond(true) }, confirmText)
            ]
      )
    )
  );
}
async function confirmDialog(msg, opts) { return window.__showConfirm ? window.__showConfirm(msg, opts) : confirm(msg); }
async function infoDialog(msg, title) { return confirmDialog(msg, { mode: 'info', title: title || 'Informacion' }); }

            )
          )
        ),

    // Proximos pagos (fechas)
    dashData && tarjetas.length > 0 && e('div', null,
      e('div', { className: 'section-title', style: { marginTop: 8 } }, e(Ico, { name: 'calendar', size: 20, color: 'var(--accent)' }), ' Proximos Pagos'),
      e('div', { className: 'cards-row' },
        // Extractos vencidos o próximos a vencer (basado en fecha_pago real)
        tarjetas.filter(t => t.estado === 'activa').flatMap(t => {
          const cd = cardDash[t.id];
          if (!cd || !cd.extractosVencidos || !cd.extractosVencidos.length) return [];
          return cd.extractosVencidos.map(ext => {
            const mesLabel = (() => { const [a, m] = ext.ciclo.split('-'); return new Date(a, m - 1).toLocaleDateString('es-CO', { month: 'long' }); })();
            const isVencido = ext.tipo === 'vencido';
            const diasRestantes = ext.fechaPago ? Math.ceil((new Date(ext.fechaPago + 'T00:00:00') - new Date(todayISO() + 'T00:00:00')) / 86400000) : 999;
            const casiVencido = !isVencido && diasRestantes <= 5;
            const color = isVencido ? 'var(--danger)' : casiVencido ? '#FF8C00' : 'var(--warning)';
            const bgColor = isVencido ? 'rgba(239,68,68,0.08)' : casiVencido ? 'rgba(255,140,0,0.08)' : 'var(--warning-bg)';
            const labelFecha = ext.fechaPago ? new Date(ext.fechaPago + 'T00:00:00').toLocaleDateString('es-CO', { day: 'numeric', month: 'short' }) : '';
            return e('div', { key: t.id + '-' + ext.ciclo, className: 'card', style: { cursor: 'pointer', borderLeft: '3px solid ' + color, background: bgColor }, onClick: () => onSelectCard(t.id, 'pagos') },
              e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
                e('div', null,
                  e('div', { style: { fontWeight: 700, fontSize: 14 } }, t.nombre),
                  e('div', { style: { fontSize: 12, color: color, marginTop: 2, fontWeight: 600 } }, 'Extracto de ' + mesLabel + ' sin pagar'),
                  e('div', { style: { fontSize: 13, marginTop: 6 } },
                    e('span', { style: { color: 'var(--text-muted)' } }, 'Falta: '),
                    e('span', { style: { fontWeight: 700, color: color } }, fmtCOP(ext.falta)),
                    ext.pagado > 0 && e('span', { style: { fontSize: 11, color: 'var(--text-muted)', marginLeft: 8 } }, '(pagado: ' + fmtCOP(ext.pagado) + ')')
                  )
                ),
                e('div', { style: { textAlign: 'right' } },
                  e('div', { style: { fontWeight: 700, fontSize: isVencido ? 16 : 13, color: color } }, isVencido ? 'VENCIDO' : 'PRÓXIMO A VENCER'),
                  e('div', { style: { fontSize: 11, color: 'var(--text-muted)' } }, isVencido ? 'Pagar antes de abonar' : 'Límite: ' + labelFecha)
                )
              )
            );
          });
        }),
        // Ciclo actual en curso (próximo corte)
        tarjetas.filter(t => t.estado === 'activa').filter(t => {
          const cd = cardDash[t.id];
          return !cd || cd.pagoMinimo > 0;
        }).map(t => {
          const cd = cardDash[t.id];
          const pMin = cd ? cd.pagoMinimo : 0;
          const diasCorte = cd && cd.proximoCorte ? cd.proximoCorte.diasFaltan : null;
          const fechaCorteLabel = cd && cd.proximoCorte ? fmtDate(cd.proximoCorte.fecha) : '';
          return e('div', { key: t.id, className: 'card', style: { cursor: 'pointer', borderLeft: '3px solid ' + t.color }, onClick: () => onSelectCard(t.id) },
            e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
              e('div', null,
                e('div', { style: { fontWeight: 700, fontSize: 14 } }, t.nombre),
                e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 2 } }, 'Corte: dia ' + (t.dia_corte || '?') + ' de cada mes'),
                pMin > 0 && e('div', { style: { fontSize: 13, marginTop: 6 } },
                  e('span', { style: { color: 'var(--text-muted)' } }, 'Pago minimo: '),
                  e('span', { style: { fontWeight: 700, color: 'var(--warning)' } }, fmtCOP(pMin))
                )
              ),
              e('div', { style: { textAlign: 'right' } },
                diasCorte !== null && e('div', { style: { fontWeight: 700, fontSize: 20, color: diasCorte <= 5 ? 'var(--warning)' : 'var(--accent)' } }, diasCorte + ' dias'),
                e('div', { style: { fontSize: 11, color: 'var(--text-muted)' } }, fechaCorteLabel)
              )
            )
          );
        })
      )
    )
  );
}

// ═══════════════════════════════════════════════════════════════════
// TARJETA FORM
// ═══════════════════════════════════════════════════════════════════
// Defaults irrompibles: si el usuario borra la URL en la configuración o limpia
// el campo de la tarjeta, el sistema vuelve a estos valores. NO mutar en runtime.
const DEFAULT_BANCO_URLS = Object.freeze({
  'Bancolombia': 'https://www.bancolombia.com/personas/tarjetas-de-credito/visa/infinite',
  'Nu':          'https://cdn.nubank.com.br/colombia/tarjeta_credito_tarifas_y_costos.pdf',
  'RappiCard':   'https://rappicard.co/tasas-y-tarifas/',
});
const DEFAULT_BANCO_COLORS = Object.freeze({
  'Bancolombia': '#FFCD00',
  'Nu':          '#820AD1',
  'RappiCard':   '#FF441F',
});

// BANCOS_PRESETS es la lista de trabajo: el usuario puede sobrescribir su URL desde
// la configuración. La defaults canónicas viven en DEFAULT_BANCO_URLS arriba y
// se usan como fallback cuando una URL queda vacía.
const BANCOS_PRESETS = [
  { nombre: 'Bancolombia', url: DEFAULT_BANCO_URLS['Bancolombia'], color: DEFAULT_BANCO_COLORS['Bancolombia'] },
  { nombre: 'Nu',          url: DEFAULT_BANCO_URLS['Nu'],          color: DEFAULT_BANCO_COLORS['Nu'] },
  { nombre: 'RappiCard',   url: DEFAULT_BANCO_URLS['RappiCard'],   color: DEFAULT_BANCO_COLORS['RappiCard'] },
];

// Helper: devuelve la URL efectiva de un banco preset (su URL actual o la default canónica).
function getBancoUrl(nombre) {
  const preset = BANCOS_PRESETS.find(b => b.nombre === nombre);
  if (preset && preset.url) return preset.url;
  return DEFAULT_BANCO_URLS[nombre] || '';
}

function TarjetaForm({ item, onSave, onCancel }) {
  const [nombre, setNombre] = useState(item ? item.nombre : '');
  const [banco, setBanco] = useState(item ? (item.banco || '') : '');
  const [bancoCustom, setBancoCustom] = useState(() => {
    if (!item || !item.banco) return '';
    return BANCOS_PRESETS.find(b => b.nombre === item.banco) ? '' : item.banco;
  });
  const [diaCorte, setDiaCorte] = useState(item ? item.dia_corte : 30);
  const [diaPago, setDiaPago] = useState(item ? (item.dia_pago || 16) : 16);
  const [color, setColor] = useState(item ? item.color : '#4f8cff');
  const [tasaMvAvances, setTasaMvAvances] = useState(item ? (item.tasa_mv_avances * 100).toFixed(4) : '1.9110');
  const [tasaMvDiferidas, setTasaMvDiferidas] = useState(item ? (item.tasa_mv_diferidas * 100).toFixed(4) : '1.8800');
  const [urlTasas, setUrlTasas] = useState(item ? (item.url_tasas || '') : '');
  const [cupoTotal, setCupoTotal] = useState(item ? item.cupo_total : '');
  const [estado, setEstado] = useState(item ? item.estado : 'activa');
  const [notas, setNotas] = useState(item ? (item.notas || '') : '');
  const [franquicia, setFranquicia] = useState(item ? (item.franquicia || '') : '');
  // null = no configurado, 0 = no difiere, 1 = sí difiere (solo Bancolombia)
  const [difiereInteresesCuota1, setDifiereInteresesCuota1] = useState(
    item && (item.difiere_intereses_cuota1 === 0 || item.difiere_intereses_cuota1 === 1)
      ? item.difiere_intereses_cuota1 : null
  );
  const [imagen, setImagen] = useState(item ? (item.imagen || '') : '');
  const [fetchingRates, setFetchingRates] = useState(false);
  const [tasaTipoAvances, setTasaTipoAvances] = useState('mv');
  const [tasaTipoDiferidas, setTasaTipoDiferidas] = useState('mv');
  const [tasaDisplayAvances, setTasaDisplayAvances] = useState(item ? (item.tasa_mv_avances * 100).toFixed(4) : '1.9110');
  const [tasaDisplayDiferidas, setTasaDisplayDiferidas] = useState(item ? (item.tasa_mv_diferidas * 100).toFixed(4) : '1.8800');
  const imgInputRef = useRef(null);

  function eaToMv(ea) { return (Math.pow(1 + ea / 100, 1 / 12) - 1) * 100; }
  function mvToEa(mv) { return (Math.pow(1 + mv / 100, 12) - 1) * 100; }

  function handleTasaAvancesChange(val) {
    setTasaDisplayAvances(val);
    if (tasaTipoAvances === 'ea') {
      const mv = eaToMv(parseFloat(val) || 0);
      setTasaMvAvances(mv.toFixed(4));
    } else {
      setTasaMvAvances(val);
    }
  }
  function handleTasaDiferidasChange(val) {
    setTasaDisplayDiferidas(val);
    if (tasaTipoDiferidas === 'ea') {
      const mv = eaToMv(parseFloat(val) || 0);
      setTasaMvDiferidas(mv.toFixed(4));
    } else {
      setTasaMvDiferidas(val);
    }
  }
  function switchTasaTipoAvances(tipo) {
    const currentMv = parseFloat(tasaMvAvances) || 0;
    setTasaTipoAvances(tipo);
    if (tipo === 'ea') setTasaDisplayAvances(mvToEa(currentMv).toFixed(2));
    else setTasaDisplayAvances(currentMv.toFixed(4));
  }
  function switchTasaTipoDiferidas(tipo) {
    const currentMv = parseFloat(tasaMvDiferidas) || 0;
    setTasaTipoDiferidas(tipo);
    if (tipo === 'ea') setTasaDisplayDiferidas(mvToEa(currentMv).toFixed(2));
    else setTasaDisplayDiferidas(currentMv.toFixed(4));
  }

  function handleBancoChange(val) {
    setBanco(val);
    setBancoCustom('');
    const preset = BANCOS_PRESETS.find(b => b.nombre === val);
    if (preset) {
      // Si el preset perdió la URL (usuario la borró en config), caemos al default
      // canónico. Garantiza que la tarjeta nunca quede sin URL para auto-actualizar tasas.
      const url = preset.url || DEFAULT_BANCO_URLS[val] || '';
      setUrlTasas(url);
      if (!item) setColor(preset.color || DEFAULT_BANCO_COLORS[val] || '#666');
      if (preset.nota) toast(preset.nota, 5000);
    }
  }

  function handleImageUpload(ev) {
    const file = ev.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { toastErr('La imagen debe ser menor a 2MB'); return; }
    const reader = new FileReader();
    reader.onload = (e) => setImagen(e.target.result);
    reader.readAsDataURL(file);
  }

  async function fetchRates() {
    if (!urlTasas) { toastErr('Ingresa una URL de tasas primero'); return; }
    setFetchingRates(true);
    try {
      const result = await api('/scrape-tasas?url=' + encodeURIComponent(urlTasas));
      if (result.ok && result.found && result.rates) {
        if (result.rates.avances_mv) setTasaMvAvances(result.rates.avances_mv.toFixed(4));
        if (result.rates.compras_mv) setTasaMvDiferidas(result.rates.compras_mv.toFixed(4));
        toast('Tasas actualizadas desde la web');
      } else if (result.ok && !result.found) {
        toastErr('No se encontraron tasas en la pagina. Ingresalas manualmente.');
      } else {
        toastErr('Error al consultar: ' + (result.error || 'formato no reconocido'));
      }
    } catch (err) {
      toastErr('Error al consultar: ' + err.message);
    }
    setFetchingRates(false);
  }

  function submit(ev) {
    ev.preventDefault();
    const bancoFinal = banco === '__otro__' ? (bancoCustom || null) : (banco || null);
    const esBanco = bancoFinal && bancoFinal.toLowerCase().includes('bancolombia');
    if (esBanco && difiereInteresesCuota1 !== 0 && difiereInteresesCuota1 !== 1) {
      toastErr('Debes indicar si esta tarjeta difiere los intereses de la cuota 1');
      return;
    }
    onSave({
      nombre, banco: bancoFinal,
      dia_corte: parseInt(diaCorte), dia_pago: parseInt(diaPago), color, imagen: imagen || null,
      tasa_mv_avances: parseFloat(tasaMvAvances) / 100,
      tasa_mv_diferidas: parseFloat(tasaMvDiferidas) / 100,
      url_tasas: urlTasas || null, cupo_total: parseFloat(cupoTotal) || 0,
      estado, notas, franquicia: franquicia || null,
      difiere_intereses_cuota1: esBanco ? difiereInteresesCuota1 : null
    });
  }

  return e('form', { onSubmit: submit },
    // Imagen de la tarjeta
    e('div', { className: 'form-group' },
      e('label', { className: 'form-label' }, 'Imagen de la tarjeta (opcional)'),
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 16 } },
        imagen
          ? e('div', { style: { position: 'relative' } },
              e('img', { src: imagen, style: { width: 180, height: 113, objectFit: 'cover', borderRadius: 10, border: '1px solid var(--border)' } }),
              e('button', { type: 'button', onClick: () => setImagen(''), style: { position: 'absolute', top: -6, right: -6, background: 'var(--danger)', color: '#fff', border: 'none', borderRadius: '50%', width: 22, height: 22, cursor: 'pointer', fontSize: 12, display: 'flex', alignItems: 'center', justifyContent: 'center' } }, '\u{2715}')
            )
          : e('div', { onClick: () => imgInputRef.current && imgInputRef.current.click(), style: { width: 180, height: 113, borderRadius: 10, border: '2px dashed var(--border)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'var(--text-muted)', fontSize: 12, gap: 4, transition: 'all 0.2s' } },
              e('span', { style: { fontSize: 28 } }, '+'),
              'Click para subir imagen'
            ),
        e('input', { ref: imgInputRef, type: 'file', accept: 'image/*', onChange: handleImageUpload, style: { display: 'none' } })
      ),
      e('div', { className: 'form-hint' }, 'Sube una foto o imagen de tu tarjeta (max 2MB)')
    ),

    e('div', { className: 'form-row' },
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Nombre de la tarjeta *'),
        e('input', { type: 'text', className: 'form-input', value: nombre, onChange: ev => setNombre(ev.target.value), required: true, placeholder: 'Ej: Visa Infinite' })
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Banco'),
        (() => {
          const isPreset = BANCOS_PRESETS.find(b => b.nombre === banco);
          const showCustom = !isPreset && banco !== '';
          const selectVal = isPreset ? banco : (showCustom ? '__otro__' : '');
          return e(Fragment, null,
            e('select', { className: 'form-select', value: selectVal, onChange: ev => {
              if (ev.target.value === '__otro__') { setBanco('__otro__'); setBancoCustom(''); }
              else if (ev.target.value === '') { setBanco(''); setBancoCustom(''); setUrlTasas(''); }
              else handleBancoChange(ev.target.value);
            }},
              e('option', { value: '' }, 'Seleccionar...'),
              BANCOS_PRESETS.map(b => e('option', { key: b.nombre, value: b.nombre }, b.nombre)),
              e('option', { value: '__otro__' }, 'Otro')
            ),
            (selectVal === '__otro__' || showCustom) && e('input', { type: 'text', className: 'form-input', value: bancoCustom, onChange: ev => { setBancoCustom(ev.target.value); setBanco(ev.target.value || '__otro__'); }, placeholder: 'Nombre del banco', style: { marginTop: 8 } })
          );
        })()
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Cupo Total'),
        e(MoneyInput, { value: cupoTotal, onChange: val => setCupoTotal(val), placeholder: '0' })
      )
    ),
    banco === 'Bancolombia' && e(Fragment, null,
      e('div', { className: 'form-row' },
        e('div', { className: 'form-group' },
          e('label', { className: 'form-label' }, 'Franquicia'),
          e('select', { className: 'form-select', value: franquicia, onChange: ev => setFranquicia(ev.target.value) },
            e('option', { value: '' }, 'Seleccionar franquicia...'),
            e('option', { value: 'Visa' }, 'Visa'),
            e('option', { value: 'Mastercard' }, 'Mastercard'),
            e('option', { value: 'American Express' }, 'American Express')
          ),
          e('div', { className: 'form-hint' }, 'Cada franquicia maneja las compras internacionales de forma diferente')
        )
      ),
      // Difiere intereses cuota 1 → cuota 2 (varía por modelo de tarjeta Bancolombia)
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, '¿Esta tarjeta difiere los intereses de la primera cuota? *'),
        e('div', { style: { display: 'flex', flexDirection: 'column', gap: 8, marginTop: 4 } },
          e('label', { style: { display: 'flex', alignItems: 'flex-start', gap: 8, padding: '10px 12px', borderRadius: 8, border: '1px solid var(--border)', cursor: 'pointer', background: difiereInteresesCuota1 === 1 ? 'var(--bg-tertiary)' : 'transparent' } },
            e('input', { type: 'radio', name: 'difiereInteresesCuota1', checked: difiereInteresesCuota1 === 1, onChange: () => setDifiereInteresesCuota1(1), style: { marginTop: 2 } }),
            e('div', null,
              e('div', { style: { fontWeight: 600 } }, 'Sí, difiere'),
              e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 2 } }, 'La cuota 1 acumula intereses; la cuota 2 cobra (interés_1 + interés_2). Cuotas 3+ normales.')
            )
          ),
          e('label', { style: { display: 'flex', alignItems: 'flex-start', gap: 8, padding: '10px 12px', borderRadius: 8, border: '1px solid var(--border)', cursor: 'pointer', background: difiereInteresesCuota1 === 0 ? 'var(--bg-tertiary)' : 'transparent' } },
            e('input', { type: 'radio', name: 'difiereInteresesCuota1', checked: difiereInteresesCuota1 === 0, onChange: () => setDifiereInteresesCuota1(0), style: { marginTop: 2 } }),
            e('div', null,
              e('div', { style: { fontWeight: 600 } }, 'No, cobra desde cuota 1'),
              e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 2 } }, 'Cada cuota cobra su propio interés desde la primera (comportamiento estándar).')
            )
          )
        ),
        e('div', { className: 'form-hint', style: { marginTop: 6 } }, 'Verificá esta info en la página oficial de tu tarjeta Bancolombia.')
      )
    ),
    e('div', { className: 'form-row' },
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Dia de Corte'),
        e('input', { type: 'number', className: 'form-input', value: diaCorte, onChange: ev => setDiaCorte(ev.target.value), min: 1, max: 31 })
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Dia de Pago'),
        e('input', { type: 'number', className: 'form-input', value: diaPago, onChange: ev => setDiaPago(ev.target.value), min: 1, max: 31 })
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Color'),
        e('input', { type: 'color', className: 'form-input', value: color, onChange: ev => setColor(ev.target.value), style: { height: 40, padding: 4 } })
      )
    ),

    // URL de tasas
    e('div', { className: 'form-group' },
      e('label', { className: 'form-label' }, 'URL para consultar tasas (opcional)'),
      e('div', { style: { display: 'flex', gap: 8 } },
        e('input', { type: 'url', className: 'form-input', value: urlTasas, onChange: ev => setUrlTasas(ev.target.value), placeholder: 'https://www.bancolombia.com/personas/tarjetas-de-credito/...' }),
        e('button', { type: 'button', className: 'rate-fetch-btn' + (fetchingRates ? ' loading' : ''), onClick: fetchRates, disabled: fetchingRates },
          fetchingRates ? '\u{23F3} Consultando...' : 'Consultar Tasas'
        )
      ),
      e('div', { className: 'form-hint' }, 'Si configuras la URL, podras actualizar las tasas automaticamente desde la web del banco')
    ),

    e('div', { style: { background: 'var(--bg-main)', border: '1px solid var(--border)', borderRadius: 10, padding: '10px 14px', marginBottom: 16, fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.5 } },
      '\u{26A0}\u{FE0F} Siempre verifica las tasas de manera manual en la pagina web o app movil de tu banco. Este programa consulta fuentes publicas pero no garantiza exactitud al 100%.'
    ),

    e('div', { className: 'form-row' },
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Tasa Avances (%)'),
        e('div', { style: { display: 'flex', gap: 6 } },
          e('input', { type: 'number', step: tasaTipoAvances === 'ea' ? '0.01' : '0.0001', className: 'form-input', value: tasaDisplayAvances, onChange: ev => handleTasaAvancesChange(ev.target.value), style: { flex: 1 } }),
          e('div', { className: 'tasa-toggle' },
            e('button', { type: 'button', className: 'tasa-toggle-btn' + (tasaTipoAvances === 'mv' ? ' active' : ''), onClick: () => switchTasaTipoAvances('mv') }, 'MV'),
            e('button', { type: 'button', className: 'tasa-toggle-btn' + (tasaTipoAvances === 'ea' ? ' active' : ''), onClick: () => switchTasaTipoAvances('ea') }, 'EA')
          )
        ),
        tasaTipoAvances === 'ea' && e('div', { className: 'form-hint' }, 'MV: ' + (parseFloat(tasaMvAvances) || 0).toFixed(4) + '%')
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Tasa Diferidas (%)'),
        e('div', { style: { display: 'flex', gap: 6 } },
          e('input', { type: 'number', step: tasaTipoDiferidas === 'ea' ? '0.01' : '0.0001', className: 'form-input', value: tasaDisplayDiferidas, onChange: ev => handleTasaDiferidasChange(ev.target.value), style: { flex: 1 } }),
          e('div', { className: 'tasa-toggle' },
            e('button', { type: 'button', className: 'tasa-toggle-btn' + (tasaTipoDiferidas === 'mv' ? ' active' : ''), onClick: () => switchTasaTipoDiferidas('mv') }, 'MV'),
            e('button', { type: 'button', className: 'tasa-toggle-btn' + (tasaTipoDiferidas === 'ea' ? ' active' : ''), onClick: () => switchTasaTipoDiferidas('ea') }, 'EA')
          )
        ),
        tasaTipoDiferidas === 'ea' && e('div', { className: 'form-hint' }, 'MV: ' + (parseFloat(tasaMvDiferidas) || 0).toFixed(4) + '%')
      ),
      item && e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Estado'),
        e('select', { className: 'form-select', value: estado, onChange: ev => setEstado(ev.target.value) },
          e('option', { value: 'activa' }, 'Activa'),
          e('option', { value: 'inactiva' }, 'Inactiva')
        )
      )
    ),
    e('div', { className: 'form-group' },
      e('label', { className: 'form-label' }, 'Notas'),
      e('input', { type: 'text', className: 'form-input', value: notas, onChange: ev => setNotas(ev.target.value) })
    ),
    e('div', { className: 'modal-actions' },
      e('button', { type: 'button', className: 'btn', onClick: onCancel }, 'Cancelar'),
      e('button', { type: 'submit', className: 'btn btn-primary' }, 'Guardar')
    )
  );
}

// ═══════════════════════════════════════════════════════════════════
// CARD VIEW — Resumen per card
// ═══════════════════════════════════════════════════════════════════
function CardResumen({ tarjeta, onDataChange }) {
  const [data, setData] = useState(null);
  const [compras, setCompras] = useState([]);
  const [personas, setPersonas] = useState([]);
  const [resumen, setResumen] = useState(null);
  const [ciclo, setCiclo] = useState(cicloActual());
  const [avances, setAvances] = useState([]);
  const [diferidas, setDiferidas] = useState([]);
  const [selectedAvance, setSelectedAvance] = useState(null);
  const [avanceDetail, setAvanceDetail] = useState(null);
  const [selectedDiferida, setSelectedDiferida] = useState(null);
  const [diferidaDetail, setDiferidaDetail] = useState(null);
  const [showMovModal, setShowMovModal] = useState(false);
  const [editCompra, setEditCompra] = useState(null);
  const [showCompraModal, setShowCompraModal] = useState(false);
  const [showAvanceModal, setShowAvanceModal] = useState(false);
  const [editAvance, setEditAvance] = useState(null);
  const [showDiferidaModal, setShowDiferidaModal] = useState(false);
  const [editDiferida, setEditDiferida] = useState(null);
  const [showAbonoModal, setShowAbonoModal] = useState(false);
  const [movType, setMovType] = useState('compra');
  const [showAbonoCapitalModal, setShowAbonoCapitalModal] = useState(false);
  const [abonoCapitalMonto, setAbonoCapitalMonto] = useState('');
  const [abonoCapitalFecha, setAbonoCapitalFecha] = useState(todayISO());
  const [abonoCapitalResult, setAbonoCapitalResult] = useState(null);
  const [abonoCapitalPreview, setAbonoCapitalPreview] = useState(null);
  const [abonoCapitalSaving, setAbonoCapitalSaving] = useState(false);
  const [showBolsilloModal, setShowBolsilloModal] = useState(false);
  const [bolsilloCompra, setBolsilloCompra] = useState(null);
  const [bolsilloMonto, setBolsilloMonto] = useState('');

  useEffect(() => { api('/dashboard?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setData); }, [tarjeta.id, ciclo]);

  const loadCompras = useCallback(() => {
    api('/compras?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setCompras);
    api('/compras/resumen?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setResumen);
    api('/personas').then(setPersonas);
  }, [ciclo, tarjeta.id]);
  const loadAvances = useCallback(() => { api('/avances?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setAvances); }, [tarjeta.id, ciclo]);
  const loadDiferidas = useCallback(() => { api('/diferidas?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setDiferidas); }, [tarjeta.id, ciclo]);

  useEffect(() => { loadCompras(); }, [loadCompras]);
  useEffect(() => { loadAvances(); }, [loadAvances]);
  useEffect(() => { loadDiferidas(); }, [loadDiferidas]);
  function refreshAll() { loadCompras(); loadAvances(); loadDiferidas(); api('/dashboard?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setData); if (onDataChange) onDataChange(); }

  function saveCompra(compraData) {
    // Split purchase: array de nuevas compras
    if (Array.isArray(compraData)) {
      // Si la edición convierte una compra individual existente en dividida,
      // borramos la original primero para evitar duplicados (Delete & Recreate).
      const replaceId = compraData._replaceItemId;
      const prep = replaceId
        ? api('/compras/' + replaceId, { method: 'DELETE' })
        : Promise.resolve();
      prep.then(() => Promise.all(compraData.map(d => {
        d.tarjeta_id = tarjeta.id;
        return api('/compras', { method: 'POST', body: d });
      }))).then(() => {
        setShowCompraModal(false); setShowMovModal(false); refreshAll();
        toast(replaceId ? 'Compra convertida en dividida' : compraData.length + ' compras registradas');
      });
      return;
    }
    // Edición de grupo existente
    if (compraData._editGrupo) {
      handleEditGrupo(compraData).then(() => { setShowCompraModal(false); refreshAll(); toast('Compra dividida actualizada'); });
      return;
    }
    compraData.tarjeta_id = tarjeta.id;
    const method = editCompra ? 'PUT' : 'POST';
    const url = editCompra ? '/compras/' + editCompra.id : '/compras';
    api(url, { method, body: compraData }).then(() => { setShowCompraModal(false); setShowMovModal(false); refreshAll(); toast('Compra guardada'); });
  }
  async function handleEditGrupo({ _grupoId, _partesOriginales, fecha, descripcion, valor_usd, tasa_usd, es_internacional, splits, remainder }) {
    // Construir lista completa de nuevas partes: personas asignadas + parte personal
    const nuevasPartes = [
      ...splits.map(sp => ({ persona_id: parseInt(sp.persona_id), valor_cop: Math.round(parseFloat(sp.monto) || 0) })),
      ...(remainder > 0 ? [{ persona_id: null, valor_cop: remainder }] : [])
    ].filter(np => np.valor_cop > 0);
    // Índice de originales por persona_id ('personal' para la parte sin persona)
    const originalesByPersona = {};
    _partesOriginales.forEach(p => { originalesByPersona[p.persona_id != null ? p.persona_id : 'personal'] = p; });
    const intlFlag = es_internacional ? 1 : 0;
    const ops = [];
    const idsVisitados = new Set();
    for (const np of nuevasPartes) {
      const key = np.persona_id != null ? np.persona_id : 'personal';
      const orig = originalesByPersona[key];
      if (orig) {
        idsVisitados.add(orig.id);
        ops.push(api('/compras/' + orig.id, { method: 'PUT', body: {
          tarjeta_id: tarjeta.id, fecha, descripcion,
          valor_cop: np.valor_cop,
          valor_usd: valor_usd || null, tasa_usd: tasa_usd || null,
          persona_id: orig.persona_id, estado: orig.estado, notas: orig.notas,
          es_internacional: intlFlag
        }}));
      } else {
        // Nueva persona agregada al grupo
        ops.push(api('/compras', { method: 'POST', body: {
          tarjeta_id: tarjeta.id, fecha, descripcion,
          valor_cop: np.valor_cop,
          valor_usd: valor_usd || null, tasa_usd: tasa_usd || null,
          persona_id: np.persona_id, estado: 'pendiente', grupo_id: _grupoId,
          es_internacional: intlFlag
        }}));
      }
    }
    // Eliminar partes que ya no están
    for (const p of _partesOriginales) {
      if (!idsVisitados.has(p.id)) ops.push(api('/compras/' + p.id, { method: 'DELETE' }));
    }
    await Promise.all(ops);
  }
  function editGrupo(grupoItem) {
    // Todas las partes de un grupo comparten el mismo flag es_internacional
    // (se asigna a partir del checkbox del form). Tomamos el de la primera parte.
    const esInternacionalGrupo = grupoItem.partes.length > 0 && !!grupoItem.partes[0].es_internacional;
    setEditCompra({
      _isGrupo: true,
      _grupoId: grupoItem.grupo_id,
      _partes: grupoItem.partes,
      fecha: grupoItem.fecha,
      descripcion: grupoItem.descripcion,
      valor_usd: grupoItem.valor_usd || null,
      tasa_usd: grupoItem.tasa_usd || null,
      valor_cop: grupoItem.partes.reduce((s, p) => s + p.valor_cop, 0),
      esDiferida: grupoItem.esDiferida,
      es_internacional: esInternacionalGrupo ? 1 : 0,
    });
    setShowCompraModal(true);
  }
  async function removeGrupo(partes) {
    if (!await confirmDialog('Eliminar toda la compra dividida (' + partes.length + ' parte' + (partes.length > 1 ? 's' : '') + ')?', { confirmText: 'Eliminar' })) return;
    await Promise.all(partes.map(p => api('/compras/' + p.id, { method: 'DELETE' })));
    refreshAll();
    toast('Compra eliminada');
  }
  function openBolsilloModal(compra) {
    const mb = compra.monto_bolsillo || 0;
    const target = compra._bolsilloTarget || compra.valor_cop;
    const isPartial = mb > 0 && mb < target;
    setBolsilloCompra(compra);
    setBolsilloMonto(isPartial ? '' : String(mb || ''));
    setShowBolsilloModal(true);
  }
  function openBolsilloAvanceModal(av, opts) {
    opts = opts || {};
    // Per-cuota: el bolsillo se identifica por cuota_num del ciclo navegado.
    // El target (meta) es la cuota proyectada de ESE mes específico.
    const cuotaNum = opts.cuota_num != null ? opts.cuota_num : 1;
    const target = opts.target != null ? opts.target : (av.cuotaCorte || 0);
    const mb = (av.bolsillo_por_cuota && av.bolsillo_por_cuota[cuotaNum]) || 0;
    const isPartial = mb > 0 && mb < target;
    setBolsilloCompra({
      _isAvance: true,
      id: av.id,
      descripcion: av.etiqueta,
      estado: 'avance',
      valor_cop: target,
      cuotaCorte: target,
      monto_bolsillo: mb,
      cuota_num: cuotaNum,
      cuotas_total: av.plazo
    });
    setBolsilloMonto(isPartial ? '' : String(mb || ''));
    setShowBolsilloModal(true);
  }
  function openBolsilloDiferidaModal(d) {
    const mb = d.monto_bolsillo || 0;
    const target = d.cuotaCorte || 0;
    const isPartial = mb > 0 && mb < target;
    setBolsilloCompra({
      _isDiferida: true,
      id: d.id,
      descripcion: d.etiqueta + (d.es_de_tercero ? ' (' + d.persona_nombre + ')' : ''),
      estado: 'diferida',
      valor_cop: target,
      cuotaCorte: target,
      monto_bolsillo: mb
    });
    setBolsilloMonto(isPartial ? '' : String(mb || ''));
    setShowBolsilloModal(true);
  }
  function saveBolsillo() {
    if (!bolsilloCompra) return;
    const _mb = bolsilloCompra.monto_bolsillo || 0;
    const _isAv = !!bolsilloCompra._isAvance;
    const _isDif = bolsilloCompra.estado === 'diferida' || !!bolsilloCompra._isDiferida;
    const _target = bolsilloCompra._bolsilloTarget || ((_isAv || _isDif) ? (bolsilloCompra.cuotaCorte || bolsilloCompra.valor_cop) : bolsilloCompra.valor_cop);
    const _isAgregar = (_isAv || _isDif) && _mb > 0 && _mb < _target;
    let monto;
    if (_isAgregar) {
      const adicional = parseFloat(bolsilloMonto) || 0;
      monto = _mb + adicional;
    } else {
      monto = parseFloat(bolsilloMonto) || 0;
    }
    if (monto < 0) return;
    const url = bolsilloCompra._isAvance
      ? '/avances/' + bolsilloCompra.id + '/bolsillo'
      : bolsilloCompra._isDiferida
        ? '/diferidas/' + bolsilloCompra.id + '/bolsillo'
        : '/compras/' + bolsilloCompra.id + '/bolsillo';
    const body = { monto_bolsillo: monto };
    // Per-cuota: enviar cuota_num para diferidas y avances (compras 1-cuota usan global)
    if (bolsilloCompra.cuota_num && (_isDif || _isAv)) body.cuota_num = bolsilloCompra.cuota_num;
    api(url, { method: 'PUT', body })
      .then(() => { setShowBolsilloModal(false); refreshAll(); toast('Bolsillo actualizado'); });
  }
  async function removeCompra(id) {
    if (!await confirmDialog('Eliminar esta compra?', { confirmText: 'Eliminar' })) return;
    api('/compras/' + id, { method: 'DELETE' }).then(() => { refreshAll(); toast('Compra eliminada'); });
  }
  function saveAvance(data) {
    data.tarjeta_id = tarjeta.id; data.dia_corte = tarjeta.dia_corte;
    const method = editAvance ? 'PUT' : 'POST';
    const url = editAvance ? '/avances/' + editAvance.id : '/avances';
    api(url, { method, body: data }).then(() => { setShowAvanceModal(false); setShowMovModal(false); refreshAll(); if (selectedAvance) loadAvanceDetail(selectedAvance); toast('Avance guardado'); });
  }
  async function removeAvance(id) {
    if (!await confirmDialog('Eliminar este avance y todos sus abonos?', { confirmText: 'Eliminar' })) return;
    api('/avances/' + id, { method: 'DELETE' }).then(() => { refreshAll(); setSelectedAvance(null); setAvanceDetail(null); toast('Avance eliminado'); });
  }
  function saveDiferida(data) {
    data.tarjeta_id = tarjeta.id;
    const method = editDiferida ? 'PUT' : 'POST';
    const url = editDiferida ? '/diferidas/' + editDiferida.id : '/diferidas';
    api(url, { method, body: data }).then(() => { setShowDiferidaModal(false); setShowMovModal(false); refreshAll(); if (selectedDiferida) loadDiferidaDetail(selectedDiferida); toast('Diferida guardada'); });
  }
  async function removeDiferida(id) {
    if (!await confirmDialog('Eliminar esta diferida?', { confirmText: 'Eliminar' })) return;
    api('/diferidas/' + id, { method: 'DELETE' }).then(() => { refreshAll(); setSelectedDiferida(null); setDiferidaDetail(null); toast('Diferida eliminada'); });
  }
  function loadAvanceDetail(id) {
    if (selectedAvance === id) { setSelectedAvance(null); setAvanceDetail(null); return; }
    setSelectedAvance(id); api('/avances/' + id).then(setAvanceDetail);
  }
  function loadDiferidaDetail(id) {
    if (selectedDiferida === id) { setSelectedDiferida(null); setDiferidaDetail(null); return; }
    setSelectedDiferida(id); api('/diferidas/' + id).then(setDiferidaDetail);
  }
  function saveAbono(data) {
    api('/avances/' + selectedAvance + '/abonos', { method: 'POST', body: data }).then(() => { setShowAbonoModal(false); loadAvanceDetail(selectedAvance); refreshAll(); toast('Abono registrado'); });
  }
  async function removeAbono(id) {
    if (!await confirmDialog('Eliminar este abono?', { confirmText: 'Eliminar' })) return;
    api('/abonos/' + id, { method: 'DELETE' }).then(() => { loadAvanceDetail(selectedAvance); refreshAll(); toast('Abono eliminado'); });
  }

  async function fetchAbonoPreview(ev) {
    ev.preventDefault();
    setAbonoCapitalSaving(true);
    const params = new URLSearchParams({ tarjeta_id: tarjeta.id, monto: parseFloat(abonoCapitalMonto), fecha: abonoCapitalFecha });
    const result = await api('/abono-capital/preview?' + params);
    setAbonoCapitalSaving(false);
    if (result.error) { infoDialog(result.error, 'No se puede abonar'); return; }
    setAbonoCapitalPreview(result);
  }
  async function submitAbonoCapital() {
    setAbonoCapitalSaving(true);
    const result = await api('/abono-capital', { method: 'POST', body: { tarjeta_id: tarjeta.id, monto: parseFloat(abonoCapitalMonto), fecha: abonoCapitalFecha } });
    setAbonoCapitalSaving(false);
    if (result.error) { infoDialog(result.error, 'No se puede abonar'); return; }
    setAbonoCapitalPreview(null);
    setAbonoCapitalResult(result);
    refreshAll();
    toast('Abono a capital aplicado');
  }
  function closeAbonoCapital() { setShowAbonoCapitalModal(false); setAbonoCapitalResult(null); setAbonoCapitalPreview(null); setAbonoCapitalMonto(''); }

  if (!data) return e('div', { className: 'loading' }, 'Cargando...');

  const cupoUsado = tarjeta.cupo_total > 0 ? (data.deudaTotal / tarjeta.cupo_total * 100).toFixed(1) : null;
  const hoy = todayISO();

  // Group split compras by grupo_id, singles stay individual
  const purchaseRows = (() => {
    const grupos = {};
    const singles = [];
    compras.forEach(c => {
      if (c.grupo_id) {
        if (!grupos[c.grupo_id]) grupos[c.grupo_id] = [];
        grupos[c.grupo_id].push(c);
      } else {
        singles.push({ tipo: 'single', data: c });
      }
    });
    const result = [...singles];
    Object.entries(grupos).forEach(([gid, items]) => {
      const esDiferida = items[0].estado === 'diferida' && items[0].cuotaCorte !== undefined;
      const total = esDiferida
        ? items.reduce((s, c) => s + (c.cuotaCorte || 0), 0)
        : items.reduce((s, c) => s + c.valor_cop, 0);
      result.push({
        tipo: 'grupo',
        grupo_id: gid,
        fecha: items[0].fecha,
        descripcion: items[0].descripcion,
        estado: items[0].estado,
        valor_usd: items[0].valor_usd,
        tasa_usd: items[0].tasa_usd,
        esDiferida,
        cuota_num: esDiferida ? items[0].cuota_num : null,
        cuotas_total: esDiferida ? items[0].cuotas_total : null,
        total,
        partes: items.sort((a, b) => (a.persona_id ? 1 : 0) - (b.persona_id ? 1 : 0))
      });
    });
    result.sort((a, b) => {
      const fa = a.tipo === 'grupo' ? a.fecha : a.data.fecha;
      const fb = b.tipo === 'grupo' ? b.fecha : b.data.fecha;
      return fb.localeCompare(fa);
    });
    return result;
  })();

  return e('div', null,
    // ──── Fila 1: Info general de la tarjeta ────
    e('div', { className: 'cards-row' },
      e('div', { className: 'card card-danger' },
        e('div', { className: 'card-label' }, 'Deuda Total'),
        e('div', { className: 'card-value' }, fmtCOP(data.deudaTotal)),
        e('div', { style: { display: 'flex', gap: 14, marginTop: 6, flexWrap: 'wrap' } },
          e('div', null,
            e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.4 } }, 'Avances'),
            e('div', { style: { fontSize: 12, color: 'var(--text-primary)', fontWeight: 600, fontFamily: 'monospace' } }, fmtCOP(data.deudaAvances))
          ),
          e('div', null,
            e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.4 } }, 'Diferidas'),
            e('div', { style: { fontSize: 12, color: 'var(--text-primary)', fontWeight: 600, fontFamily: 'monospace' } }, fmtCOP(data.deudaDiferidas))
          ),
          e('div', null,
            e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.4 } }, 'Compras'),
            e('div', { style: { fontSize: 12, color: 'var(--text-primary)', fontWeight: 600, fontFamily: 'monospace' } }, fmtCOP(data.comprasTotalPendientes || data.comprasCiclo))
          ),
          // Para tarjetas con extracto dual (Mastercard/Amex Bancolombia): mini-columna USD aparte
          data.dualExtracto && data.deudaUsd > 0 && e('div', null,
            e('div', { style: { fontSize: 10, color: '#4FC3F7', textTransform: 'uppercase', letterSpacing: 0.4 } }, 'Deuda USD'),
            e('div', { style: { fontSize: 12, color: '#4FC3F7', fontWeight: 700, fontFamily: 'monospace' } }, 'USD $' + new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(data.deudaUsd))
          )
        )
      ),
      cupoUsado && e('div', { className: 'card card-accent' },
        e('div', { className: 'card-label' }, 'Cupo Usado'),
        e('div', { className: 'card-value' }, cupoUsado + '%'),
        e('div', { className: 'card-sub' }, fmtCOP(data.deudaTotal) + ' de ' + fmtCOP(tarjeta.cupo_total))
      ),
      e('div', { className: 'card card-warning' },
        e('div', { className: 'card-label' }, 'Proximo Corte'),
        e('div', { className: 'card-value' }, fmtDate(data.proximoCorte.fecha)),
        e('div', { className: 'card-sub' }, 'Faltan ' + data.proximoCorte.diasFaltan + ' dias')
      ),
      data.fechaPago && e('div', { className: 'card', style: { borderColor: data.fechaPago.diasFaltan <= 5 ? 'var(--danger)' : 'var(--border)' } },
        e('div', { className: 'card-label' }, 'Fecha Limite de Pago'),
        e('div', { className: 'card-value', style: { color: data.fechaPago.diasFaltan <= 5 ? 'var(--danger)' : 'var(--text-primary)' } }, fmtDate(data.fechaPago.fecha)),
        e('div', { className: 'card-sub' }, data.fechaPago.diasFaltan <= 0 ? 'VENCIDO' : 'Faltan ' + data.fechaPago.diasFaltan + ' dias')
      ),
      e('div', { className: 'card' },
        e('div', { className: 'card-label' }, 'Tasas MV'),
        e('div', { style: { display: 'flex', gap: 14, marginTop: 4 } },
          e('div', null,
            e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.4 } }, 'Avances'),
            e('div', { style: { fontSize: 15, color: 'var(--text-primary)', fontWeight: 700, fontFamily: 'monospace' } }, (tarjeta.tasa_mv_avances * 100).toFixed(4) + '%')
          ),
          e('div', null,
            e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.4 } }, 'Diferidas'),
            e('div', { style: { fontSize: 15, color: 'var(--text-primary)', fontWeight: 700, fontFamily: 'monospace' } }, (tarjeta.tasa_mv_diferidas * 100).toFixed(4) + '%')
          )
        ),
        e('div', { className: 'card-sub' }, 'Dia de corte: ' + tarjeta.dia_corte)
      ),
      // Me Deben (total histórico de la tarjeta — viejas y nuevas)
      e('div', { className: 'card card-success' },
        e('div', { className: 'card-label' }, 'Me Deben'),
        e('div', { className: 'card-value' }, fmtCOP(data.meDeben.total)),
        data.meDeben.detalle.length > 0
          ? e('div', { style: { display: 'flex', gap: 14, marginTop: 6, flexWrap: 'wrap' } },
              data.meDeben.detalle.map(d => e('div', { key: d.nombre },
                e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.4 } }, d.nombre),
                e('div', { style: { fontSize: 12, color: 'var(--text-primary)', fontWeight: 600, fontFamily: 'monospace' } }, fmtCOP(d.total))
              ))
            )
          : e('div', { className: 'card-sub' }, 'Sin deudas')
      )
    ),

    // ──── Divisor: Datos del corte ────
    e('div', { style: { borderTop: '1px solid var(--border)', margin: '20px 0 16px', paddingTop: 16 } },
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 } },
