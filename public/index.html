// TARJETA FORM
// ═══════════════════════════════════════════════════════════════════
// Defaults irrompibles: si el usuario borra la URL en la configuración o limpia
// el campo de la tarjeta, el sistema vuelve a estos valores. NO mutar en runtime.
const DEFAULT_BANCO_URLS = Object.freeze({
  'Bancolombia': 'https://www.bancolombia.com/personas/tarjetas-de-credito/visa/infinite',
  'Nu':          'https://cdn.nubank.com.br/colombia/tarjeta_credito_tarifas_y_costos.pdf',
  'RappiCard':   'https://rappicard.co/tasas-y-tarifas/',
});
const DEFAULT_BANCO_COLORS = Object.freeze({
  'Bancolombia': '#FFCD00',
  'Nu':          '#820AD1',
  'RappiCard':   '#FF441F',
});

// BANCOS_PRESETS es la lista de trabajo: el usuario puede sobrescribir su URL desde
// la configuración. La defaults canónicas viven en DEFAULT_BANCO_URLS arriba y
// se usan como fallback cuando una URL queda vacía.
const BANCOS_PRESETS = [
  { nombre: 'Bancolombia', url: DEFAULT_BANCO_URLS['Bancolombia'], color: DEFAULT_BANCO_COLORS['Bancolombia'] },
  { nombre: 'Nu',          url: DEFAULT_BANCO_URLS['Nu'],          color: DEFAULT_BANCO_COLORS['Nu'] },
  { nombre: 'RappiCard',   url: DEFAULT_BANCO_URLS['RappiCard'],   color: DEFAULT_BANCO_COLORS['RappiCard'] },
];

// Helper: devuelve la URL efectiva de un banco preset (su URL actual o la default canónica).
function getBancoUrl(nombre) {
  const preset = BANCOS_PRESETS.find(b => b.nombre === nombre);
  if (preset && preset.url) return preset.url;
  return DEFAULT_BANCO_URLS[nombre] || '';
}

function TarjetaForm({ item, onSave, onCancel }) {
  const [nombre, setNombre] = useState(item ? item.nombre : '');
  const [banco, setBanco] = useState(item ? (item.banco || '') : '');
  const [bancoCustom, setBancoCustom] = useState(() => {
    if (!item || !item.banco) return '';
    return BANCOS_PRESETS.find(b => b.nombre === item.banco) ? '' : item.banco;
  });
  const [diaCorte, setDiaCorte] = useState(item ? item.dia_corte : 30);
  const [diaPago, setDiaPago] = useState(item ? (item.dia_pago || 16) : 16);
  const [color, setColor] = useState(item ? item.color : '#4f8cff');
  const [tasaMvAvances, setTasaMvAvances] = useState(item ? (item.tasa_mv_avances * 100).toFixed(4) : '1.9110');
  const [tasaMvDiferidas, setTasaMvDiferidas] = useState(item ? (item.tasa_mv_diferidas * 100).toFixed(4) : '1.8800');
  const [urlTasas, setUrlTasas] = useState(item ? (item.url_tasas || '') : '');
  const [cupoTotal, setCupoTotal] = useState(item ? item.cupo_total : '');
  const [estado, setEstado] = useState(item ? item.estado : 'activa');
  const [notas, setNotas] = useState(item ? (item.notas || '') : '');
  const [franquicia, setFranquicia] = useState(item ? (item.franquicia || '') : '');
  // null = no configurado, 0 = no difiere, 1 = sí difiere (solo Bancolombia)
  const [difiereInteresesCuota1, setDifiereInteresesCuota1] = useState(
    item && (item.difiere_intereses_cuota1 === 0 || item.difiere_intereses_cuota1 === 1)
      ? item.difiere_intereses_cuota1 : null
  );
  const [imagen, setImagen] = useState(item ? (item.imagen || '') : '');
  // Orden manual de la tarjeta en listados — null = sin orden, cae al final por created_at.
  const [orden, setOrden] = useState(item && item.orden != null ? String(item.orden) : '');
  const [fetchingRates, setFetchingRates] = useState(false);
  const [tasaTipoAvances, setTasaTipoAvances] = useState('mv');
  const [tasaTipoDiferidas, setTasaTipoDiferidas] = useState('mv');
  const [tasaDisplayAvances, setTasaDisplayAvances] = useState(item ? (item.tasa_mv_avances * 100).toFixed(4) : '1.9110');
  const [tasaDisplayDiferidas, setTasaDisplayDiferidas] = useState(item ? (item.tasa_mv_diferidas * 100).toFixed(4) : '1.8800');
  const imgInputRef = useRef(null);

  function eaToMv(ea) { return (Math.pow(1 + ea / 100, 1 / 12) - 1) * 100; }
  function mvToEa(mv) { return (Math.pow(1 + mv / 100, 12) - 1) * 100; }

  function handleTasaAvancesChange(val) {
    setTasaDisplayAvances(val);
    if (tasaTipoAvances === 'ea') {
      const mv = eaToMv(parseFloat(val) || 0);
      setTasaMvAvances(mv.toFixed(4));
    } else {
      setTasaMvAvances(val);
    }
  }
  function handleTasaDiferidasChange(val) {
    setTasaDisplayDiferidas(val);
    if (tasaTipoDiferidas === 'ea') {
      const mv = eaToMv(parseFloat(val) || 0);
      setTasaMvDiferidas(mv.toFixed(4));
    } else {
      setTasaMvDiferidas(val);
    }
  }
  function switchTasaTipoAvances(tipo) {
    const currentMv = parseFloat(tasaMvAvances) || 0;
    setTasaTipoAvances(tipo);
    if (tipo === 'ea') setTasaDisplayAvances(mvToEa(currentMv).toFixed(2));
    else setTasaDisplayAvances(currentMv.toFixed(4));
  }
  function switchTasaTipoDiferidas(tipo) {
    const currentMv = parseFloat(tasaMvDiferidas) || 0;
    setTasaTipoDiferidas(tipo);
    if (tipo === 'ea') setTasaDisplayDiferidas(mvToEa(currentMv).toFixed(2));
    else setTasaDisplayDiferidas(currentMv.toFixed(4));
  }

  function handleBancoChange(val) {
    setBanco(val);
    setBancoCustom('');
    const preset = BANCOS_PRESETS.find(b => b.nombre === val);
    if (preset) {
      // Si el preset perdió la URL (usuario la borró en config), caemos al default
      // canónico. Garantiza que la tarjeta nunca quede sin URL para auto-actualizar tasas.
      const url = preset.url || DEFAULT_BANCO_URLS[val] || '';
      setUrlTasas(url);
      if (!item) setColor(preset.color || DEFAULT_BANCO_COLORS[val] || '#666');
      if (preset.nota) toast(preset.nota, 5000);
    }
  }

  function handleImageUpload(ev) {
    const file = ev.target.files[0];
    if (!file) return;
    if (file.size > 2 * 1024 * 1024) { toastErr('La imagen debe ser menor a 2MB'); return; }
    const reader = new FileReader();
    reader.onload = (e) => setImagen(e.target.result);
    reader.readAsDataURL(file);
  }

  async function fetchRates() {
    if (!urlTasas) { toastErr('Ingresa una URL de tasas primero'); return; }
    setFetchingRates(true);
    try {
      const result = await api('/scrape-tasas?url=' + encodeURIComponent(urlTasas));
      if (result.ok && result.found && result.rates) {
        if (result.rates.avances_mv) setTasaMvAvances(result.rates.avances_mv.toFixed(4));
        if (result.rates.compras_mv) setTasaMvDiferidas(result.rates.compras_mv.toFixed(4));
        toast('Tasas actualizadas desde la web');
      } else if (result.ok && !result.found) {
        toastErr('No se encontraron tasas en la pagina. Ingresalas manualmente.');
      } else {
        toastErr('Error al consultar: ' + (result.error || 'formato no reconocido'));
      }
    } catch (err) {
      toastErr('Error al consultar: ' + err.message);
    }
    setFetchingRates(false);
  }

  function submit(ev) {
    ev.preventDefault();
    const bancoFinal = banco === '__otro__' ? (bancoCustom || null) : (banco || null);
    const esBanco = bancoFinal && bancoFinal.toLowerCase().includes('bancolombia');
    if (esBanco && difiereInteresesCuota1 !== 0 && difiereInteresesCuota1 !== 1) {
      toastErr('Debes indicar si esta tarjeta difiere los intereses de la cuota 1');
      return;
    }
    onSave({
      nombre, banco: bancoFinal,
      dia_corte: parseInt(diaCorte), dia_pago: parseInt(diaPago), color, imagen: imagen || null,
      tasa_mv_avances: parseFloat(tasaMvAvances) / 100,
      tasa_mv_diferidas: parseFloat(tasaMvDiferidas) / 100,
      url_tasas: urlTasas || null, cupo_total: parseFloat(cupoTotal) || 0,
      estado, notas, franquicia: franquicia || null,
      difiere_intereses_cuota1: esBanco ? difiereInteresesCuota1 : null,
      orden: orden.trim() === '' ? null : parseInt(orden)
    });
  }

  return e('form', { onSubmit: submit },
    // Imagen de la tarjeta
    e('div', { className: 'form-group' },
      e('label', { className: 'form-label' }, 'Imagen de la tarjeta (opcional)'),
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 16 } },
        imagen
          ? e('div', { style: { position: 'relative' } },
              e('img', { src: imagen, style: { width: 180, height: 113, objectFit: 'cover', borderRadius: 10, border: '1px solid var(--border)' } }),
              e('button', { type: 'button', onClick: () => setImagen(''), style: { position: 'absolute', top: -6, right: -6, background: 'var(--danger)', color: '#fff', border: 'none', borderRadius: '50%', width: 22, height: 22, cursor: 'pointer', fontSize: 12, display: 'flex', alignItems: 'center', justifyContent: 'center' } }, '\u{2715}')
            )
          : e('div', { onClick: () => imgInputRef.current && imgInputRef.current.click(), style: { width: 180, height: 113, borderRadius: 10, border: '2px dashed var(--border)', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: 'var(--text-muted)', fontSize: 12, gap: 4, transition: 'all 0.2s' } },
              e('span', { style: { fontSize: 28 } }, '+'),
              'Click para subir imagen'
            ),
        e('input', { ref: imgInputRef, type: 'file', accept: 'image/*', onChange: handleImageUpload, style: { display: 'none' } })
      ),
      e('div', { className: 'form-hint' }, 'Sube una foto o imagen de tu tarjeta (max 2MB)')
    ),

    e('div', { className: 'form-row' },
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Nombre de la tarjeta *'),
        e('input', { type: 'text', className: 'form-input', value: nombre, onChange: ev => setNombre(ev.target.value), required: true, placeholder: 'Ej: Visa Infinite' })
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Banco'),
        (() => {
          const isPreset = BANCOS_PRESETS.find(b => b.nombre === banco);
          const showCustom = !isPreset && banco !== '';
          const selectVal = isPreset ? banco : (showCustom ? '__otro__' : '');
          return e(Fragment, null,
            e('select', { className: 'form-select', value: selectVal, onChange: ev => {
              if (ev.target.value === '__otro__') { setBanco('__otro__'); setBancoCustom(''); }
              else if (ev.target.value === '') { setBanco(''); setBancoCustom(''); setUrlTasas(''); }
              else handleBancoChange(ev.target.value);
            }},
              e('option', { value: '' }, 'Seleccionar...'),
              BANCOS_PRESETS.map(b => e('option', { key: b.nombre, value: b.nombre }, b.nombre)),
              e('option', { value: '__otro__' }, 'Otro')
            ),
            (selectVal === '__otro__' || showCustom) && e('input', { type: 'text', className: 'form-input', value: bancoCustom, onChange: ev => { setBancoCustom(ev.target.value); setBanco(ev.target.value || '__otro__'); }, placeholder: 'Nombre del banco', style: { marginTop: 8 } })
          );
        })()
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Cupo Total'),
        e(MoneyInput, { value: cupoTotal, onChange: val => setCupoTotal(val), placeholder: '0' })
      )
    ),
    banco === 'Bancolombia' && e(Fragment, null,
      e('div', { className: 'form-row' },
        e('div', { className: 'form-group' },
          e('label', { className: 'form-label' }, 'Franquicia'),
          e('select', { className: 'form-select', value: franquicia, onChange: ev => setFranquicia(ev.target.value) },
            e('option', { value: '' }, 'Seleccionar franquicia...'),
            e('option', { value: 'Visa' }, 'Visa'),
            e('option', { value: 'Mastercard' }, 'Mastercard'),
            e('option', { value: 'American Express' }, 'American Express')
          ),
          e('div', { className: 'form-hint' }, 'Cada franquicia maneja las compras internacionales de forma diferente')
        )
      ),
      // Difiere intereses cuota 1 → cuota 2 (varía por modelo de tarjeta Bancolombia)
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, '¿Esta tarjeta difiere los intereses de la primera cuota? *'),
        e('div', { style: { display: 'flex', flexDirection: 'column', gap: 8, marginTop: 4 } },
          e('label', { style: { display: 'flex', alignItems: 'flex-start', gap: 8, padding: '10px 12px', borderRadius: 8, border: '1px solid var(--border)', cursor: 'pointer', background: difiereInteresesCuota1 === 1 ? 'var(--bg-tertiary)' : 'transparent' } },
            e('input', { type: 'radio', name: 'difiereInteresesCuota1', checked: difiereInteresesCuota1 === 1, onChange: () => setDifiereInteresesCuota1(1), style: { marginTop: 2 } }),
            e('div', null,
              e('div', { style: { fontWeight: 600 } }, 'Sí, difiere'),
              e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 2 } }, 'La cuota 1 acumula intereses; la cuota 2 cobra (interés_1 + interés_2). Cuotas 3+ normales.')
            )
          ),
          e('label', { style: { display: 'flex', alignItems: 'flex-start', gap: 8, padding: '10px 12px', borderRadius: 8, border: '1px solid var(--border)', cursor: 'pointer', background: difiereInteresesCuota1 === 0 ? 'var(--bg-tertiary)' : 'transparent' } },
            e('input', { type: 'radio', name: 'difiereInteresesCuota1', checked: difiereInteresesCuota1 === 0, onChange: () => setDifiereInteresesCuota1(0), style: { marginTop: 2 } }),
            e('div', null,
              e('div', { style: { fontWeight: 600 } }, 'No, cobra desde cuota 1'),
              e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 2 } }, 'Cada cuota cobra su propio interés desde la primera (comportamiento estándar).')
            )
          )
        ),
        e('div', { className: 'form-hint', style: { marginTop: 6 } }, 'Verificá esta info en la página oficial de tu tarjeta Bancolombia.')
      )
    ),
    e('div', { className: 'form-row' },
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Dia de Corte'),
        e('input', { type: 'number', className: 'form-input', value: diaCorte, onChange: ev => setDiaCorte(ev.target.value), min: 1, max: 31 })
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Dia de Pago'),
        e('input', { type: 'number', className: 'form-input', value: diaPago, onChange: ev => setDiaPago(ev.target.value), min: 1, max: 31 })
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Color'),
        e('input', { type: 'color', className: 'form-input', value: color, onChange: ev => setColor(ev.target.value), style: { height: 40, padding: 4 } })
      )
    ),

    // URL de tasas
    e('div', { className: 'form-group' },
      e('label', { className: 'form-label' }, 'URL para consultar tasas (opcional)'),
      e('div', { style: { display: 'flex', gap: 8 } },
        e('input', { type: 'url', className: 'form-input', value: urlTasas, onChange: ev => setUrlTasas(ev.target.value), placeholder: 'https://www.bancolombia.com/personas/tarjetas-de-credito/...' }),
        e('button', { type: 'button', className: 'rate-fetch-btn' + (fetchingRates ? ' loading' : ''), onClick: fetchRates, disabled: fetchingRates },
          fetchingRates ? '\u{23F3} Consultando...' : 'Consultar Tasas'
        )
      ),
      e('div', { className: 'form-hint' }, 'Si configuras la URL, podras actualizar las tasas automaticamente desde la web del banco')
    ),

    e('div', { style: { background: 'var(--bg-main)', border: '1px solid var(--border)', borderRadius: 10, padding: '10px 14px', marginBottom: 16, fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.5 } },
      '\u{26A0}\u{FE0F} Siempre verifica las tasas de manera manual en la pagina web o app movil de tu banco. Este programa consulta fuentes publicas pero no garantiza exactitud al 100%.'
    ),

    e('div', { className: 'form-row' },
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Tasa Avances (%)'),
        e('div', { style: { display: 'flex', gap: 6 } },
          e('input', { type: 'number', step: tasaTipoAvances === 'ea' ? '0.01' : '0.0001', className: 'form-input', value: tasaDisplayAvances, onChange: ev => handleTasaAvancesChange(ev.target.value), style: { flex: 1 } }),
          e('div', { className: 'tasa-toggle' },
            e('button', { type: 'button', className: 'tasa-toggle-btn' + (tasaTipoAvances === 'mv' ? ' active' : ''), onClick: () => switchTasaTipoAvances('mv') }, 'MV'),
            e('button', { type: 'button', className: 'tasa-toggle-btn' + (tasaTipoAvances === 'ea' ? ' active' : ''), onClick: () => switchTasaTipoAvances('ea') }, 'EA')
          )
        ),
        tasaTipoAvances === 'ea' && e('div', { className: 'form-hint' }, 'MV: ' + (parseFloat(tasaMvAvances) || 0).toFixed(4) + '%')
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Tasa Diferidas (%)'),
        e('div', { style: { display: 'flex', gap: 6 } },
          e('input', { type: 'number', step: tasaTipoDiferidas === 'ea' ? '0.01' : '0.0001', className: 'form-input', value: tasaDisplayDiferidas, onChange: ev => handleTasaDiferidasChange(ev.target.value), style: { flex: 1 } }),
          e('div', { className: 'tasa-toggle' },
            e('button', { type: 'button', className: 'tasa-toggle-btn' + (tasaTipoDiferidas === 'mv' ? ' active' : ''), onClick: () => switchTasaTipoDiferidas('mv') }, 'MV'),
            e('button', { type: 'button', className: 'tasa-toggle-btn' + (tasaTipoDiferidas === 'ea' ? ' active' : ''), onClick: () => switchTasaTipoDiferidas('ea') }, 'EA')
          )
        ),
        tasaTipoDiferidas === 'ea' && e('div', { className: 'form-hint' }, 'MV: ' + (parseFloat(tasaMvDiferidas) || 0).toFixed(4) + '%')
      ),
      item && e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Estado'),
        e('select', { className: 'form-select', value: estado, onChange: ev => setEstado(ev.target.value) },
          e('option', { value: 'activa' }, 'Activa'),
          e('option', { value: 'inactiva' }, 'Inactiva')
        )
      ),
      // Orden manual: número entero. Menor = aparece primero. Vacío = al final por fecha de creación.
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Orden (opcional)'),
        e('input', {
          type: 'number',
          className: 'form-input',
          value: orden,
          onChange: ev => setOrden(ev.target.value),
          placeholder: 'Ej: 1, 2, 3...',
          min: 0
        }),
        e('div', { className: 'form-hint' }, 'Posición en listados (Mis Tarjetas y Dashboard). Menor número = aparece primero. Vacío = al final.')
      )
    ),
    e('div', { className: 'form-group' },
      e('label', { className: 'form-label' }, 'Notas'),
      e('input', { type: 'text', className: 'form-input', value: notas, onChange: ev => setNotas(ev.target.value) })
    ),
    e('div', { className: 'modal-actions' },
      e('button', { type: 'button', className: 'btn', onClick: onCancel }, 'Cancelar'),
      e('button', { type: 'submit', className: 'btn btn-primary' }, 'Guardar')
    )
  );
}

// ═══════════════════════════════════════════════════════════════════
// CARD VIEW — Resumen per card
// ═══════════════════════════════════════════════════════════════════
function CardResumen({ tarjeta, onDataChange }) {
  const [data, setData] = useState(null);
  const [compras, setCompras] = useState([]);
  const [personas, setPersonas] = useState([]);
  const [resumen, setResumen] = useState(null);
  // Ciclo por defecto = ciclo_sugerido que calcula el backend: el vigente según el corte, salvo
  // que el extracto del ciclo anterior siga pendiente (pago mínimo sin cubrir al 100%), en cuyo
  // caso arranca en ese anterior para que el usuario vea primero lo que debe pagar. Fallback al
  // vigente si el backend no lo envió.
  const [ciclo, setCiclo] = useState(tarjeta.ciclo_sugerido || cicloVigente(tarjeta.dia_corte));
  const [avances, setAvances] = useState([]);
  const [diferidas, setDiferidas] = useState([]);
  const [selectedAvance, setSelectedAvance] = useState(null);
  const [avanceDetail, setAvanceDetail] = useState(null);
  const [selectedDiferida, setSelectedDiferida] = useState(null);
  const [diferidaDetail, setDiferidaDetail] = useState(null);
  const [showMovModal, setShowMovModal] = useState(false);
  const [editCompra, setEditCompra] = useState(null);
  const [showCompraModal, setShowCompraModal] = useState(false);
  const [showAvanceModal, setShowAvanceModal] = useState(false);
  const [editAvance, setEditAvance] = useState(null);
  const [showDiferidaModal, setShowDiferidaModal] = useState(false);
  const [editDiferida, setEditDiferida] = useState(null);
  const [showReprogramarModal, setShowReprogramarModal] = useState(false);
  const [reproDiferida, setReproDiferida] = useState(null);
  const [showAbonoModal, setShowAbonoModal] = useState(false);
  const [movType, setMovType] = useState('compra');
  const [showAbonoCapitalModal, setShowAbonoCapitalModal] = useState(false);
  const [abonoCapitalMonto, setAbonoCapitalMonto] = useState('');
  const [abonoCapitalFecha, setAbonoCapitalFecha] = useState(todayISO());
  const [abonoCapitalResult, setAbonoCapitalResult] = useState(null);
  const [abonoCapitalPreview, setAbonoCapitalPreview] = useState(null);
  const [abonoCapitalSaving, setAbonoCapitalSaving] = useState(false);
  const [showBolsilloModal, setShowBolsilloModal] = useState(false);
  const [showFechaPagoModal, setShowFechaPagoModal] = useState(false);
  const [fechaPagoInput, setFechaPagoInput] = useState('');
  const [bolsilloCompra, setBolsilloCompra] = useState(null);
  const [bolsilloMonto, setBolsilloMonto] = useState('');

  useEffect(() => { api('/dashboard?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setData); }, [tarjeta.id, ciclo]);

  // Preview EN VIVO del abono a capital: cuando cambia el monto/fecha con el modal abierto,
  // consulta la distribución (sin aplicar) con un pequeño debounce. La respuesta puede traer
  // .detalle (distribución) o .error (ej. extracto pendiente); ambos se muestran en el form.
  useEffect(() => {
    if (!showAbonoCapitalModal || abonoCapitalResult) return;
    const monto = parseFloat(abonoCapitalMonto);
    if (!monto || monto <= 0) { setAbonoCapitalPreview(null); return; }
    let cancelado = false;
    const t = setTimeout(() => {
      const params = new URLSearchParams({ tarjeta_id: tarjeta.id, monto, fecha: abonoCapitalFecha });
      api('/abono-capital/preview?' + params).then(r => { if (!cancelado) setAbonoCapitalPreview(r); });
    }, 400);
    return () => { cancelado = true; clearTimeout(t); };
  }, [abonoCapitalMonto, abonoCapitalFecha, showAbonoCapitalModal, abonoCapitalResult, tarjeta.id]);

  const loadCompras = useCallback(() => {
    api('/compras?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setCompras);
    api('/compras/resumen?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setResumen);
    api('/personas').then(setPersonas);
  }, [ciclo, tarjeta.id]);
  const loadAvances = useCallback(() => { api('/avances?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setAvances); }, [tarjeta.id, ciclo]);
  const loadDiferidas = useCallback(() => { api('/diferidas?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setDiferidas); }, [tarjeta.id, ciclo]);

  useEffect(() => { loadCompras(); }, [loadCompras]);
  useEffect(() => { loadAvances(); }, [loadAvances]);
  useEffect(() => { loadDiferidas(); }, [loadDiferidas]);
  function refreshAll() { loadCompras(); loadAvances(); loadDiferidas(); api('/dashboard?tarjeta_id=' + tarjeta.id + '&ciclo=' + ciclo).then(setData); if (onDataChange) onDataChange(); }

  function saveCompra(compraData) {
    // Split purchase: array de nuevas compras
    if (Array.isArray(compraData)) {
      // Si la edición convierte una compra individual existente en dividida,
      // borramos la original primero para evitar duplicados (Delete & Recreate).
      const replaceId = compraData._replaceItemId;
      const prep = replaceId
        ? api('/compras/' + replaceId, { method: 'DELETE' })
        : Promise.resolve();
      prep.then(() => Promise.all(compraData.map(d => {
        d.tarjeta_id = tarjeta.id;
        return api('/compras', { method: 'POST', body: d });
      }))).then((resultados) => {
        const conError = (resultados || []).find(r => r && r.error);
        if (conError) { refreshAll(); toastErr(conError.error); return; }
        setShowCompraModal(false); setShowMovModal(false); refreshAll();
        toast(replaceId ? 'Compra convertida en dividida' : compraData.length + ' compras registradas');
      });
      return;
    }
    // Conversión grupo dividido → 100% personal
    if (compraData._mergePersonal) {
      handleMergePersonal(compraData._grupoId);
      return;
    }
    // Edición de grupo existente
    if (compraData._editGrupo) {
      handleEditGrupo(compraData).then((resultados) => {
        // Surface de errores: si algun PUT/POST fallo (ej. 403 de ciclo cerrado), avisa en vez de
        // mostrar un exito falso (antes el .then corria siempre aunque las ops fallaran).
        const conError = (resultados || []).find(r => r && r.error);
        if (conError) { refreshAll(); toastErr(conError.error); return; }
        setShowCompraModal(false); refreshAll(); toast('Compra dividida actualizada');
      });
      return;
    }
    compraData.tarjeta_id = tarjeta.id;
    // Libertad total de cuotas: la señal estructural viaja en _convertirCuotas / _reprogramarCuotas /
    // _revertirCuotas. Primero el PUT guarda los campos editados; luego el endpoint dedicado hace la
    // transición (transaccional), conservando la fila original — fecha y orden cronológico intactos
    // (prelación de pagos).
    const conv = compraData._convertirCuotas;
    const repro = compraData._reprogramarCuotas;
    const rever = compraData._revertirCuotas;
    delete compraData._convertirCuotas; delete compraData._reprogramarCuotas; delete compraData._revertirCuotas;
    const method = editCompra ? 'PUT' : 'POST';
    const url = editCompra ? '/compras/' + editCompra.id : '/compras';
    api(url, { method, body: compraData }).then((resp) => {
      // El backend bloquea (403) crear/editar en ciclos pagados; mostramos el motivo y no cerramos en falso.
      if (resp && resp.error) { toastErr(resp.error); return; }
      if (editCompra && (conv || repro || rever)) {
        const accion = conv
          ? api('/compras/' + editCompra.id + '/convertir-a-diferida', { method: 'POST', body: conv })
          : repro
            ? api('/diferidas/' + repro.diferida_id + '/reprogramar', { method: 'POST', body: { num_cuotas: repro.num_cuotas } })
            : api('/compras/' + editCompra.id + '/revertir-diferida', { method: 'POST', body: {} });
        accion.then((rc) => {
          if (rc && rc.error) { toastErr(rc.error); refreshAll(); return; }
          setShowCompraModal(false); setShowMovModal(false); refreshAll();
          toast(conv ? 'Compra convertida a ' + conv.num_cuotas + ' cuotas'
            : repro ? 'Cuotas reprogramadas a ' + repro.num_cuotas
            : 'Compra revertida a 1 cuota');
        });
        return;
      }
      setShowCompraModal(false); setShowMovModal(false); refreshAll(); toast('Compra guardada');
    });
  }
  async function handleMergePersonal(grupoId) {
    // Primera confirmación (no destructiva).
    if (!await confirmDialog(
      'Esta compra dividida se fusionará en una sola compra 100% personal. El dinero que tengas apartado (bolsillo) de cada parte se conserva sumado. ¿Continuar?',
      { confirmText: 'Convertir a personal' }
    )) return;
    // Intento sin force.

  async function handleEditGrupo({ _grupoId, _partesOriginales, fecha, descripcion, valor_usd, tasa_usd, es_internacional, splits, remainder }) {
    // Construir lista completa de nuevas partes: personas asignadas + parte personal
    const nuevasPartes = [
      ...splits.map(sp => ({ persona_id: parseInt(sp.persona_id), valor_cop: Math.round(parseFloat(sp.monto) || 0) })),
      ...(remainder > 0 ? [{ persona_id: null, valor_cop: remainder }] : [])
    ].filter(np => np.valor_cop > 0);
    // Índice de originales por persona_id ('personal' para la parte sin persona)
    const originalesByPersona = {};
    _partesOriginales.forEach(p => { originalesByPersona[p.persona_id != null ? p.persona_id : 'personal'] = p; });
    const intlFlag = es_internacional ? 1 : 0;
    // Ciclo del grupo: todas las partes comparten ciclo/ciclo_manual (se crearon juntas). Se CONSERVA
    // al editar para no perder un ciclo fijado a mano (ej. spillover / canje retrasado): sin esto el
    // backend recalcularia el ciclo desde la nueva fecha y, si ese ciclo natural ya cerro, cada PUT
    // fallaria con 403 y la edicion no se aplicaria. Para partes NUEVAS se usa el ciclo del grupo.
    const grupoCiclo = _partesOriginales[0] ? _partesOriginales[0].ciclo : undefined;
    const grupoCicloManual = _partesOriginales[0] ? (_partesOriginales[0].ciclo_manual || 0) : 0;
    const ops = [];
    const idsVisitados = new Set();
    for (const np of nuevasPartes) {
      const key = np.persona_id != null ? np.persona_id : 'personal';
      const orig = originalesByPersona[key];
      if (orig) {
        idsVisitados.add(orig.id);
        ops.push(api('/compras/' + orig.id, { method: 'PUT', body: {
          tarjeta_id: tarjeta.id, fecha, descripcion,
          valor_cop: np.valor_cop,
          valor_usd: valor_usd || null, tasa_usd: tasa_usd || null,
          persona_id: orig.persona_id, estado: orig.estado, notas: orig.notas,
          es_internacional: intlFlag,
          ciclo: orig.ciclo, ciclo_manual: orig.ciclo_manual || 0
        }}));
      } else {
        // Nueva persona agregada al grupo
        ops.push(api('/compras', { method: 'POST', body: {
          tarjeta_id: tarjeta.id, fecha, descripcion,
          valor_cop: np.valor_cop,
          valor_usd: valor_usd || null, tasa_usd: tasa_usd || null,
          persona_id: np.persona_id, estado: 'pendiente', grupo_id: _grupoId,
          es_internacional: intlFlag,
          ciclo: grupoCiclo, ciclo_manual: grupoCicloManual
        }}));
      }
    }
    // Eliminar partes que ya no están
    for (const p of _partesOriginales) {
      if (!idsVisitados.has(p.id)) ops.push(api('/compras/' + p.id, { method: 'DELETE' }));
    }
    return Promise.all(ops);
  }

  function saveBolsillo() {
    if (!bolsilloCompra) return;
    const _mb = bolsilloCompra.monto_bolsillo || 0;
    const _isAv = !!bolsilloCompra._isAvance;
    const _isDif = bolsilloCompra.estado === 'diferida' || !!bolsilloCompra._isDiferida;
    const _target = bolsilloCompra._bolsilloTarget || ((_isAv || _isDif) ? (bolsilloCompra.cuotaCorte || bolsilloCompra.valor_cop) : bolsilloCompra.valor_cop);
    const _isAgregar = (_isAv || _isDif) && _mb > 0 && _mb < _target;
    let monto;
    if (_isAgregar) {
      const adicional = parseFloat(bolsilloMonto) || 0;
      monto = _mb + adicional;
    } else {
      monto = parseFloat(bolsilloMonto) || 0;
    }
    if (monto < 0) return;
    const url = bolsilloCompra._isAvance
      ? '/avances/' + bolsilloCompra.id + '/bolsillo'
      : bolsilloCompra._isDiferida
        ? '/diferidas/' + bolsilloCompra.id + '/bolsillo'
        : '/compras/' + bolsilloCompra.id + '/bolsillo';

    const esUsdSave = !!(bolsilloCompra.valor_usd && bolsilloCompra.valor_usd > 0 && !bolsilloCompra.valor_cop);
    const body = { monto_bolsillo: monto, moneda: esUsdSave ? 'USD' : 'COP' };

    if (bolsilloCompra.cuota_num && (_isDif || _isAv)) body.cuota_num = bolsilloCompra.cuota_num;

      .then((resp) => {

          const topeFmt = resp.moneda === 'USD'

      } else {
        singles.push({ tipo: 'single', data: c });

    });
    const result = [...singles];
    Object.entries(grupos).forEach(([gid, items]) => {
      const esDiferida = items[0].estado === 'diferida' && items[0].cuotaCorte !== undefined;
      const total = esDiferida
        ? items.reduce((s, c) => s + (c.cuotaCorte || 0), 0)

        _ordenId: Math.min(...items.map(c => c.id)),

    result.sort((a, b) => {

  // Ciclo manual (avanzado): vacío = el ciclo se deriva de la fecha. Con valor "YYYY-MM" la
  // compra pertenece a ese ciclo sin importar su fecha (cuotas reprogramadas por el banco que
  // se pagan en otro ciclo). Solo se ofrece al editar una compra individual de 1 cuota.
  const [cicloManualVal, setCicloManualVal] = useState(item && item.ciclo_manual ? item.ciclo : '');
  // Spillover / "canje retrasado" al corte siguiente: el banco a veces factura una compra hecha el
  // último día del corte en el extracto del mes SIGUIENTE. Al marcar este checkbox (SOLO al crear una
  // compra individual de 1 cuota), la compra se registra en el ciclo siguiente al natural de su fecha
  // (ciclo_manual=1) conservando su fecha real; el candado de "ciclo cerrado" se evalúa entonces contra
  // ese ciclo destino (que está abierto), tanto en el frontend como en el backend (que ya valida el destino).
  const [facturaSiguienteCorte, setFacturaSiguienteCorte] = useState(false);
  // Checkbox unificado: marca la compra como internacional (acumula intereses) y opcionalmente
  // permite registrar valor USD + tasa (datos informativos, no obligatorios).
  const [esInternacional, setEsInternacional] = useState(item ? !!(item.es_internacional || item.valor_usd) : false);
  // Al editar una diferida, el número real de cuotas viene en cuotas_total (num_cuotas no
  // existe en la fila compra). Lo usamos para que el campo (bloqueado en edición) muestre
  // el valor correcto y la lógica de estado trate la compra como diferida.
  const [numCuotas, setNumCuotas] = useState(item ? (item.num_cuotas || item.cuotas_total || 1) : 1);
  const [cobrarIntereses, setCobrarIntereses] = useState(true);
  const [dividir, setDividir] = useState(item && item._isGrupo ? true : false);
  // División "first-class": UN solo arreglo de filas donde el titular es una fila más con el
  // valor especial persona_id='personal' (los terceros usan su id real). Cada fila se elige en
  // el mismo dropdown, se borra con el mismo "×" y entra en la misma matemática: la suma de
  // TODAS las filas debe ser exactamente el Valor COP. Si no hay fila "Mi parte", el titular no
  // asume nada (un faltante se muestra en rojo y bloquea el guardado — no se le asigna solo).
  const [splits, setSplits] = useState(() => {
    if (item && item._isGrupo) {
      const sp = item._partes.map(p => ({ persona_id: p.persona_id ? String(p.persona_id) : 'personal', monto: String(p.valor_cop) }));
      return sp.length > 0 ? sp : [{ persona_id: '', monto: '' }];
    }
    return [{ persona_id: '', monto: '' }];
  });
  const lastUsdField = useRef(null); // tracks which field was edited last: 'usd', 'tasa', 'cop'
  // Soft lock de ciclo cerrado: confirmación con MODAL NATIVO (no window.confirm). El ref evita el
  // desfase asíncrono de setState al re-disparar submit() desde el botón "Confirmar edición".
  const [showCerradoConfirm, setShowCerradoConfirm] = useState(false);
  const cerradoOkRef = useRef(false);

  // Candado estructural de ciclo CERRADO (≠ pagado): la compra pertenece a un ciclo anterior al
  // vigente de su tarjeta — el banco YA generó ese extracto, esté pagado o no. Todos los campos
  // estructurales (fecha, valores, persona, intl, dividir, ciclo, cuotas) van bloqueados y opacos;
  // solo quedan editables el Nombre en el Extracto y las notas (el backend ignora el resto de
  // todas formas: PUT endurecido, espejo del form de Avances). Los grupos sin .ciclo propio usan
  // el ciclo de la vista desde la que se abrieron.
  // El vigente CONSCIENTE del corte adelantado lo entrega el backend (ciclo_vigente, derivado de
  // cortes_custom). item.ciclo ya viene del motor consciente del corte → comparar ambos sella sólo
  // los ciclos realmente cerrados y deja 100% editables las compras que el corte empujó al vigente
  // (ej. las del 19-20 que pasaron al mes siguiente). Fallback al cálculo teórico local sólo si el
  // backend no envió ciclo_vigente (robustez).
  const vigenteTarjeta = tarjeta && (tarjeta.ciclo_vigente || cicloVigente(tarjeta.dia_corte));
  // Detección: la compra pertenece a un ciclo ya CERRADO (el banco generó ese extracto). Se usa para el
  // aviso, la confirmación al guardar (submit) y para mantener las CUOTAS bloqueadas (reprogramar sella).
  const cicloEstaCerrado = !!item && !!tarjeta && ((item.ciclo || ciclo) < vigenteTarjeta);
  // SOFT LOCK (v4.7.5): downgrade del candado. Los campos estructurales de un ciclo cerrado YA NO se
  // deshabilitan — el usuario puede corregir errores de tipeo del pasado; al guardar se confirma (submit)
  // y el backend acepta el PUT completo (solo conserva el candado de PAGADOS). Por eso isCicloCerrado
  // —que gobierna disabled/opacidad de TODOS los inputs de abajo— queda fijo en false.
  const isCicloCerrado = false;
  const lockStyle = undefined;
  // "Libertad total" de cuotas: en edición el campo Cuotas queda libre para compras individuales
  // sin abonos — 1→N convierte, N→M reprograma y N→1 revierte; cada acción la ejecuta su
  // endpoint transaccional DESPUÉS del PUT, conservando SIEMPRE la fila original de la compra
  // (fecha/registro intactos: la prelación de pagos del banco depende del orden cronológico real).
  // SOLO en el ciclo VIGENTE: un ciclo anterior ya CERRÓ (el banco generó su extracto, esté pagado
  // o no) y su estructura queda sellada — la conciliación IA tiene su propia vía para el pasado.
  // Grupos, abonos parciales, terceros con reembolso y ciclos cerrados quedan fuera (cada endpoint
  // los rechaza). USD: una compra internacional de Visa (valor_cop>0 + USD informativo) SÍ puede
  // diferirse (la amortización corre sobre el COP); solo se excluye la compra USD PURA (sin valor
  // en pesos, ej. MC/Amex dual), que no es amortizable en COP.
  const esUsdPura = !!(item && item.valor_usd > 0 && !(item.valor_cop > 0));
  const cuotasEditables = !!item && !item._isGrupo && !esUsdPura && !((item.monto_abonado || 0) > 0)
    && !cicloEstaCerrado;
  // Cuotas con las que la compra está HOY en la BD (diferida → su total real; si no, 1).
  const cuotasOriginales = item ? ((item.estado === 'diferida' || item.diferida_id) ? (parseInt(item.cuotas_total || item.num_cuotas, 10) || 1) : 1) : 1;

  // Asistente INTL: cargamos al montar el form la lista de descripciones que ya tienen
  // alguna compra marcada como es_internacional=1 en la DB (real-time, auto-aprende/desaprende).
  const [intlDescripciones, setIntlDescripciones] = useState([]);
  useEffect(() => {
    api('/compras/intl-descripciones').then(setIntlDescripciones).catch(() => setIntlDescripciones([]));
  }, []);

  // Autocompletado del "Nombre en el Extracto": nombres distintos ya usados en compras, para
  // sugerirlos en un dropdown custom mientras el usuario escribe (ej. "A" → APPLE.COM/US, AMAZON).
  const [nombresUnicos, setNombresUnicos] = useState([]);
  useEffect(() => {
    // Aislado por tarjeta: solo descripciones ya usadas en ESTA tarjeta (no mezcla el historial entre
    // tarjetas — estando en la Visa no sugiere nombres de la RappiCard). Sin tarjeta → global (fallback
    // defensivo; al registrar un movimiento siempre hay una tarjeta activa). Re-fetch si cambia la tarjeta.
    const tid = tarjeta && tarjeta.id;
    api('/compras/nombres-unicos' + (tid ? '?tarjeta_id=' + tid : '')).then(setNombresUnicos).catch(() => setNombresUnicos([]));
  }, [tarjeta && tarjeta.id]);
  // Visibilidad del dropdown de autocompletado (solo con foco + coincidencias).
  const [descSugAbierto, setDescSugAbierto] = useState(false);

  // TRM del día (Tasa Representativa del Mercado) — se consulta del backend que la trae
  // del dataset abierto del Banco República. Si no responde, usa el valor guardado en config.
  // Se usa como fallback automático cuando el usuario marca compra internacional en una
  // tarjeta dual (Mastercard/Amex Bancolombia) y deja vacío el campo Tasa USD.
  const [trmInfo, setTrmInfo] = useState(null);
  useEffect(() => {
    api('/trm-actual').then(setTrmInfo).catch(() => setTrmInfo(null));
  }, []);

  function onUsdChange(val) { lastUsdField.current = 'usd'; setValorUsd(val); }
  function onTasaChange(val) { lastUsdField.current = 'tasa'; setTasaUsd(val); }
  function onCopUsdChange(val) { lastUsdField.current = 'cop'; setValorCop(val); }

  // Auto-calculate the missing field based on the other two — solo si la compra es intl
  // y el usuario está completando los campos USD opcionales.
  // En tarjetas duales (MC/Amex) la moneda nativa es USD y valor_cop puede quedar en 0,
  // por lo que NO auto-calculamos COP a partir de USD*tasa (evita pisar el 0 esperado).
  const _frEarly = tarjeta && tarjeta.franquicia ? tarjeta.franquicia.toLowerCase() : '';
  const _isDualEarly = _frEarly.includes('mastercard') || _frEarly.includes('amex') || _frEarly.includes('american express');
  useEffect(() => {
    if (!esInternacional) return;
    if (_isDualEarly) return; // no auto-cálculo recíproco en tarjetas duales
    const field = lastUsdField.current;
    if (!field) return;
    const usd = parseFloat(valorUsd);
    const tasa = parseFloat(tasaUsd);
    const cop = parseFloat(valorCop);
    if (field === 'cop' && usd > 0 && cop > 0) {
      // Editó COP teniendo USD → deriva la tasa (COP/USD).
      const calc = Math.round(cop / usd);
      if (calc !== Math.round(tasa)) setTasaUsd(calc);
    } else if (field === 'usd' && usd > 0) {
      // Editó USD: si ya hay tasa, recalcula COP (USD×tasa). Si NO hay tasa pero sí COP, deriva la
      // tasa (COP/USD) — el caso que faltaba. Tras derivarla marcamos 'cop' como último campo para
      // que la siguiente pasada de este efecto NO vuelva a recalcular COP: evita pisar el valor que
      // el usuario escribió (por el redondeo de ida y vuelta) y corta el posible loop.
      if (tasa > 0) {
        const calc = Math.round(usd * tasa);
        if (calc !== Math.round(cop)) setValorCop(calc);
      } else if (cop > 0) {
        const calc = Math.round(cop / usd);
        if (calc !== Math.round(tasa)) { setTasaUsd(calc); lastUsdField.current = 'cop'; }
      }
    } else if (field === 'tasa' && usd > 0 && tasa > 0) {
      // Editó la tasa → recalcula COP (USD×tasa).
      const calc = Math.round(usd * tasa);
      if (calc !== Math.round(cop)) setValorCop(calc);
    }
  }, [valorUsd, tasaUsd, valorCop, esInternacional, _isDualEarly]);

  async function submit(ev) {
    if (ev) ev.preventDefault(); // ev puede venir undefined cuando lo re-dispara el modal de confirmación
    const totalCop = parseFloat(valorCop) || 0;

    // USD/Tasa son opcionales — solo se guardan si la compra es intl y el usuario los proveyó.
    const usdNum = esInternacional && valorUsd !== '' && !isNaN(parseFloat(valorUsd)) ? parseFloat(valorUsd) : null;
    // Fallback de tasa: si la compra es internacional + tarjeta dual + tasaUsd vacía,
    // usamos la TRM del día (consultada en mount). Se guarda como tasa_usd informativa.
    let tasaNum = esInternacional && tasaUsd !== '' && !isNaN(parseFloat(tasaUsd)) ? parseFloat(tasaUsd) : null;
    if (tasaNum == null && esInternacional && _isDualEarly && trmInfo && trmInfo.trm) {
      tasaNum = Math.round(trmInfo.trm);
    }
    // Tasa de interés intl congelada (snapshot): el usuario la escribe como % (ej. 2.0849) y se guarda
    // como decimal (0.020849). Solo si la compra es internacional y el usuario la proveyó.
    const tasaIntlNum = (esInternacional && tasaIntl !== '' && !isNaN(parseFloat(tasaIntl))) ? (parseFloat(tasaIntl) / 100) : null;

    // Spillover / "canje retrasado": ciclo destino cuando el banco factura la compra en el corte
    // SIGUIENTE (checkbox, al CREAR — Fase 2: aplica a 1 cuota, DIFERIDAS y DIVIDIDAS). Es el ciclo
    // siguiente al natural de la fecha (consciente del corte adelantado). null si no aplica → el ciclo
    // se auto-deriva de la fecha (comportamiento normal). Se reutiliza en la validación, el payload de
    // la compra (ciclo + ciclo_manual) y el fecha_primer_corte de las diferidas (corte del ciclo destino).
    const cicloSpilloverBody = (!item && facturaSiguienteCorte && tarjeta)
      ? cicloSiguiente(cicloConCorteFront(fecha, tarjeta.dia_corte, tarjeta.cortes_custom || {}))
      : null;

    // Candado de ciclo cerrado al CREAR: si la fecha cae en un ciclo anterior al vigente, el banco
    // ya facturó ese extracto (el backend rechaza el POST con 403). Validar ANTES de crear nada
    // evita dejar una diferida huérfana (en el flujo de cuotas la diferida se crea primero).
    if (!item && tarjeta) {
      // Ciclo destino EXACTO (igual que el motor del backend): consciente del corte adelantado. Una
      // fecha en la ventana post-corte salta al ciclo siguiente, así una compra del 19-20 que el
      // corte manda al vigente NO se bloquea por error (ni deja una diferida huérfana, ya que en el
      // flujo de cuotas la diferida se crea ANTES del POST). El backend revalida con esCicloCerrado.
      // Con "canje retrasado" el destino es el ciclo SIGUIENTE (spillover), que está abierto → pasa.
      const vig = tarjeta.ciclo_vigente || cicloVigente(tarjeta.dia_corte);
      const cicloDestino = cicloSpilloverBody || cicloConCorteFront(fecha, tarjeta.dia_corte, tarjeta.cortes_custom || {});
      if (cicloDestino < vig) {
        toastErr('No se puede registrar: la fecha cae en el ciclo ' + cicloDestino + ', que ya cerró (el banco ya generó ese extracto). Si el extracto real incluye esta compra, usa el Asistente IA de conciliación.');
        return;
      }
    }

    // Soft lock al EDITAR una compra de un ciclo ya cerrado (v4.7.5): los campos ya no se bloquean, pero
    // como el cambio altera un extracto YA facturado, se pide confirmación con un MODAL NATIVO de la app
    // (no window.confirm). Al confirmar, el modal marca cerradoOkRef y re-dispara submit(); el ref evita
    // el desfase asíncrono de setState. Al cancelar no se ejecuta ninguna modificación.
    if (item && cicloEstaCerrado) {
      if (!cerradoOkRef.current) { setShowCerradoConfirm(true); return; }
      cerradoOkRef.current = false; // ya confirmado; consumir para la próxima edición
    }

    // Conversión: grupo dividido con "Dividir" DESMARCADO → fusionar en compra personal.
    // El backend hace el merge transaccional (suma valores + bolsillo, maneja diferidas).
    if (item && item._isGrupo && !dividir) {
      onSave({ _mergePersonal: true, _grupoId: item._grupoId });
      return;
    }

    // ── Validaciones estrictas del modo dividido (blindan la BD contra registros corruptos) ──
    // Aplican tanto al crear como al editar un grupo. NO aplican al merge-personal (dividir=false).
    if (dividir) {
      // 1) Toda fila debe tener un responsable elegido (evita "registros fantasma" sin nombre).
      if (splits.length === 0 || splits.some(sp => !sp.persona_id)) {
        toastErr('Cada fila debe tener un responsable (una persona o "Mi parte (Yo)"); elimina las filas sobrantes o desmarca la casilla de dividir.');
        return;
      }
      // 2) Sin repetidos: ni la misma persona ni "Mi parte" pueden ir en dos filas
      //    (el dropdown ya los excluye; esto es la defensa al guardar).
      const idsSeleccionados = splits.map(sp => String(sp.persona_id));
      if (new Set(idsSeleccionados).size !== idsSeleccionados.length) {
        toastErr('No puedes asignar al mismo responsable varias veces en una compra dividida. Por favor, suma sus montos en una sola fila.');
        return;
      }
    }

    // ── Cuadre del modo dividido (first-class) ──
    // La suma de TODAS las filas (terceros + "Mi parte" si existe) debe ser EXACTAMENTE el
    // Valor COP. Redondeo POR PARTE: cada monto se valida con el valor que realmente se guardará
    // (el payload hace Math.round por parte) — el cuadre nunca falla por decimales. Si no hay
    // fila "Mi parte", el titular no asume nada: el faltante bloquea aquí con error.
    let miParteFinal = 0;
    if (dividir) {
      const hayFilaPersonal = splits.some(sp => sp.persona_id === 'personal');
      miParteFinal = Math.round(parseFloat((splits.find(sp => sp.persona_id === 'personal') || {}).monto) || 0);
      const sumTerceros = splits.reduce((s, sp) => s + (sp.persona_id !== 'personal' ? Math.round(parseFloat(sp.monto) || 0) : 0), 0);
      const diff = Math.round(totalCop) - sumTerceros - miParteFinal;
      if (diff !== 0) {
        toastErr((diff > 0 ? 'Falta asignar ' + fmtCOP(diff) : 'Las partes exceden el total en ' + fmtCOP(Math.abs(diff)))
          + ': las filas suman ' + fmtCOP(sumTerceros + miParteFinal) + ' y el Valor COP es ' + fmtCOP(Math.round(totalCop)) + '. '
          + ((diff > 0 && !hayFilaPersonal) ? 'Ajusta los montos o agrega una fila "Mi parte (Yo)" si vas a asumir lo que falta.' : 'Ajusta los montos de las filas.'));
        return;
      }
    }

    // Edicion de grupo existente: diff splits vs originales, sin crear nuevas diferidas.
    // Desglose first-class → contrato del backend: la fila "Mi parte" viaja como remainder
    // (parte personal) y las demás como splits de terceros.
    if (dividir && splits.length > 0 && item && item._isGrupo) {
      const remainder = miParteFinal;
      onSave({
        _editGrupo: true,
        _grupoId: item._grupoId,
        _partesOriginales: item._partes,
        fecha, descripcion,
        valor_usd: usdNum,
        tasa_usd: tasaNum,
        es_internacional: esInternacional ? 1 : 0,
        splits: splits.filter(sp => sp.persona_id && sp.persona_id !== 'personal' && parseFloat(sp.monto) > 0),
        remainder
      });
      return;
    }

    // Split purchase: create one compra per persona + personal remainder ("Mi parte")
    if (dividir && splits.length > 0) {
      const remainder = miParteFinal;
      const grupoId = (crypto.randomUUID ? crypto.randomUUID() : 'g' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10));
      const isDiferida = numCuotas > 1;

      // Si es diferida, crear una diferida por cada parte
      const diferidaIds = {};
      if (isDiferida && tarjeta) {
        const diaCorte = tarjeta.dia_corte || 30;
        // Spillover Fase 2: si el banco factura en el corte SIGUIENTE, cada diferida arranca en el corte
        // del ciclo DESTINO; si no, en el corte natural de la fecha. fecha_compra se conserva en la fecha
        // real (abajo) para que syncData paso 11 no reajuste este primer corte (solo recalcula si
        // fecha_compra != compra.fecha; aquí SIEMPRE coinciden → el desvío del spillover sobrevive).
        let fechaPrimerCorte;
        if (cicloSpilloverBody) {
          fechaPrimerCorte = corteDeCiclo(cicloSpilloverBody, diaCorte);
        } else {
          const d = new Date(fecha + 'T12:00:00');
          let year = d.getFullYear(), month = d.getMonth();
          if (d.getDate() >= diaCorte) { month += 1; if (month > 11) { month = 0; year += 1; } }
          const lastDay = new Date(year, month + 1, 0).getDate();
          const day = Math.min(diaCorte, lastDay);
          fechaPrimerCorte = new Date(year, month, day).toISOString().slice(0, 10);
        }

        const allParts = splits.filter(sp => sp.persona_id && sp.persona_id !== 'personal' && parseFloat(sp.monto) > 0)
          .map(sp => ({ key: sp.persona_id, monto: Math.round(parseFloat(sp.monto)) }));
        if (remainder > 0) allParts.push({ key: 'personal', monto: remainder });

        for (const part of allParts) {
          const dif = await api('/diferidas', { method: 'POST', body: {
            tarjeta_id: tarjeta.id, etiqueta: descripcion, monto: part.monto,
            tasa_mv: cobrarIntereses ? tarjeta.tasa_mv_diferidas : 0,
            num_cuotas: parseInt(numCuotas), fecha_compra: fecha,
            fecha_primer_corte: fechaPrimerCorte, estado: 'activo', notas: 'Creada desde compra dividida'
          }});
          diferidaIds[part.key] = dif.id;
        }
        toast('Diferidas creadas a ' + numCuotas + ' cuotas' + (cobrarIntereses ? '' : ' (sin intereses)'));
      }

      // Spillover Fase 2: cada parte de la compra dividida se registra en el ciclo DESTINO (siguiente)
      // con ciclo_manual=1 (para que syncData paso 5 no la re-derive de la fecha). El backend POST /compras
      // respeta ciclo_manual+ciclo por compra. Sin spillover → ciclo natural, sin ciclo_manual (igual que antes).
      const base = { fecha, descripcion, valor_usd: usdNum, tasa_usd: tasaNum, estado: isDiferida ? 'diferida' : 'pendiente', ciclo: cicloSpilloverBody || ciclo, ciclo_manual: cicloSpilloverBody ? 1 : 0, notas, nota_personal: notaPersonal || null, tasa_intl: tasaIntlNum, grupo_id: grupoId, es_internacional: esInternacional ? 1 : 0 };
      const compras = splits
        .filter(sp => sp.persona_id && sp.persona_id !== 'personal' && parseFloat(sp.monto) > 0)
        .map(sp => ({ ...base, persona_id: parseInt(sp.persona_id), valor_cop: Math.round(parseFloat(sp.monto)), diferida_id: diferidaIds[sp.persona_id] || null }));
      if (remainder > 0) compras.push({ ...base, persona_id: null, valor_cop: remainder, diferida_id: diferidaIds['personal'] || null });
      if (compras.length === 0) { toastErr('Agrega al menos una persona con monto'); return; }
      // Conversión: el usuario abrió una compra individual existente y activó "dividir".
      // Marcamos la compra original para que saveCompra la elimine antes de crear las
      // nuevas, evitando duplicados. (DELETE en cascada limpia diferida_id y bolsillo_cuotas.)
      if (item && !item._isGrupo && item.id) {
        compras._replaceItemId = item.id;
      }
      onSave(compras);
      return;
    }

    // Si tiene cuotas: crear diferida PRIMERO para obtener su id, luego la compra
    let diferida_id = null;
    if (numCuotas > 1 && !item && tarjeta) {
      const diaCorte = tarjeta.dia_corte || 30;
      // Spillover Fase 2: si el banco factura en el corte SIGUIENTE, la diferida arranca en el corte del
      // ciclo DESTINO; si no, en el corte natural de la fecha. fecha_compra se conserva en la fecha real
      // (abajo) para que syncData paso 11 no reajuste este primer corte. La compra vinculada toma el ciclo
      // destino via el payload (ciclo: cicloSpilloverBody || ... , ya existente).
      let fechaPrimerCorte;
      if (cicloSpilloverBody) {
        fechaPrimerCorte = corteDeCiclo(cicloSpilloverBody, diaCorte);
      } else {
        const d = new Date(fecha + 'T12:00:00');
        let year = d.getFullYear(), month = d.getMonth();
        if (d.getDate() >= diaCorte) { month += 1; if (month > 11) { month = 0; year += 1; } }
        const lastDay = new Date(year, month + 1, 0).getDate();
        const day = Math.min(diaCorte, lastDay);
