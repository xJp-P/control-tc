            e('button', { className: 'btn btn-success', onClick: submitAbonoCapital, disabled: abonoCapitalSaving }, abonoCapitalSaving ? 'Aplicando...' : 'Confirmar y aplicar')
          )
        );

        return e('form', { onSubmit: fetchAbonoPreview },
          e('div', { style: { marginBottom: 12, fontSize: 13, color: 'var(--text-secondary)' } },
            'El abono se distribuye en orden: 1° Compras nacionales (más antiguas primero) → 2° Compras internacionales → 3° Cuotas diferidas → 4° Avances.'
          ),
          e('div', { className: 'form-row' },
            e('div', { className: 'form-group' },
              e('label', { className: 'form-label' }, 'Fecha'),
              e('input', { type: 'date', className: 'form-input', value: abonoCapitalFecha, onChange: ev => setAbonoCapitalFecha(ev.target.value), required: true })
            ),
            e('div', { className: 'form-group' },
              e('label', { className: 'form-label' }, 'Monto'),
              e(MoneyInput, { value: abonoCapitalMonto, onChange: val => setAbonoCapitalMonto(val), required: true, placeholder: 'Ej: 1.000.000' })
            )
          ),
          e('div', { className: 'modal-actions' },
            e('button', { type: 'button', className: 'btn', onClick: closeAbonoCapital }, 'Cancelar'),
            e('button', { type: 'submit', className: 'btn btn-success', disabled: abonoCapitalSaving }, abonoCapitalSaving ? 'Calculando...' : 'Ver resumen →')
          )
        );
      })()
    ),
    // Bolsillo modal (soporta compras regulares, diferidas y avances)
    (() => {
      if (!bolsilloCompra) return e(Modal, { show: showBolsilloModal, onClose: () => setShowBolsilloModal(false), title: 'Bolsillo' });
      var isAvance = !!bolsilloCompra._isAvance;
      var isDif = bolsilloCompra.estado === 'diferida';
      var isCuotaTarget = isDif || isAvance;
      var target = bolsilloCompra._bolsilloTarget || (isCuotaTarget ? (bolsilloCompra.cuotaCorte || bolsilloCompra.valor_cop) : bolsilloCompra.valor_cop);
      var mb = bolsilloCompra.monto_bolsillo || 0;
      // Helper: construir body con cuota_num para diferidas y avances per-cuota
      var mkBody = function(monto) { var b = { monto_bolsillo: monto }; if ((isDif || isAvance) && bolsilloCompra.cuota_num) b.cuota_num = bolsilloCompra.cuota_num; return b; };
      var bState = isCuotaTarget
        ? (mb >= target ? 'bolsillo' : mb > 0 ? 'bolsillo_parcial' : 'pendiente')
        : bolsilloCompra.estado;
      var modalTitle = bState === 'pendiente' ? 'Apartar en Bolsillo' : bState === 'bolsillo' ? 'Retirar de Bolsillo' : 'Gestionar Bolsillo';
      var endpoint = isAvance ? '/avances/' + bolsilloCompra.id + '/bolsillo' : bolsilloCompra._isDiferida ? '/diferidas/' + bolsilloCompra.id + '/bolsillo' : '/compras/' + bolsilloCompra.id + '/bolsillo';
      return e(Modal, { show: showBolsilloModal, onClose: () => setShowBolsilloModal(false), title: modalTitle },
        e('div', null,
          e('div', { style: { marginBottom: 16, padding: '12px 16px', background: 'var(--bg-tertiary)', borderRadius: 8 } },
            e('div', { style: { fontSize: 13, color: 'var(--text-secondary)', marginBottom: 4 } }, bolsilloCompra.descripcion),
            isAvance && bolsilloCompra.cuota_num && e('div', { style: { fontSize: 12, color: 'var(--accent)', marginBottom: 4 } }, 'Cuota ' + bolsilloCompra.cuota_num + '/' + (bolsilloCompra.cuotas_total || '?')),
            isDif && bolsilloCompra.cuota_num && e('div', { style: { fontSize: 12, color: 'var(--accent)', marginBottom: 4 } }, 'Cuota ' + bolsilloCompra.cuota_num + '/' + bolsilloCompra.cuotas_total),
            isDif && bolsilloCompra.persona_id && e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginBottom: 4 } }, 'Parte de: ' + (bolsilloCompra.persona_nombre || 'Tercero')),
            e('div', { style: { fontSize: 18, fontWeight: 700 } }, (isCuotaTarget ? 'Cuota: ' : 'Total: '), fmtCOP(target)),
            isDif && target !== bolsilloCompra.valor_cop && e('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginTop: 2 } }, 'Valor total compra: ' + fmtCOP(bolsilloCompra.valor_cop)),
            mb > 0 && e('div', { style: { fontSize: 13, color: 'var(--success)', marginTop: 4 } }, 'Apartado actualmente: ', fmtCOP(mb))
          ),
          bState === 'pendiente' && e('div', null,
            e('button', { type: 'button', className: 'btn btn-success', style: { width: '100%', marginBottom: 12, marginTop: 12 }, onClick: () => {
              api(endpoint, { method: 'PUT', body: mkBody(target) })
                .then(() => { setShowBolsilloModal(false); refreshAll(); toast((isAvance ? 'Cuota' : 'Compra') + ' apartada en bolsillo'); });
            } }, 'Apartar todo (' + fmtCOP(target) + ')'),
            e('div', { style: { textAlign: 'center', fontSize: 13, color: 'var(--text-muted)', marginBottom: 12 } }, 'o apartar un monto parcial:')
          ),
          bState === 'bolsillo' && e('div', { style: { marginTop: 12, marginBottom: 12, fontSize: 13, color: 'var(--text-secondary)' } },
            'Ingresa el nuevo monto apartado (menor al total para parcial, 0 para quitar):'
          ),
          bState === 'bolsillo_parcial' && e('button', { type: 'button', className: 'btn btn-success', style: { width: '100%', marginBottom: 8, marginTop: 12 }, onClick: () => {
              api(endpoint, { method: 'PUT', body: mkBody(target) })
                .then(() => { setShowBolsilloModal(false); refreshAll(); toast('Apartado en bolsillo'); });
            } }, 'Apartar restante (' + fmtCOP(target - mb) + ')'),
          e('div', { className: 'form-group' },
            e('label', { className: 'form-label' }, bState === 'bolsillo_parcial' ? 'Monto a agregar' : 'Monto apartado'),
            e(MoneyInput, { value: bolsilloMonto, onChange: val => setBolsilloMonto(val), placeholder: 'Ej: 50.000' }),
            (() => {
              var val = parseFloat(bolsilloMonto) || 0;
              if (!val) return null;
              if (bState === 'bolsillo_parcial') {
                var totalR = mb + val;
                return totalR >= target
                  ? e('div', { className: 'form-hint', style: { color: 'var(--success)' } }, 'Total resultante: ' + fmtCOP(totalR) + ' — Cubre el total')
                  : e('div', { className: 'form-hint', style: { color: 'var(--warning)' } }, 'Total resultante: ' + fmtCOP(totalR) + ' · Faltaria: ' + fmtCOP(target - totalR));
              }
              return val < target
                ? e('div', { className: 'form-hint', style: { color: 'var(--warning)' } }, 'Faltaria: ' + fmtCOP(target - val))
                : e('div', { className: 'form-hint', style: { color: 'var(--success)' } }, 'Cubre el total — se marcara como Bolsillo completo');
            })()
          ),
          e('div', { className: 'modal-actions', style: { marginTop: 16 } },
            bState !== 'pendiente' && e('button', { type: 'button', className: 'btn btn-danger', onClick: () => {
              api(endpoint, { method: 'PUT', body: mkBody(0) })
                .then(() => { setShowBolsilloModal(false); refreshAll(); toast('Bolsillo removido'); });
            } }, 'Quitar de bolsillo'),
            e('button', { type: 'button', className: 'btn', onClick: () => setShowBolsilloModal(false) }, 'Cancelar'),
            e('button', { type: 'button', className: 'btn btn-primary', onClick: saveBolsillo }, 'Guardar')
          )
        )
      );
    })()
  );
}

function CompraForm({ item, personas, ciclo, tarjeta, onSave, onCancel }) {
  const [fecha, setFecha] = useState(item ? item.fecha : todayISO());
  const [descripcion, setDescripcion] = useState(item ? item.descripcion : '');
  const [valorCop, setValorCop] = useState(item ? item.valor_cop : '');
  const [valorUsd, setValorUsd] = useState(item ? (item.valor_usd || '') : '');
  const [tasaUsd, setTasaUsd] = useState(item ? (item.tasa_usd || '') : '');
  const [personaId, setPersonaId] = useState(item ? (item.persona_id || '') : '');
  const [notas, setNotas] = useState(item ? (item.notas || '') : '');
  // Checkbox unificado: marca la compra como internacional (acumula intereses) y opcionalmente
  // permite registrar valor USD + tasa (datos informativos, no obligatorios).
  const [esInternacional, setEsInternacional] = useState(item ? !!(item.es_internacional || item.valor_usd) : false);
  const [numCuotas, setNumCuotas] = useState(item ? (item.num_cuotas || 1) : 1);
  const [cobrarIntereses, setCobrarIntereses] = useState(true);
  const [dividir, setDividir] = useState(item && item._isGrupo ? true : false);
  const [splits, setSplits] = useState(() => {
    if (item && item._isGrupo) {
      const sp = item._partes.filter(p => p.persona_id).map(p => ({ persona_id: String(p.persona_id), monto: String(p.valor_cop) }));
      return sp.length > 0 ? sp : [{ persona_id: '', monto: '' }];
    }
    return [{ persona_id: '', monto: '' }];
  });
  const lastUsdField = useRef(null); // tracks which field was edited last: 'usd', 'tasa', 'cop'

  function onUsdChange(val) { lastUsdField.current = 'usd'; setValorUsd(val); }
  function onTasaChange(val) { lastUsdField.current = 'tasa'; setTasaUsd(val); }
  function onCopUsdChange(val) { lastUsdField.current = 'cop'; setValorCop(val); }

  // Auto-calculate the missing field based on the other two — solo si la compra es intl
  // y el usuario está completando los campos USD opcionales.
  useEffect(() => {
    if (!esInternacional) return;
    const field = lastUsdField.current;
    if (!field) return;
    const usd = parseFloat(valorUsd);
    const tasa = parseFloat(tasaUsd);
    const cop = parseFloat(valorCop);
    if (field === 'cop' && usd > 0 && cop > 0) {
      const calc = Math.round(cop / usd);
      if (calc !== Math.round(tasa)) setTasaUsd(calc);
    } else if ((field === 'tasa' || field === 'usd') && usd > 0 && tasa > 0) {
      const calc = Math.round(usd * tasa);
      if (calc !== Math.round(cop)) setValorCop(calc);
    }
  }, [valorUsd, tasaUsd, valorCop, esInternacional]);

  async function submit(ev) {
    ev.preventDefault();
    const totalCop = parseFloat(valorCop) || 0;

    // USD/Tasa son opcionales — solo se guardan si la compra es intl y el usuario los proveyó.
    const usdNum = esInternacional && valorUsd !== '' && !isNaN(parseFloat(valorUsd)) ? parseFloat(valorUsd) : null;
    const tasaNum = esInternacional && tasaUsd !== '' && !isNaN(parseFloat(tasaUsd)) ? parseFloat(tasaUsd) : null;

    // Edicion de grupo existente: diff splits vs originales, sin crear nuevas diferidas
    if (dividir && splits.length > 0 && item && item._isGrupo) {
      const totalSplits = splits.reduce((s, sp) => s + (parseFloat(sp.monto) || 0), 0);
      const remainder = Math.round(totalCop - totalSplits);
      if (totalSplits > totalCop) { toastErr('La suma de los montos supera el total'); return; }
      if (remainder < 0) { toastErr('La suma de los montos supera el total'); return; }
      onSave({
        _editGrupo: true,
        _grupoId: item._grupoId,
        _partesOriginales: item._partes,
        fecha, descripcion,
        valor_usd: usdNum,
        tasa_usd: tasaNum,
        es_internacional: esInternacional ? 1 : 0,
        splits: splits.filter(sp => sp.persona_id && parseFloat(sp.monto) > 0),
        remainder
      });
      return;
    }

    // Split purchase: create one compra per persona + personal remainder
    if (dividir && splits.length > 0) {
      const totalSplits = splits.reduce((s, sp) => s + (parseFloat(sp.monto) || 0), 0);
      const remainder = Math.round(totalCop - totalSplits);
      if (totalSplits > totalCop) { toastErr('La suma de los montos supera el total'); return; }
      const grupoId = (crypto.randomUUID ? crypto.randomUUID() : 'g' + Date.now().toString(36) + Math.random().toString(36).slice(2, 10));
      const isDiferida = numCuotas > 1;

      // Si es diferida, crear una diferida por cada parte
      const diferidaIds = {};
      if (isDiferida && tarjeta) {
        const diaCorte = tarjeta.dia_corte || 30;
        const d = new Date(fecha + 'T12:00:00');
        let year = d.getFullYear(), month = d.getMonth();
        if (d.getDate() >= diaCorte) { month += 1; if (month > 11) { month = 0; year += 1; } }
        const lastDay = new Date(year, month + 1, 0).getDate();
        const day = Math.min(diaCorte, lastDay);
        const fechaPrimerCorte = new Date(year, month, day).toISOString().slice(0, 10);

        const allParts = splits.filter(sp => sp.persona_id && parseFloat(sp.monto) > 0)
          .map(sp => ({ key: sp.persona_id, monto: Math.round(parseFloat(sp.monto)) }));
        if (remainder > 0) allParts.push({ key: 'personal', monto: remainder });

        for (const part of allParts) {
          const dif = await api('/diferidas', { method: 'POST', body: {
            tarjeta_id: tarjeta.id, etiqueta: descripcion, monto: part.monto,
            tasa_mv: cobrarIntereses ? tarjeta.tasa_mv_diferidas : 0,
            num_cuotas: parseInt(numCuotas), fecha_compra: fecha,
            fecha_primer_corte: fechaPrimerCorte, estado: 'activo', notas: 'Creada desde compra dividida'
          }});
          diferidaIds[part.key] = dif.id;
        }
        toast('Diferidas creadas a ' + numCuotas + ' cuotas' + (cobrarIntereses ? '' : ' (sin intereses)'));
      }

      const base = { fecha, descripcion, valor_usd: usdNum, tasa_usd: tasaNum, estado: isDiferida ? 'diferida' : 'pendiente', ciclo, notas, grupo_id: grupoId, es_internacional: esInternacional ? 1 : 0 };
      const compras = splits
        .filter(sp => sp.persona_id && parseFloat(sp.monto) > 0)
        .map(sp => ({ ...base, persona_id: parseInt(sp.persona_id), valor_cop: Math.round(parseFloat(sp.monto)), diferida_id: diferidaIds[sp.persona_id] || null }));
      if (remainder > 0) compras.push({ ...base, persona_id: null, valor_cop: remainder, diferida_id: diferidaIds['personal'] || null });
      if (compras.length === 0) { toastErr('Agrega al menos una persona con monto'); return; }
      // Conversión: el usuario abrió una compra individual existente y activó "dividir".
      // Marcamos la compra original para que saveCompra la elimine antes de crear las
      // nuevas, evitando duplicados. (DELETE en cascada limpia diferida_id y bolsillo_cuotas.)
      if (item && !item._isGrupo && item.id) {
        compras._replaceItemId = item.id;
      }
      onSave(compras);
      return;
    }

    // Si tiene cuotas: crear diferida PRIMERO para obtener su id, luego la compra
    let diferida_id = null;
    if (numCuotas > 1 && !item && tarjeta) {
      const diaCorte = tarjeta.dia_corte || 30;
      const d = new Date(fecha + 'T12:00:00');
      let year = d.getFullYear(), month = d.getMonth();
      if (d.getDate() >= diaCorte) { month += 1; if (month > 11) { month = 0; year += 1; } }
      const lastDay = new Date(year, month + 1, 0).getDate();
      const day = Math.min(diaCorte, lastDay);
      const fechaPrimerCorte = new Date(year, month, day).toISOString().slice(0, 10);
      const dif = await api('/diferidas', { method: 'POST', body: {
        tarjeta_id: tarjeta.id,
        etiqueta: descripcion,
        monto: totalCop,
        tasa_mv: cobrarIntereses ? tarjeta.tasa_mv_diferidas : 0,
        num_cuotas: parseInt(numCuotas),
        fecha_compra: fecha,
        fecha_primer_corte: fechaPrimerCorte,
        estado: 'activo',
        notas: 'Creada desde compra'
      }});
      diferida_id = dif.id;
      toast('Diferida creada a ' + numCuotas + ' cuotas' + (cobrarIntereses ? '' : ' (sin intereses)'));
    }

    // Save the compra con diferida_id vinculado
    const compraData = {
      fecha, descripcion, valor_cop: totalCop,
      valor_usd: usdNum,
      tasa_usd: tasaNum,
      persona_id: personaId ? parseInt(personaId) : null,
      estado: numCuotas > 1 ? 'diferida' : 'pendiente', ciclo,
      notas: numCuotas > 1 ? (notas ? notas + ' | ' : '') + 'Diferida a ' + numCuotas + ' cuotas' : notas,
      diferida_id,
      es_internacional: esInternacional ? 1 : 0
    };
    onSave(compraData);
  }

  const totalCopNum = parseFloat(valorCop) || 0;
  const totalSplits = splits.reduce((s, sp) => s + (parseFloat(sp.monto) || 0), 0);
  const remainder = Math.round(totalCopNum - totalSplits);

  // ¿La tarjeta de la compra acumula intereses sobre compras intl en COP?
  // Por ahora solo Bancolombia Visa (validado contra extracto real).
  const _frForm = tarjeta && tarjeta.franquicia ? tarjeta.franquicia.toLowerCase() : '';
  const _dualForm = _frForm.includes('mastercard') || _frForm.includes('amex') || _frForm.includes('american express');
  const aplicaIntlForm = !!(tarjeta && tarjeta.banco && tarjeta.banco.toLowerCase().includes('bancolombia') && !_dualForm);
  const intlCheckboxLabel = aplicaIntlForm ? 'Compra internacional (acumula intereses)' : 'Compra Internacional';

  return e('form', { onSubmit: submit },
    e('div', { className: 'form-row' },
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Fecha'),
        e('input', { type: 'date', className: 'form-input', value: fecha, onChange: ev => setFecha(ev.target.value), required: true })
      ),
      !dividir && e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Persona'),
        e('select', { className: 'form-select', value: personaId, onChange: ev => setPersonaId(ev.target.value) },
          e('option', { value: '' }, 'Personal'),
          personas.map(p => e('option', { key: p.id, value: p.id }, p.nombre))
        )
      )
    ),
    e('div', { className: 'form-group' },
      e('label', { className: 'form-label' }, 'Descripcion'),
      e('input', { type: 'text', className: 'form-input', value: descripcion, onChange: ev => setDescripcion(ev.target.value), required: true })
    ),
    e('div', { style: { marginBottom: 12 } },
      e('label', { style: { cursor: 'pointer', fontSize: 13 } },
        e('input', { type: 'checkbox', checked: esInternacional, onChange: ev => setEsInternacional(ev.target.checked), style: { marginRight: 6 } }),
        intlCheckboxLabel
      ),
      esInternacional && e('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginTop: 2, marginLeft: 20 } },
        aplicaIntlForm
          ? 'El banco cobra interés sobre el saldo. Si la compra fue en USD, puedes registrar valor y tasa abajo (opcional).'
          : 'Esta tarjeta no genera intereses internacionales en este sistema, pero puedes registrar el valor en USD y la tasa abajo (opcional).'
      )
    ),
    e('div', { className: 'form-group' },
      e('label', { className: 'form-label' }, 'Valor COP'),
      e(MoneyInput, { value: valorCop, onChange: val => esInternacional ? onCopUsdChange(val) : setValorCop(val), required: true }),
      esInternacional && lastUsdField.current === 'cop' && tasaUsd && e('div', { className: 'form-hint' }, 'Tasa calculada: ' + fmtCOP(tasaUsd) + ' por USD')
    ),
    esInternacional && e('div', { className: 'form-row' },
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Valor USD ', e('span', { style: { color: 'var(--text-muted)', fontWeight: 400 } }, '(opcional)')),
        e('input', { type: 'number', step: '0.01', className: 'form-input', value: valorUsd, onChange: ev => onUsdChange(ev.target.value), placeholder: 'Ej: 9.99' })
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Tasa USD ', e('span', { style: { color: 'var(--text-muted)', fontWeight: 400 } }, '(opcional)')),
        e(MoneyInput, { value: tasaUsd, onChange: val => onTasaChange(val), placeholder: 'Ej: 4.150' })
      )
    ),
    e('div', { style: { marginBottom: dividir ? 6 : 12 } },
      e('label', { style: { cursor: item && item._isGrupo ? 'default' : 'pointer', fontSize: 13, opacity: item && item._isGrupo ? 0.7 : 1 } },
        e('input', { type: 'checkbox', checked: dividir, onChange: ev => { if (!(item && item._isGrupo)) setDividir(ev.target.checked); }, disabled: !!(item && item._isGrupo), style: { marginRight: 6 } }),
        'Dividir entre personas'
      ),
      dividir && e('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginTop: 4, marginLeft: 20 } },
        item && item._isGrupo
          ? 'Edita los montos por persona o agrega/quita personas. Cuotas no se modifican.'
          : 'Se crean entradas separadas por cada parte. Tu parte es el resto que no asignes a nadie.'
      )
    ),
    dividir && e('div', { style: { background: 'var(--bg-tertiary)', borderRadius: 8, padding: '12px', marginBottom: 12 } },
      splits.map((sp, i) => e('div', { key: i, style: { display: 'flex', gap: 8, alignItems: 'center', marginBottom: 8 } },
        e('div', { style: { flex: 2 } },
          e('select', { className: 'form-select', value: sp.persona_id,
            onChange: ev => setSplits(prev => prev.map((s, j) => j === i ? { ...s, persona_id: ev.target.value } : s)) },
            e('option', { value: '' }, 'Seleccionar persona'),
            personas.map(p => e('option', { key: p.id, value: p.id }, p.nombre))
          )
        ),
        e('div', { style: { flex: 1 } },
          e(MoneyInput, { value: sp.monto, placeholder: '0',
            onChange: val => setSplits(prev => prev.map((s, j) => j === i ? { ...s, monto: val } : s)) })
        ),
        splits.length > 1 && e('button', { type: 'button', className: 'btn btn-sm btn-danger',
          onClick: () => setSplits(prev => prev.filter((_, j) => j !== i)) }, '\u00D7')
      )),
      e('div', { style: { display: 'flex', gap: 8, marginBottom: 8 } },
        e('button', { type: 'button', className: 'btn btn-sm',
          onClick: () => setSplits(prev => [...prev, { persona_id: '', monto: '' }]) }, '+ Agregar persona'),
        totalCopNum > 0 && e('button', { type: 'button', className: 'btn btn-sm',
          onClick: () => {
            const numPartes = splits.length + 1; // personas + yo
            const cuota = Math.floor(totalCopNum / numPartes);
            const resto = totalCopNum - cuota * numPartes;
            setSplits(prev => prev.map((s, i) => ({ ...s, monto: String(i === 0 ? cuota + resto : cuota) })));
          }
        }, '\u00F7 Partes iguales')
      ),
      totalCopNum > 0 && e('div', { style: { fontSize: 12, marginTop: 4 } },
        e('span', { style: { color: remainder < 0 ? 'var(--danger)' : remainder === 0 ? 'var(--success)' : 'var(--text-secondary)' } },
          remainder < 0 ? 'Excede el total en ' + fmtCOP(Math.abs(remainder))
            : remainder === 0 ? 'Dividido al 100%'
            : 'Tu parte: ' + fmtCOP(remainder)
        )
      )
    ),
    e('div', { className: 'form-row' },

// PAGOS (per card)
// ═══════════════════════════════════════════════════════════════════
function Pagos({ tarjeta, onDataChange }) {
  const [extractos, setExtractos] = useState([]);
  const [pagos, setPagos] = useState([]);
  const [showPagoModal, setShowPagoModal] = useState(false);
  const [pagoExtracto, setPagoExtracto] = useState(null);
  const [pagoMonto, setPagoMonto] = useState('');
  const [pagoFecha, setPagoFecha] = useState(todayISO());
  const [pagoTipo, setPagoTipo] = useState('pago_minimo');

  const loadExtractos = useCallback(() => { api('/extractos?tarjeta_id=' + tarjeta.id).then(setExtractos); }, [tarjeta.id]);
  const loadPagos = useCallback(() => { api('/pagos?tarjeta_id=' + tarjeta.id).then(setPagos); }, [tarjeta.id]);
  useEffect(() => { loadExtractos(); loadPagos(); }, [loadExtractos, loadPagos]);

  function openPagar(ext) {
    setPagoExtracto(ext);
    var restante = Math.max(0, ext.pago_minimo - (ext.monto_pagado || 0));
    setPagoMonto(restante);
    setPagoTipo('pago_restante');
    setPagoFecha(todayISO());
    setShowPagoModal(true);
  }

  async function submitPago(ev) {
    ev.preventDefault();
    var monto = parseFloat(pagoMonto);
    if (!monto || monto <= 0) { toast('Ingresa un monto valido'); return; }
    await api('/extractos/' + pagoExtracto.id + '/pagar', {
      method: 'PUT',
      body: { monto_pagado: monto, fecha_pagado: pagoFecha, tipo: 'abono_extracto' }
    });
    setShowPagoModal(false);
    loadExtractos(); loadPagos();
    if (onDataChange) onDataChange();
    var nuevoTotal = (pagoExtracto.monto_pagado || 0) + monto;
    toast(nuevoTotal >= pagoExtracto.pago_minimo ? 'Pago minimo completado' : 'Abono registrado');
  }


  function fmtCiclo(c) { const [y, m] = c.split('-'); const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return meses[parseInt(m)-1] + ' ' + y; }

  const hoy = todayISO();
  const totalPagado = pagos.reduce((s, p) => s + p.monto, 0);
  const cicloAct = cicloActual();
  const extCicloActual = extractos.find(x => x.ciclo === cicloAct);
  const extFaltaPagar = extractos.filter(x => x.ciclo !== cicloAct && x.estado === 'pendiente' && x.fecha_corte <= hoy).sort((a, b) => a.ciclo.localeCompare(b.ciclo));
  const extProximosCiclos = extractos.filter(x => x.ciclo !== cicloAct && x.estado === 'pendiente' && x.fecha_corte > hoy).sort((a, b) => a.ciclo.localeCompare(b.ciclo));
  const extHistoricosPagados = extractos.filter(x => x.estado === 'pagado').sort((a, b) => b.ciclo.localeCompare(a.ciclo));

  const [expandedExt, setExpandedExt] = useState(null);

  function renderExtractoRows(ext) {
    const vencido = ext.estado === 'pendiente' && ext.fecha_pago < hoy;
    const isExpanded = expandedExt === ext.id;
    const hasDetail = (ext.compras > 0 || (ext.detalle_avances && ext.detalle_avances.length > 0) || (ext.detalle_diferidas && ext.detalle_diferidas.length > 0));
    const rows = [];

    rows.push(e('tr', {
      key: ext.id,
      style: Object.assign({}, ext.estado === 'pagado' ? { background: 'rgba(52,211,153,0.08)' } : vencido ? { background: 'rgba(239,68,68,0.08)' } : {}, hasDetail ? { cursor: 'pointer' } : {}),
      onClick: hasDetail ? () => setExpandedExt(isExpanded ? null : ext.id) : undefined
    },
      e('td', { style: { fontWeight: 600 } }, hasDetail ? (isExpanded ? '\u25BC ' : '\u25B6 ') : '  ', fmtCiclo(ext.ciclo)),
      e('td', null, fmtDate(ext.fecha_corte)),
      e('td', { style: { color: vencido ? 'var(--danger)' : '' } }, fmtDate(ext.fecha_pago), vencido && e('span', { style: { color: 'var(--danger)', fontSize: 11, marginLeft: 6 } }, 'VENCIDO')),
      e('td', { className: 'text-right text-mono' }, fmtCOP(ext.pago_minimo)),
      e('td', { className: 'text-right text-mono' }, fmtCOP(ext.pago_total)),
      e('td', { className: 'text-right text-mono', style: { fontSize: 12, color: ext.intereses_intl > 0 ? '#14b8a6' : 'var(--text-muted)', fontWeight: ext.intereses_intl > 0 ? 600 : 400 } },
        ext.intereses_intl > 0 ? fmtCOP(ext.intereses_intl) : '\u2014'
      ),
      e('td', { className: 'text-right text-mono', style: { fontWeight: 700, color: ext.monto_pagado > 0 ? 'var(--success)' : '' } },
        ext.monto_pagado > 0 ? e('span', null, fmtCOP(ext.monto_pagado),
          ext.estado === 'pendiente' && ext.monto_pagado < ext.pago_minimo
            ? e('div', { style: { fontSize: 10, color: 'var(--text-muted)', fontWeight: 400 } }, 'Falta: ' + fmtCOP(ext.pago_minimo - ext.monto_pagado))
            : null
        ) : '-'
      ),
      e('td', null,
        ext.estado === 'pagado'
          ? e('span', { className: 'badge badge-pagado' }, 'PAGADO')
          : ext.monto_pagado > 0 && ext.monto_pagado < ext.pago_minimo
            ? e('span', { className: 'badge', style: { background: 'rgba(251,191,36,0.15)', color: 'var(--warning)' } }, 'ABONADO')
            : vencido
              ? e('span', { className: 'badge badge-vencido' }, 'VENCIDO')
              : e('span', { className: 'badge badge-pendiente' }, 'PENDIENTE')
      ),
      e('td', { onClick: ev => ev.stopPropagation() },
        ext.estado === 'pendiente'
          ? e('button', { className: 'btn btn-sm btn-success', onClick: () => openPagar(ext) }, e(Ico, { name: 'dollar', size: 14 }),
              ext.monto_pagado > 0 ? ' Abonar' : ' Pagar')
          : null
      )
    ));

    if (isExpanded) {
      var cellStyle = { padding: '6px 8px', borderBottom: '1px solid rgba(255,255,255,0.06)' };
      var cellR = Object.assign({}, cellStyle, { textAlign: 'right' });
      var headerStyle = { padding: '8px', fontWeight: 700, fontSize: 12, borderBottom: '1px solid var(--border)', color: 'var(--text-secondary)' };
      var subRowStyle = { padding: '4px 8px 4px 24px', borderBottom: '1px solid rgba(255,255,255,0.04)', fontSize: 12, color: 'var(--text-secondary)' };
      var subRowR = Object.assign({}, subRowStyle, { textAlign: 'right' });

      var desgloseRows = [];

      // Merge all items into one chronological list. Compras divididas (con grupo_id) se agrupan en un item padre.
      var allItems = [];
      if (ext.detalle_compras) {
        var gruposCompras = {};
        var singlesCompras = [];
        ext.detalle_compras.forEach(function(c) {
          if (c.grupo_id) {
            if (!gruposCompras[c.grupo_id]) gruposCompras[c.grupo_id] = [];
            gruposCompras[c.grupo_id].push(c);
          } else {
            singlesCompras.push(c);
          }
        });
        singlesCompras.forEach(function(c) {
          var intl = c.interes_intl || 0;
          allItems.push({ tipo: 'compra', fecha: c.fecha || '', nombre: c.descripcion, capital: c.total, interes: intl, total: c.total + intl, valor_usd: c.valor_usd, tasa_usd: c.tasa_usd, es_internacional: c.es_internacional });
        });
        Object.keys(gruposCompras).forEach(function(gid) {
          var partes = gruposCompras[gid];
          if (partes.length > 1) {
            var first = partes[0];
            var capitalGrupo = partes.reduce(function(s, p) { return s + p.total; }, 0);
            var interesGrupo = partes.reduce(function(s, p) { return s + (p.interes_intl || 0); }, 0);
            allItems.push({
              tipo: 'compra_grupo', fecha: first.fecha || '', nombre: first.descripcion,
              capital: capitalGrupo, interes: interesGrupo, total: capitalGrupo + interesGrupo,
              valor_usd: first.valor_usd, tasa_usd: first.tasa_usd, partes: partes
            });
          } else {
            var c = partes[0];
            var intlSingle = c.interes_intl || 0;
            allItems.push({ tipo: 'compra', fecha: c.fecha || '', nombre: c.descripcion, capital: c.total, interes: intlSingle, total: c.total + intlSingle, valor_usd: c.valor_usd, tasa_usd: c.tasa_usd, es_internacional: c.es_internacional });
          }
        });
      }
      if (ext.detalle_avances) ext.detalle_avances.forEach(function(a) {
        allItems.push({ tipo: 'avance', fecha: a.fecha || '', nombre: a.etiqueta, capital: a.capital, interes: a.interes, total: a.total, valor_usd: null });
      });
      if (ext.detalle_diferidas) {
        // Agrupar diferidas divididas por grupo_id (proveniente de la compra vinculada).
        var gruposDif = {};
        var singlesDif = [];
        ext.detalle_diferidas.forEach(function(d) {
          if (d.grupo_id) {
            if (!gruposDif[d.grupo_id]) gruposDif[d.grupo_id] = [];
            gruposDif[d.grupo_id].push(d);
          } else {
            singlesDif.push(d);
          }
        });
        singlesDif.forEach(function(d) {
          allItems.push({ tipo: 'diferida', fecha: d.fecha || '', nombre: d.etiqueta, capital: d.capital, interes: d.interes, total: d.total, valor_usd: null });
        });
        Object.keys(gruposDif).forEach(function(gid) {
          var partes = gruposDif[gid];
          if (partes.length > 1) {
            var first = partes[0];
            var capitalGrupo = partes.reduce(function(s, p) { return s + p.capital; }, 0);
            var interesGrupo = partes.reduce(function(s, p) { return s + p.interes; }, 0);
            var totalGrupo = partes.reduce(function(s, p) { return s + p.total; }, 0);
            allItems.push({
              tipo: 'diferida_grupo', fecha: first.fecha || '', nombre: first.etiqueta,
              capital: capitalGrupo, interes: interesGrupo, total: totalGrupo, partes: partes
            });
          } else {
            var d = partes[0];
            allItems.push({ tipo: 'diferida', fecha: d.fecha || '', nombre: d.etiqueta, capital: d.capital, interes: d.interes, total: d.total, valor_usd: null });
          }
        });
      }
      allItems.sort(function(a, b) { return a.fecha.localeCompare(b.fecha); });

      var tipoLabel = { compra: 'Compra', avance: 'Avance', diferida: 'Diferida' };
      var tipoColor = { compra: 'var(--text-secondary)', avance: 'var(--danger)', diferida: 'var(--purple)' };

      allItems.forEach(function(item, i) {
        if (item.tipo === 'compra_grupo') {
          // Fila padre del grupo
          desgloseRows.push(e('tr', { key: 'item-grp-' + i, style: { background: 'rgba(99,102,241,0.06)' } },

              e('input', { type: 'date', className: 'form-input', value: pagoFecha, onChange: ev => setPagoFecha(ev.target.value), required: true })
            )
          ),
          e('div', { className: 'modal-actions' },
            e('button', { type: 'button', className: 'btn', onClick: () => setShowPagoModal(false) }, 'Cancelar'),
            e('button', { type: 'submit', className: 'btn btn-primary' },
              parseFloat(pagoMonto) >= restante ? 'Completar Pago' : 'Registrar Abono')
          )
        );

    )
  );
}

// ═══════════════════════════════════════════════════════════════════
// CALCULADORA
// ═══════════════════════════════════════════════════════════════════
function Calculadora({ tarjetas }) {
  const [tipo, setTipo] = useState('avance');
  const [tarjetaId, setTarjetaId] = useState('');
  const [monto, setMonto] = useState('');
  const [plazo, setPlazo] = useState('24');
  const [tasaMv, setTasaMv] = useState('');
  const [fecha, setFecha] = useState(todayISO());
  const [diaCorte, setDiaCorte] = useState('30');
  const [comision, setComision] = useState('');
  const [resultado, setResultado] = useState(null);
  const [loading, setLoading] = useState(false);
  const [bancoSel, setBancoSel] = useState('');

  function onTarjetaChange(id) {
    setTarjetaId(id); setResultado(null);
    if (!id) { setBancoSel(''); return; }
    const tj = tarjetas.find(t => String(t.id) === id);
    if (!tj) return;
    setTasaMv(((tipo === 'avance' ? tj.tasa_mv_avances : tj.tasa_mv_diferidas) * 100).toFixed(4));
    setDiaCorte(String(tj.dia_corte));
    setBancoSel(tj.banco || '');
  }

  function onTipoChange(t) {
    setTipo(t); setResultado(null);
    if (t === 'avance') setPlazo('24');
    if (tarjetaId) {
      const tj = tarjetas.find(tj => String(tj.id) === tarjetaId);
      if (tj) setTasaMv(((t === 'avance' ? tj.tasa_mv_avances : tj.tasa_mv_diferidas) * 100).toFixed(4));
    }
  }

  async function calcular(ev) {
    ev.preventDefault();
    const m = parseFloat(String(monto).replace(/\./g, '').replace(',', '.'));
    if (!m || m <= 0) { toastErr('Ingresa un monto válido'); return; }
    const p = parseInt(plazo);
    if (!p || p < 1 || p > 120) { toastErr('Cuotas debe ser entre 1 y 120'); return; }
    const t = parseFloat(tasaMv);
    if (!t || t <= 0) { toastErr('Tasa MV inválida'); return; }
    setLoading(true);
    try {
      const res = await api('/calculadora', {
        method: 'POST',
        body: { tipo, monto: m, tasa_mv: t, plazo: p, fecha, dia_corte: parseInt(diaCorte) || 30, comision: parseFloat(comision) || 0, tarjeta_id: tarjetaId || null }
      });
      if (res.error) toastErr(res.error); else setResultado(res);
    } catch(e) { toastErr('Error al calcular'); }
    setLoading(false);
  }

  const isNu = bancoSel && bancoSel.toLowerCase().includes('nu');
  const tarjetasActivas = (tarjetas || []).filter(t => t.estado === 'activa');

  var totalPagar = 0, totalIntereses = 0, primeraCuota = 0, ultimaCuota = 0;
  if (resultado && resultado.tabla && resultado.tabla.length > 0) {
    const col = tipo === 'avance' ? 'totalExtracto' : 'totalPagar';
    totalPagar = resultado.tabla.reduce((s, r) => s + r[col], 0);
    totalIntereses = resultado.resumen.totalIntereses;
    primeraCuota = resultado.tabla[0][col];
    ultimaCuota = resultado.tabla[resultado.tabla.length - 1][col];
  }

  return e('div', null,
    e('div', { className: 'section-title' }, e(Ico, { name: 'calculator', size: 20, color: 'var(--accent)' }), ' Calculadora'),
    e('div', { style: { fontSize: 13, color: 'var(--text-muted)', marginBottom: 20 } },
      'Simula la amortización de un avance o compra diferida. No afecta ningún registro.'
    ),

    // Selector de tipo
    e('div', { style: { display: 'flex', gap: 12, marginBottom: 28 } },
      e('div', {
        onClick: () => onTipoChange('avance'),
        style: { flex: 1, cursor: 'pointer', borderRadius: 14, padding: '18px 20px', border: '2px solid ' + (tipo === 'avance' ? 'var(--accent)' : 'var(--border)'), background: tipo === 'avance' ? 'var(--accent-bg)' : 'var(--bg-card)', transition: 'all 0.15s' }
      },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 14 } },
          e(Ico, { name: 'dollar', size: 28, color: tipo === 'avance' ? 'var(--accent)' : 'var(--text-muted)' }),
          e('div', null,
            e('div', { style: { fontWeight: 700, fontSize: 15, color: tipo === 'avance' ? 'var(--accent)' : 'var(--text-primary)' } }, 'Avance de Dinero'),
            e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 3 } }, 'Efectivo a cuotas · interés desde cuota 1')
          )
        )
      ),
      e('div', {
        onClick: () => onTipoChange('diferida'),
        style: { flex: 1, cursor: 'pointer', borderRadius: 14, padding: '18px 20px', border: '2px solid ' + (tipo === 'diferida' ? 'var(--accent)' : 'var(--border)'), background: tipo === 'diferida' ? 'var(--accent-bg)' : 'var(--bg-card)', transition: 'all 0.15s' }
      },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 14 } },
          e(Ico, { name: 'credit-card', size: 28, color: tipo === 'diferida' ? 'var(--accent)' : 'var(--text-muted)' }),
          e('div', null,
            e('div', { style: { fontWeight: 700, fontSize: 15, color: tipo === 'diferida' ? 'var(--accent)' : 'var(--text-primary)' } }, 'Compra Diferida'),
            e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 3 } }, 'Pago en cuotas desde la fecha de compra')
          )
        )
      )
    ),

    // Formulario
    e('form', { onSubmit: calcular },
      // Tarjeta selector
      e('div', { style: { marginBottom: 16, maxWidth: 440 } },
        e('label', { className: 'form-label' }, 'Tarjeta'),
        e('select', { className: 'form-input', value: tarjetaId, onChange: ev => onTarjetaChange(ev.target.value) },
          e('option', { value: '' }, '— Seleccionar tarjeta —'),
          tarjetasActivas.map(t => e('option', { key: t.id, value: String(t.id) }, t.nombre + (t.banco ? ' · ' + t.banco : '')))
        )
      ),

      // Info auto-filled (visible solo cuando hay tarjeta seleccionada)
      tarjetaId && e('div', { style: { display: 'flex', gap: 10, marginBottom: 20, flexWrap: 'wrap' } },
        e('div', { style: { background: 'var(--bg-tertiary)', border: '1px solid var(--border)', borderRadius: 10, padding: '8px 16px', minWidth: 90 } },
          e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.5 } }, 'Tasa MV'),
          e('div', { style: { fontSize: 15, fontWeight: 700, color: 'var(--accent)', fontFamily: 'monospace', marginTop: 2 } }, tasaMv + '%')
        ),
        e('div', { style: { background: 'var(--bg-tertiary)', border: '1px solid var(--border)', borderRadius: 10, padding: '8px 16px', minWidth: 90 } },
          e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.5 } }, 'Día de corte'),
          e('div', { style: { fontSize: 15, fontWeight: 700, color: 'var(--text-primary)', fontFamily: 'monospace', marginTop: 2 } }, diaCorte)
        ),
        tipo === 'avance' && e('div', { style: { background: 'var(--bg-tertiary)', border: '1px solid var(--border)', borderRadius: 10, padding: '8px 16px', minWidth: 90 } },
          e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.5 } }, 'Cuotas'),
          e('div', { style: { fontSize: 15, fontWeight: 700, color: 'var(--text-primary)', fontFamily: 'monospace', marginTop: 2 } }, '24')
        ),
        isNu && tipo === 'diferida' && e('div', { style: { background: 'var(--accent-bg)', border: '1px solid var(--accent)', borderRadius: 10, padding: '8px 16px' } },
          e('div', { style: { fontSize: 10, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: 0.5 } }, 'Nu Colombia'),
          e('div', { style: { fontSize: 13, fontWeight: 600, color: 'var(--accent)', marginTop: 2 } }, 'Cuota 1 sin intereses')
        )
      ),

      // Inputs del usuario
      e('div', { className: 'cards-row', style: { marginBottom: 20 } },
        // Monto
        e('div', { className: 'card', style: { flex: '1 1 160px' } },
          e('label', { className: 'form-label' }, 'Monto'),
          e('input', { className: 'form-input', type: 'text', inputMode: 'numeric',
            value: monto ? parseInt(monto, 10).toLocaleString('es-CO') : '',
            onChange: ev => { const raw = ev.target.value.replace(/\D/g, ''); setMonto(raw); setResultado(null); },
            placeholder: '5.000.000', required: true })
        ),
        // Fecha
        e('div', { className: 'card', style: { flex: '1 1 160px' } },
          e('label', { className: 'form-label' }, tipo === 'avance' ? 'Fecha desembolso' : 'Fecha de compra'),
          e('input', { className: 'form-input', type: 'date', value: fecha, onChange: ev => { setFecha(ev.target.value); setResultado(null); }, required: true })
        ),
        // Cuotas solo para diferidas
        tipo === 'diferida' && e('div', { className: 'card', style: { flex: '0 1 130px' } },
          e('label', { className: 'form-label' }, 'Nº cuotas'),
          e('input', { className: 'form-input', type: 'number', value: plazo, onChange: ev => { setPlazo(ev.target.value); setResultado(null); }, min: 1, max: 120, required: true })
        ),
        // Comisión (solo avances)
        tipo === 'avance' && e('div', { className: 'card', style: { flex: '0 1 160px' } },
          e('label', { className: 'form-label' }, 'Comisión (opcional)'),
          e('input', { className: 'form-input', type: 'number', value: comision, onChange: ev => { setComision(ev.target.value); setResultado(null); }, placeholder: '0', min: 0 }),
          e('div', { className: 'form-hint' }, 'Se suma a la 1ª cuota')
        )
      ),
      e('button', { className: 'btn btn-primary', type: 'submit', disabled: loading || !tarjetaId },
        loading ? 'Calculando...' : !tarjetaId ? 'Selecciona una tarjeta primero' : 'Calcular amortización'
      )
    ),

    // Resultado
    resultado && resultado.tabla && e('div', { style: { marginTop: 32 } },
      // Encabezado resultado
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, borderTop: '1px solid var(--border)', paddingTop: 24 } },
        e('div', { className: 'section-title', style: { margin: 0 } }, 'Resultado'),
        e('div', { style: { fontSize: 12, color: 'var(--text-muted)', background: 'var(--bg-tertiary)', borderRadius: 8, padding: '3px 10px' } },
          (tipo === 'avance' ? 'Avance' : 'Diferida') + ' · ' + resultado.tabla.length + ' cuotas · ' + tasaMv + '% MV · corte día ' + diaCorte
        )
      ),

      // Cards resumen
      e('div', { className: 'cards-row', style: { marginBottom: 24 } },
        e('div', { className: 'card card-danger' },
          e('div', { className: 'card-label' }, 'Total a Pagar'),
          e('div', { className: 'card-value' }, fmtCOP(Math.round(totalPagar))),
          e('div', { style: { display: 'flex', gap: 14, marginTop: 6 } },
            e('div', null,
              e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.4 } }, 'Capital'),
              e('div', { style: { fontSize: 12, color: 'var(--text-primary)', fontWeight: 600, fontFamily: 'monospace' } }, fmtCOP(parseFloat(monto) || 0))
            ),
            e('div', null,
              e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.4 } }, 'Intereses'),
              e('div', { style: { fontSize: 12, color: 'var(--danger)', fontWeight: 600, fontFamily: 'monospace' } }, fmtCOPDec(totalIntereses))
            )
          )
        ),
        e('div', { className: 'card card-purple' },
          e('div', { className: 'card-label' }, 'Total Intereses'),
          e('div', { className: 'card-value' }, fmtCOPDec(totalIntereses)),
          e('div', { className: 'card-sub' }, Math.round(totalIntereses / (parseFloat(monto) || 1) * 100) + '% del capital')
        ),
        e('div', { className: 'card card-warning' },
          e('div', { className: 'card-label' }, 'Primera cuota'),
          e('div', { className: 'card-value' }, fmtCOP(Math.round(primeraCuota))),
          resultado.tabla.length > 1 && e('div', { style: { display: 'flex', gap: 14, marginTop: 6 } },
            e('div', null,
              e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.4 } }, 'Última'),
              e('div', { style: { fontSize: 12, color: 'var(--text-primary)', fontWeight: 600, fontFamily: 'monospace' } }, fmtCOP(Math.round(ultimaCuota)))
            )
          )
        ),
        e('div', { className: 'card card-accent' },
          e('div', { className: 'card-label' }, 'Capital por cuota'),
          e('div', { className: 'card-value' }, fmtCOP(Math.round(resultado.resumen.cuotaCapitalFija)))
        )
      ),

      // Tabla amortización
      e('div', { className: 'section-title', style: { marginBottom: 10 } }, 'Tabla de Amortización'),
      e('table', null,
        e('thead', null, e('tr', null,
          e('th', null, 'Cuota'), e('th', null, 'Fecha corte'), e('th', null, 'Días'),
          e('th', { className: 'text-right' }, 'Saldo inicial'),
          e('th', { className: 'text-right' }, 'Capital'),
          e('th', { className: 'text-right' }, 'Interés'),
          e('th', { className: 'text-right' }, 'Total cuota')
        )),
        e('tbody', null,
          resultado.tabla.map((r, i) => {
            var total   = tipo === 'avance' ? r.totalExtracto : r.totalPagar;
            var interes = tipo === 'avance' ? r.interes       : r.interesTotal;
            var saldo   = tipo === 'avance' ? r.saldoInicio   : r.saldoInicial;
            return e('tr', { key: i },
              e('td', null, e('span', { style: { fontWeight: 600, color: 'var(--text-muted)', fontSize: 12 } }, r.numCuota + '/' + resultado.tabla.length)),
              e('td', null, fmtDate(r.fechaCorte)),
              e('td', { style: { color: 'var(--text-muted)', fontSize: 12 } }, r.dias),
              e('td', { className: 'text-right text-mono' }, fmtCOP(Math.round(saldo))),

              e('td', { className: 'text-right text-mono', style: { fontWeight: 700 } }, fmtCOP(Math.round(total)))
            );
          })
        )
      )
    )
  );
}

// HISTORIAL (Log de acciones)
// ═══════════════════════════════════════════════════════════════════
function Historial() {
  const [logs, setLogs] = useState([]);
  const [total, setTotal] = useState(0);
  const [page, setPage] = useState(0);
  const pageSize = 30;

  function loadLogs(p) {
    api('/log?limit=' + pageSize + '&offset=' + (p * pageSize)).then(data => {
      setLogs(data.rows);
      setTotal(data.total);
    });
  }

  useEffect(() => { loadLogs(page); }, [page]);

  async function clearLog() {
    const ok = await confirmDialog('Eliminar todo el historial?');
    if (!ok) return;
    api('/log', { method: 'DELETE' }).then(() => { setLogs([]); setTotal(0); setPage(0); toast('Historial limpiado'); });
  }

  const accionIcons = { crear: 'plus', editar: 'edit', eliminar: 'trash', pago: 'dollar', revertir: 'refresh' };
  const totalPages = Math.ceil(total / pageSize);

  return e('div', null,
    e('div', { className: 'section-title', style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
      e('span', null, e(Ico, { name: 'activity', size: 18, color: 'var(--accent)' }), ' Historial de Acciones'),
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 10 } },
        e('span', { style: { fontSize: 12, color: 'var(--text-muted)', fontWeight: 400 } }, total + ' registro' + (total !== 1 ? 's' : '')),
        total > 0 && e('button', { onClick: clearLog, className: 'btn btn-sm btn-danger', style: { fontSize: 11, padding: '4px 10px' } }, 'Limpiar')
      )
    ),
    logs.length === 0
      ? e('div', { style: { textAlign: 'center', padding: 40, color: 'var(--text-muted)' } }, 'No hay registros aun')
      : e('div', { style: { display: 'flex', flexDirection: 'column', gap: 2 } },
          logs.map(l =>
            e('div', { key: l.id, style: { display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', background: 'var(--bg-card)', borderRadius: 8, fontSize: 13 } },
              e('span', { style: { width: 22, textAlign: 'center', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' } }, e(Ico, { name: accionIcons[l.accion] || 'clipboard', size: 14, color: l.accion === 'crear' ? 'var(--success)' : l.accion === 'eliminar' ? 'var(--danger)' : 'var(--text-secondary)' })),
              e('div', { style: { flex: 1, minWidth: 0 } },
                e('div', { style: { color: 'var(--text-primary)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, l.descripcion),
                l.detalles && e('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginTop: 2 } }, l.detalles)
              ),
              e('div', { style: { fontSize: 11, color: 'var(--text-muted)', flexShrink: 0, textAlign: 'right', minWidth: 110 } },
                e('div', null, l.fecha.slice(0, 10)),
                e('div', null, l.fecha.slice(11, 16))
              )
            )
          ),
          totalPages > 1 && e('div', { style: { display: 'flex', justifyContent: 'center', gap: 8, marginTop: 12 } },
            e('button', { disabled: page <= 0, onClick: () => setPage(p => p - 1), style: { padding: '4px 12px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--bg-card)', color: 'var(--text-primary)', cursor: page <= 0 ? 'default' : 'pointer', opacity: page <= 0 ? 0.4 : 1, fontFamily: 'inherit' } }, '\u2190'),
            e('span', { style: { fontSize: 12, color: 'var(--text-muted)', alignSelf: 'center' } }, (page + 1) + ' / ' + totalPages),
            e('button', { disabled: page >= totalPages - 1, onClick: () => setPage(p => p + 1), style: { padding: '4px 12px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--bg-card)', color: 'var(--text-primary)', cursor: page >= totalPages - 1 ? 'default' : 'pointer', opacity: page >= totalPages - 1 ? 0.4 : 1, fontFamily: 'inherit' } }, '\u2192')
          )
        )
  );
}

// CONFIGURACION
// ═══════════════════════════════════════════════════════════════════
function BancosUrlsConfig() {
  const [urls, setUrls] = useState([]);
  const [saved, setSaved] = useState(true);
  const [newBanco, setNewBanco] = useState('');

  useEffect(() => {
    api('/config').then(cfg => {
      // Empezamos siempre desde los presets canónicos (DEFAULT_BANCO_URLS) para que
      // si el usuario en algún momento borró un built-in, se reaparezca solo.
      let list = BANCOS_PRESETS.map(b => ({ nombre: b.nombre, url: b.url, nota: b.nota || '', color: b.color, builtin: true }));
      if (cfg.bancos_urls) {
        try {
          const savedData = JSON.parse(cfg.bancos_urls);
          // Sobrescribir URLs de los built-in con las personalizadas del usuario.
          // Si el usuario guardó string vacío, conservamos la URL default (no quedaría
          // sin fallback nunca). Esto hace que la URL del built-in sea "irrompible".
          list = list.map(b => {
            const s = savedData.find(x => x.nombre === b.nombre);
            const overrideUrl = s && s.url && s.url.trim() ? s.url.trim() : null;
            return overrideUrl ? { ...b, url: overrideUrl } : b;
          });
          // Agregar bancos personalizados (no built-in) creados por el usuario.
          savedData.filter(s => !BANCOS_PRESETS.find(p => p.nombre === s.nombre)).forEach(s => {
            list.push({ nombre: s.nombre, url: s.url || '', nota: '', color: s.color || '#666', builtin: false });
          });
          // Sincronizar BANCOS_PRESETS in-memory con los overrides (sin tocar built-ins
          // si el override está vacío — la URL por defecto se mantiene).
          savedData.forEach(s => {
            const preset = BANCOS_PRESETS.find(p => p.nombre === s.nombre);
            if (preset && s.url && s.url.trim()) preset.url = s.url.trim();
          });
        } catch (e) {}
      }
      setUrls(list);
    });
  }, []);

  function updateUrl(i, val) {
    const next = [...urls];
    next[i] = { ...next[i], url: val };
    setUrls(next);
    setSaved(false);
    // Solo mutamos BANCOS_PRESETS para bancos custom (no built-in). Los built-in
    // mantienen su URL canónica viva en memoria — si el usuario guarda string
    // vacío, al recargar la app la URL default se restaura automáticamente.
    const preset = BANCOS_PRESETS.find(p => p.nombre === next[i].nombre);
    if (preset && !next[i].builtin && val && val.trim()) preset.url = val.trim();
    if (preset && next[i].builtin && val && val.trim()) preset.url = val.trim();
  }

  async function resetToDefault(i) {
    const b = urls[i];
    const defaultUrl = DEFAULT_BANCO_URLS[b.nombre];
    if (!defaultUrl) return;
    const next = [...urls];
    next[i] = { ...next[i], url: defaultUrl };
    setUrls(next);
    setSaved(false);
    const preset = BANCOS_PRESETS.find(p => p.nombre === b.nombre);
    if (preset) preset.url = defaultUrl;
    // Propagar la URL canónica también a las tarjetas individuales con ese banco
    // para evitar el caso "el preset está bien pero la tarjeta sigue con URL vieja".
    try {
      const r = await api('/config/sync-bank-url', { method: 'POST', body: { banco: b.nombre, url: defaultUrl } });
      if (r && r.tarjetasActualizadas > 0) {
        toast('URL restaurada y propagada a ' + r.tarjetasActualizadas + ' tarjeta(s)');
      } else {
        toast('URL del preset restaurada');
      }
    } catch (e) {
      toastErr('URL restaurada en preset, pero no se pudo propagar a tarjetas: ' + e.message);
    }
  }

  function addBanco() {
    const name = newBanco.trim();
    if (!name) return;
    if (urls.find(b => b.nombre.toLowerCase() === name.toLowerCase())) { toastErr('Ese banco ya existe'); return; }
    setUrls([...urls, { nombre: name, url: '', nota: '', color: '#666', builtin: false }]);
    BANCOS_PRESETS.push({ nombre: name, url: '', color: '#666' });
    setNewBanco('');
    setSaved(false);
  }

  async function removeBanco(i) {
    const b = urls[i];
    // Los built-in (Bancolombia, Nu, RappiCard) NO se pueden eliminar — solo
    // pueden ser reseteados a su URL canónica. Esto garantiza que el sistema
    // automático de scraping nunca pierda el fallback.
    if (b.builtin) {
      const ok = await confirmDialog(
        '"' + b.nombre + '" es un banco predefinido y no puede eliminarse.\n\n¿Quieres restaurar su URL al valor por defecto?',
        { confirmText: 'Restaurar URL' }
      );
      if (ok) resetToDefault(i);
      return;
    }
    if (!await confirmDialog('Eliminar "' + b.nombre + '" de la lista de bancos?', { confirmText: 'Eliminar' })) return;
    const next = urls.filter((_, j) => j !== i);
    setUrls(next);
    const pi = BANCOS_PRESETS.findIndex(p => p.nombre === b.nombre);
    if (pi >= 0) BANCOS_PRESETS.splice(pi, 1);
    setSaved(false);
  }

  function save() {
    // Include custom (non-builtin) banks too
    const allData = urls.map(b => ({ nombre: b.nombre, url: b.url, color: b.color, builtin: b.builtin }));
    api('/config/bancos_urls', { method: 'PUT', body: { value: JSON.stringify(allData) } }).then(() => { setSaved(true); toast('URLs guardadas'); });
  }

  return e('div', { className: 'config-section' },
    e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 } },
      e('div', { className: 'config-section-title', style: { margin: 0 } }, 'URLs de Tasas por Banco'),
      !saved && e('button', { className: 'btn btn-sm btn-primary', onClick: save }, 'Guardar')
    ),
    e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginBottom: 12 } }, 'Configura los enlaces donde cada banco publica sus tasas.'),
    urls.map((b, i) => {
      const defaultUrl = DEFAULT_BANCO_URLS[b.nombre];
      const isModified = b.builtin && defaultUrl && b.url !== defaultUrl;
      return e('div', { key: b.nombre + i, style: { marginBottom: 10 } },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 } },
          e('label', { style: { fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', flex: 1 } },
            b.nombre,
            b.builtin && e('span', { style: { fontSize: 10, color: 'var(--text-muted)', marginLeft: 6, fontWeight: 400 } }, '(predefinido)')
          ),
          isModified && e('button', { className: 'btn btn-sm', onClick: () => resetToDefault(i), style: { padding: '2px 10px', fontSize: 11 }, title: 'Restaurar a la URL oficial por defecto' }, 'Restaurar'),
          e('button', { className: 'btn btn-sm btn-danger', onClick: () => removeBanco(i), style: { padding: '2px 8px', fontSize: 11 } }, '\u2715')
        ),
        b.nota
          ? e('div', { style: { fontSize: 11, color: 'var(--text-muted)', fontStyle: 'italic', padding: '6px 10px', background: 'var(--bg-main)', borderRadius: 8 } }, b.nota)
          : e('input', { type: 'url', className: 'form-input', value: b.url, onChange: ev => updateUrl(i, ev.target.value), placeholder: defaultUrl || 'https://...', style: { fontSize: 12 } })
      );
    }),
    e('div', { style: { display: 'flex', gap: 8, marginTop: 12 } },
      e('input', { type: 'text', className: 'form-input', value: newBanco, onChange: ev => setNewBanco(ev.target.value), placeholder: 'Nombre del nuevo banco', style: { fontSize: 12, flex: 1 }, onKeyDown: ev => ev.key === 'Enter' && (ev.preventDefault(), addBanco()) }),
      e('button', { type: 'button', className: 'btn btn-sm btn-primary', onClick: addBanco }, '+ Agregar')
    )
  );
}

function Configuracion() {
  const [personas, setPersonas] = useState([]);
  const [showPersonaModal, setShowPersonaModal] = useState(false);
  const [appVersion, setAppVersion] = useState('');
  useEffect(() => {
    if (window.electronAPI && window.electronAPI.getVersion) {
      window.electronAPI.getVersion().then(v => setAppVersion(v));
    }
  }, []);
  const [editPersona, setEditPersona] = useState(null);

  const load = useCallback(() => { api('/personas').then(setPersonas); }, []);
  useEffect(() => { load(); }, [load]);

  function savePersona(data) {
    const method = editPersona ? 'PUT' : 'POST';
    const url = editPersona ? '/personas/' + editPersona.id : '/personas';
    api(url, { method, body: data }).then(() => { setShowPersonaModal(false); load(); toast('Persona guardada'); });
  }
  async function removePersona(id) {
    if (!await confirmDialog('Eliminar esta persona?', { confirmText: 'Eliminar' })) return;
    api('/personas/' + id, { method: 'DELETE' }).then(() => { load(); toast('Persona eliminada'); });
  }

  async function doBackup() {
    if (window.electronAPI) {
      const r = await window.electronAPI.backupDb();
      if (r.ok) toast('Backup guardado en: ' + r.path);
      else if (!r.cancelled) toastErr('Error: ' + r.error);
    } else { window.open(API + '/backup'); }
  }
  async function doRestore() {
    if (!window.electronAPI) return;
    const ok = await confirmDialog(
      'Restaurar un backup reemplazará tu base de datos actual. La app se reiniciará al finalizar para aplicar los cambios.\n\n¿Quieres continuar?',
      { confirmText: 'Restaurar' }
    );
    if (!ok) return;
    const r = await window.electronAPI.restoreDb();
    if (r.ok) {
      // Forzar la pantalla de reinicio (igual que moveDb) en lugar de depender de
      // que el usuario reinicie manualmente. El backend sigue con la DB anterior
      // en memoria hasta que el proceso se reinicia con createApp() de nuevo.
      if (r.needsRestart && window.__setNeedsRestart) window.__setNeedsRestart(true);
      else toast(r.msg);
    } else if (!r.cancelled) {
      toastErr('Error: ' + r.error);
    }
  }

  const [dbLocation, setDbLocation] = useState(null);
  useEffect(() => {
    if (window.electronAPI && window.electronAPI.getDbLocation) {
      window.electronAPI.getDbLocation().then(setDbLocation);
    }
  }, []);

  async function moveDb() {
    if (!window.electronAPI) return;
    const r = await window.electronAPI.moveDb();
    if (r.ok) {
      if (window.__setNeedsRestart) window.__setNeedsRestart(true);
    } else if (!r.cancelled) {
      toastErr(r.error);
    }
  }

  async function restoreDbLocation() {
    if (!window.electronAPI) return;
    if (!await confirmDialog('Restaurar la base de datos a su ubicacion original?', { confirmText: 'Restaurar' })) return;
    const r = await window.electronAPI.restoreDbLocation();
    if (r.ok) {
      if (window.__setNeedsRestart) window.__setNeedsRestart(true);
    } else if (!r.cancelled) {
      toastErr(r.error);
    }
  }

  return e('div', null,
    e('div', { className: 'section-title' }, e(Ico, { name: 'settings', size: 18, color: 'var(--accent)' }), ' Configuracion'),
    e('div', { className: 'config-grid' },
      // Personas
      e('div', { className: 'config-section' },
        e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 16 } },
          e('div', { className: 'config-section-title', style: { margin: 0 } }, 'Personas'),
          e('button', { className: 'btn btn-sm btn-primary', onClick: () => { setEditPersona(null); setShowPersonaModal(true); } }, '+ Agregar')
        ),
        personas.length === 0
          ? e('div', { style: { color: 'var(--text-muted)', fontSize: 13 } }, 'No hay personas configuradas')
          : personas.map(p =>
              e('div', { key: p.id, style: { display: 'flex', alignItems: 'center', gap: 10, padding: '8px 0', borderBottom: '1px solid var(--border-subtle)' } },
                e('span', { className: 'persona-dot', style: { background: p.color } }),
                e('span', { style: { flex: 1, fontWeight: 500 } }, p.nombre),
                p.telefono && e('span', { style: { color: 'var(--text-muted)', fontSize: 12 } }, p.telefono),
                e('button', { className: 'btn btn-sm', onClick: () => { setEditPersona(p); setShowPersonaModal(true); } }, e(Ico, { name: 'edit', size: 14, color: 'currentColor' })),
                e('button', { className: 'btn btn-sm btn-danger', onClick: () => removePersona(p.id) }, e(Ico, { name: 'trash', size: 14, color: 'currentColor' }))
              )
            )
      ),
      // Backup
      e('div', { className: 'config-section' },
        e('div', { className: 'config-section-title' }, 'Backup y Restauracion'),
        e('div', { style: { display: 'flex', gap: 12, flexWrap: 'wrap' } },
          e('button', { className: 'btn btn-primary', onClick: doBackup }, e(Ico, { name: 'save', size: 14 }), ' Exportar Backup'),
          e('button', { className: 'btn', onClick: doRestore }, e(Ico, { name: 'download', size: 14 }), ' Restaurar Backup')
        ),
        e('div', { style: { marginTop: 16, fontSize: 12, color: 'var(--text-muted)' } }, 'La base de datos se guarda automaticamente.')
      ),
      // Ubicacion BD
      window.electronAPI && e('div', { className: 'config-section' },
        e('div', { className: 'config-section-title' }, 'Ubicacion de la Base de Datos'),
        dbLocation && e('div', { style: { marginBottom: 12, fontSize: 13, color: 'var(--text-secondary)', wordBreak: 'break-all' } },
          e('strong', null, 'Ruta actual: '), dbLocation.currentPath
        ),
        e('div', { style: { display: 'flex', gap: 12, flexWrap: 'wrap' } },
          e('button', { className: 'btn btn-primary', onClick: moveDb }, e(Ico, { name: 'folder', size: 14 }), ' Mover Base de Datos'),
          !dbLocation?.isDefault && e('button', { className: 'btn', onClick: restoreDbLocation }, e(Ico, { name: 'refresh', size: 14 }), ' Restaurar Ubicacion Original')
        ),
        e('div', { style: { marginTop: 12, fontSize: 12, color: 'var(--text-muted)' } }, 'Mover la BD requiere reiniciar la aplicacion.')
      ),
      // URLs de Bancos
      e(BancosUrlsConfig, null),
      // Info del sistema
      e('div', { className: 'config-section' },
        e('div', { className: 'config-section-title' }, 'Info del sistema'),
        e('div', { style: { fontSize: 13, display: 'grid', gridTemplateColumns: '120px 1fr', rowGap: 6 } },
          e('span', { style: { color: 'var(--text-muted)' } }, 'Version'),
          e('span', { style: { color: 'var(--text-primary)', fontFamily: "'SF Mono','Consolas',monospace", fontSize: 12.5 } }, appVersion || '1.1.1'),
          e('span', { style: { color: 'var(--text-muted)' } }, 'Motor'),
          e('span', { style: { color: 'var(--text-primary)', fontFamily: "'SF Mono','Consolas',monospace", fontSize: 12.5 } }, 'Electron + Express'),
          e('span', { style: { color: 'var(--text-muted)' } }, 'Base de datos'),
          e('span', { style: { color: 'var(--text-primary)', fontFamily: "'SF Mono','Consolas',monospace", fontSize: 12.5 } }, 'SQLite (better-sqlite3)'),
          e('span', { style: { color: 'var(--text-muted)' } }, 'Frontend'),
          e('span', { style: { color: 'var(--text-primary)', fontFamily: "'SF Mono','Consolas',monospace", fontSize: 12.5 } }, 'React 18 UMD')
        )
      )
    ),
    e(Modal, { show: showPersonaModal, onClose: () => setShowPersonaModal(false), title: editPersona ? 'Editar Persona' : 'Nueva Persona' },
      e(PersonaForm, { item: editPersona, onSave: savePersona, onCancel: () => setShowPersonaModal(false) })
    )
  );
}

// TERCEROS — Control de deudas personales con amigos
// ═══════════════════════════════════════════════════════════════════
function Terceros({ tarjeta }) {
  const [compras, setCompras] = useState([]);
  const [bolsilloModal, setBolsilloModal] = useState(null); // { compra, target, monto }

  const loadData = useCallback(() => {
    api('/terceros?tarjeta_id=' + tarjeta.id).then(setCompras);
  }, [tarjeta.id]);

  useEffect(() => { loadData(); }, [loadData]);

  async function togglePagado(id) {
    await api('/terceros/' + id + '/toggle', { method: 'PUT' });
    loadData();
  }

  function openBolsilloTercero(compra, target, cuotaNum) {
    const mb = cuotaNum != null ? (compra._bolsilloCuota || 0) : (compra.monto_bolsillo || 0);
    const isPartial = mb > 0 && mb < target;
    const compraConCuota = cuotaNum != null ? Object.assign({}, compra, { monto_bolsillo: mb, _cuota_num: cuotaNum }) : compra;
    setBolsilloModal({ compra: compraConCuota, target, monto: isPartial ? '' : String(mb || '') });
  }
  async function saveBolsilloTercero() {
    if (!bolsilloModal) return;
    const { compra, target } = bolsilloModal;
    const _mb = compra.monto_bolsillo || 0;
    const _isAgregar = _mb > 0 && _mb < target;
    let monto;
    if (_isAgregar) {
      const adicional = parseFloat(bolsilloModal.monto) || 0;
      monto = Math.min(_mb + adicional, target);
    } else {
      monto = parseFloat(bolsilloModal.monto) || 0;
    }
    if (monto < 0) return;
    const bodyT = { monto_bolsillo: monto };
    if (compra._cuota_num != null) bodyT.cuota_num = compra._cuota_num;
    await api('/compras/' + compra.id + '/bolsillo', { method: 'PUT', body: bodyT });
    setBolsilloModal(null);
    loadData();
    toast(monto > 0 ? 'Bolsillo actualizado' : 'Bolsillo quitado');
  }

  // Solo Bancolombia Visa cobra intereses sobre compras intl en COP (validado con extracto real).
  const _frT = tarjeta.franquicia ? tarjeta.franquicia.toLowerCase() : '';
  const _dualT = _frT.includes('mastercard') || _frT.includes('amex') || _frT.includes('american express');
  const aplicaIntl = !!(tarjeta.banco && tarjeta.banco.toLowerCase().includes('bancolombia') && !_dualT);

  // Interés intl para compras de terceros (misma fórmula que backend)
  const calcInteresIntlTercero = (compra) => {
    if (!aplicaIntl) return 0;
    if (compra.es_diferida) return 0;
    if (!compra.es_internacional) return 0;
    const saldo = compra.valor_cop;
    if (saldo <= 0) return 0;
    const tasaIntl = tarjeta.tasa_mv_avances;
    if (!tasaIntl || !compra.ciclo) return 0;
    const [yr, mo] = compra.ciclo.split('-').map(Number);
    const lastDay = new Date(yr, mo, 0).getDate();
    const fechaCorteIntl = new Date(yr, mo - 1, Math.min(tarjeta.dia_corte, lastDay)).toISOString().slice(0, 10);
    const dias = Math.round((new Date(fechaCorteIntl + 'T12:00:00') - new Date(compra.fecha + 'T12:00:00')) / 86400000);
    if (dias <= 0) return 0;
    return Math.round(saldo * tasaIntl * (dias / 30));
  };

  // Group by persona
  const grouped = {};
  compras.forEach(c => {
    const key = c.persona_id;
    if (!grouped[key]) grouped[key] = { nombre: c.persona_nombre, color: c.persona_color, compras: [], totalPendiente: 0, totalRecibido: 0 };
    grouped[key].compras.push(c);
    if (c.tercero_pagado) {
      grouped[key].totalRecibido += c.valor_cop;
    } else if (c.es_diferida) {
      // valor_pendiente ya excluye cuotas cubiertas por bolsillo (calculado en backend)
      const cubiertas = (c.cuotas || []).filter(q => q.cubierta_bolsillo).reduce((s, q) => s + q.total, 0);
      grouped[key].totalPendiente += c.valor_pendiente || 0;
      grouped[key].totalRecibido += cubiertas;
    } else {
      const bol = c.monto_bolsillo || 0;
      const intl = calcInteresIntlTercero(c);
      grouped[key].totalPendiente += c.valor_cop - bol + intl;
      grouped[key].totalRecibido += bol;
    }
  });
  const personas = Object.values(grouped);
  const totalPendiente = compras.filter(c => !c.tercero_pagado).reduce((s, c) => s + (c.es_diferida ? (c.valor_pendiente || 0) : c.valor_cop - (c.monto_bolsillo || 0) + calcInteresIntlTercero(c)), 0);
  const totalRecibido = compras.reduce((s, c) => {
    if (c.tercero_pagado) return s + c.valor_cop;
    if (c.es_diferida) return s + (c.cuotas || []).filter(q => q.cubierta_bolsillo).reduce((a, q) => a + q.total, 0);
    return s + (c.monto_bolsillo || 0);
  }, 0);

  return e('div', null,
    // Summary cards
    e('div', { className: 'cards-row' },
      e('div', { className: 'card card-warning' },
        e('div', { className: 'card-label' }, 'Me Deben'),
        e('div', { className: 'card-value' }, fmtCOP(totalPendiente)),
        e('div', { className: 'card-sub' }, compras.filter(c => !c.tercero_pagado).length + ' compras pendientes')
      )
    ),

    personas.length === 0
      ? e('div', { className: 'empty-state' }, e('div', { className: 'icon' }, e(Ico, { name: 'users', size: 48, color: 'var(--text-muted)' })), e('div', null, 'No hay compras asignadas a terceros'))
      : personas.map(p => {
          // Agrupar compras por ciclo (más reciente primero)
          const ciclosMap = {};
          p.compras.forEach(c => {
            if (c.es_diferida && c.cuotas && c.cuotas.length > 0) {
              c.cuotas.forEach(q => {
                const cic = q.fecha_corte ? q.fecha_corte.slice(0, 7) : (c.ciclo || 'Sin ciclo');
                if (!ciclosMap[cic]) ciclosMap[cic] = [];
                ciclosMap[cic].push({ _compra: c, _cuota: q });
              });
            } else {
              const cic = c.ciclo || 'Sin ciclo';
              if (!ciclosMap[cic]) ciclosMap[cic] = [];
              ciclosMap[cic].push({ _compra: c, _cuota: null });
            }
          });
          const ciclos = Object.keys(ciclosMap).sort((a, b) => b.localeCompare(a));
          const fmtCicloLabel = cic => {
            if (cic === 'Sin ciclo') return cic;
            const [y, m] = cic.split('-');
            return new Date(y, m - 1).toLocaleDateString('es-CO', { month: 'long', year: 'numeric' });
          };

          return e('div', { key: p.nombre, className: 'persona-card', style: { marginBottom: 20 } },

                p.totalRecibido > 0 && e('div', { style: {

                } },

                  e('span', { style: { fontSize: 14, fontWeight: 700, color: 'var(--success)', fontFamily: 'monospace' } }, fmtCOP(p.totalRecibido))
                )
              )
            ),
            e('div', { className: 'persona-card-body' },
              ciclos.map(cic => {

              e(MoneyInput, { value: bolsilloModal.monto, onChange: val => setBolsilloModal(prev => ({ ...prev, monto: val })), placeholder: 'Ej: 50.000' }),
              (() => {
                var val = parseFloat(bolsilloModal.monto) || 0;
                if (!val) return null;
                if (bState === 'bolsillo_parcial') {

                  return totalR >= target
                    ? e('div', { className: 'form-hint', style: { color: 'var(--success)' } }, 'Total resultante: ' + fmtCOP(totalR) + ' — Cubre el total')
                    : e('div', { className: 'form-hint', style: { color: 'var(--warning)' } }, 'Total resultante: ' + fmtCOP(totalR) + ' · Faltaria: ' + fmtCOP(target - totalR));
                }

                  : e('div', { className: 'form-hint', style: { color: 'var(--success)' } }, 'Cubre el total — se marcara como Pagado');
              })()

                var bodyQuitar = { monto_bolsillo: 0 };
                if (compra._cuota_num != null) bodyQuitar.cuota_num = compra._cuota_num;
                api('/compras/' + compra.id + '/bolsillo', { method: 'PUT', body: bodyQuitar })

              } }, 'Quitar de bolsillo'),
              e('button', { type: 'button', className: 'btn', onClick: () => setBolsilloModal(null) }, 'Cancelar'),
              e('button', { type: 'button', className: 'btn btn-primary', onClick: saveBolsilloTercero }, 'Guardar')
            )
          )
        )
      );

  );
}
