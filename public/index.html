// Reprogramacion RETROACTIVA de saldo ("Sellar y Renacer"). item = diferidaDetail (trae amortizacion,
// monto, num_cuotas, tasa_mv, etiqueta, compra_id). El preview se calcula en el cliente desde la
// amortizacion ya cargada + el ciclo vigente de la tarjeta (el POST del backend es la fuente de verdad).
function ReprogramarForm({ item, tarjeta, onSave, onCancel }) {
  const vigente = tarjeta.ciclo_vigente || cicloVigente(tarjeta.dia_corte);
  const tabla = item.amortizacion || [];
  // k = cuotas ya facturadas (fechaCorte en un ciclo anterior al vigente). Saldo = monto - Σ capital(k).
  const k = tabla.filter(q => q.fechaCorte.slice(0, 7) < vigente).length;
  let sumSellado = 0;
  for (let i = 0; i < k; i++) sumSellado += Math.round(tabla[i].cuotaCapital);
  const montoR = Math.round((item.monto || 0) * 100) / 100;
  const saldoRestante = Math.round((montoR - sumSellado) * 100) / 100;

  const [numCuotas, setNumCuotas] = useState(item.num_cuotas || (k + 1));
  const [cobrarInt, setCobrarInt] = useState(true);
  const [tasaMv, setTasaMv] = useState(((item.tasa_mv || 0) * 100).toFixed(4)); // hereda la tasa del plan
  const [confirmando, setConfirmando] = useState(false);

  const M = parseInt(numCuotas, 10);
  const remanente = (M && M > k) ? (M - k) : 0;
  const tasaNum = cobrarInt ? (parseFloat(tasaMv) / 100) : 0;
  const cuotaCapitalAprox = remanente > 0 ? Math.round(saldoRestante / remanente) : 0;
  const interesPrimerMes = Math.round(saldoRestante * (tasaNum || 0)); // ~1 mes sobre el saldo (aprox)

  let err = null;
  if (!M || M < 1 || M > 120) err = 'Indica un total de cuotas entre 1 y 120.';
  else if (M <= k) err = 'El nuevo total debe ser MAYOR que las ' + k + ' cuota(s) ya facturada(s).';
  else if (!(saldoRestante > 0)) err = 'No queda saldo por reprogramar en esta diferida.';
  else if (cobrarInt && !(tasaNum >= 0 && tasaNum < 1)) err = 'Tasa invalida (entre 0 y 100% MV).';
  const valido = !err;

  function aplicar() { onSave({ num_cuotas_nuevas: M, tasa_mv: tasaNum, cobrar_intereses: cobrarInt }); }

  if (confirmando && valido) {
    return e('div', null,
      e('div', { style: { fontSize: 13.5, color: 'var(--text-secondary)', lineHeight: 1.6, marginBottom: 16 } },
        e('div', { style: { display: 'inline-flex', alignItems: 'center', gap: 8, fontWeight: 600, color: 'var(--text-primary)', marginBottom: 8 } },
          e(Ico, { name: 'alert', size: 18, color: 'var(--warning)' }), 'Confirmar reprogramacion'),
        e('div', null, item.etiqueta, ':'),
        e('ul', { style: { margin: '10px 0', paddingLeft: 18 } },
          e('li', null, 'Se sellaran ', e('strong', null, String(k)), ' cuota(s) ya facturada(s) como registro historico (intocables).'),
          e('li', null, 'El saldo de ', e('strong', null, fmtCOP(saldoRestante)), ' se reprograma a ', e('strong', null, String(remanente)), ' cuota(s)', cobrarInt ? (' al ' + parseFloat(tasaMv).toFixed(4) + '% MV.') : ' sin intereses.'),
          e('li', { style: { color: 'var(--text-muted)' } }, 'Crea un plan nuevo y elimina el actual. No es facilmente reversible.')
        )
      ),
      e('div', { className: 'modal-actions' },
        e('button', { type: 'button', className: 'btn', onClick: () => setConfirmando(false) }, 'Volver'),
        e('button', { type: 'button', className: 'btn btn-primary', onClick: aplicar }, 'Confirmar reprogramacion')
      )
    );
  }

  return e('form', { onSubmit: (ev) => { ev.preventDefault(); if (valido) setConfirmando(true); } },
    e('div', { style: { fontSize: 13, color: 'var(--text-muted)', marginBottom: 12, lineHeight: 1.5 } },
      'Plan actual: ' + (item.num_cuotas || '?') + ' cuotas. Ya facturadas (se sellaran): ' + k + '. Saldo a reprogramar: ' + fmtCOP(saldoRestante) + '.'),
    e('div', { className: 'form-row' },
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Nuevo total de cuotas'),
        e('input', { type: 'number', className: 'form-input', min: k + 1, max: 120, value: numCuotas, onChange: ev => setNumCuotas(ev.target.value), required: true }),
        e('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginTop: 3 } }, 'Incluye las ' + k + ' ya facturada(s). Ej: banco 12->2 con 1 facturada => escribe 2.')
      ),
      e('div', { className: 'form-group' },
        e('label', { className: 'form-label' }, 'Tasa Mensual (MV %)'),
        e('input', { type: 'number', step: '0.0001', className: 'form-input', value: tasaMv, onChange: ev => setTasaMv(ev.target.value), disabled: !cobrarInt, style: !cobrarInt ? { opacity: 0.6, cursor: 'not-allowed' } : {} })
      )
    ),
    e('div', { className: 'form-group' },
      e('label', { style: { display: 'flex', alignItems: 'center', gap: 8, fontSize: 13.5, cursor: 'pointer' } },
        e('input', { type: 'checkbox', checked: cobrarInt, onChange: ev => setCobrarInt(ev.target.checked) }),
        'Cobrar intereses sobre el saldo reprogramado')
    ),
    (() => {
      if (err) return e('div', { style: { marginTop: 4, padding: '10px 12px', background: 'var(--danger-bg)', color: 'var(--danger)', borderRadius: 8, fontSize: 13, lineHeight: 1.4 } }, err);
      return e('div', { style: { marginTop: 4, padding: '12px', background: 'var(--bg-tertiary)', borderRadius: 8, fontSize: 13, lineHeight: 1.7 } },
        e('div', { style: { fontWeight: 600, marginBottom: 6 } }, 'Vista previa'),
        e('div', null, 'Cuotas selladas (facturadas): ', e('strong', null, String(k))),
        e('div', null, 'Saldo a reprogramar: ', e('strong', null, fmtCOP(saldoRestante))),
        e('div', null, 'Nuevas cuotas del saldo: ', e('strong', null, String(remanente)), ' de ~', e('strong', null, fmtCOP(cuotaCapitalAprox)), ' de capital c/u'),
        cobrarInt
          ? e('div', { style: { color: 'var(--text-muted)' } }, 'Interes 1a cuota (~1 mes, aprox): ~' + fmtCOP(interesPrimerMes) + '. El detalle exacto se calcula al aplicar.')
          : e('div', { style: { color: 'var(--text-muted)' } }, 'Sin intereses (0%).')
      );
    })(),
    e('div', { style: { fontSize: 11.5, color: 'var(--text-muted)', marginTop: 10, lineHeight: 1.5 } },
      'El interes que reliquida el banco puede variar; ajusta la tasa con tu extracto reprogramado real cuando llegue.'),
    e('div', { className: 'modal-actions' },
      e('button', { type: 'button', className: 'btn', onClick: onCancel }, 'Cancelar'),
      e('button', { type: 'submit', className: 'btn btn-primary', disabled: !valido }, 'Reprogramar')
    )
  );
}

// ═══════════════════════════════════════════════════════════════════
// PAGOS (per card)
// ═══════════════════════════════════════════════════════════════════
function Pagos({ tarjeta, onDataChange }) {
  const [extractos, setExtractos] = useState([]);
  const [pagos, setPagos] = useState([]);
  const [showPagoModal, setShowPagoModal] = useState(false);
  const [pagoExtracto, setPagoExtracto] = useState(null);
  const [pagoMonto, setPagoMonto] = useState('');
  const [pagoFecha, setPagoFecha] = useState(todayISO());
  const [pagoTipo, setPagoTipo] = useState('pago_minimo');
  const [pagoMoneda, setPagoMoneda] = useState('COP'); // 'COP' | 'USD'

  const loadExtractos = useCallback(() => { api('/extractos?tarjeta_id=' + tarjeta.id).then(setExtractos); }, [tarjeta.id]);
  const loadPagos = useCallback(() => { api('/pagos?tarjeta_id=' + tarjeta.id).then(setPagos); }, [tarjeta.id]);
  useEffect(() => { loadExtractos(); loadPagos(); }, [loadExtractos, loadPagos]);

  function openPagar(ext) {
    setPagoExtracto(ext);
    // Si el ciclo es dual y la porción COP ya está pagada, arrancar con USD por default.
    const monedaInicial = (ext.estado === 'pagado' && ext.dual_extracto && ext.estado_usd === 'pendiente' && ext.pago_minimo_usd > 0)
      ? 'USD'
      : 'COP';
    setPagoMoneda(monedaInicial);
    if (monedaInicial === 'USD') {
      const restanteUsd = Math.max(0, (ext.pago_minimo_usd || 0) - (ext.monto_pagado_usd || 0));
      setPagoMonto(restanteUsd);
    } else {
      const restante = Math.max(0, ext.pago_minimo - (ext.monto_pagado || 0));
      setPagoMonto(restante);
    }
    setPagoTipo('pago_restante');
    setPagoFecha(todayISO());
    setShowPagoModal(true);
  }

  async function submitPago(ev) {
    ev.preventDefault();
    var monto = parseFloat(pagoMonto);
    if (!monto || monto <= 0) { toast('Ingresa un monto valido'); return; }
    await api('/extractos/' + pagoExtracto.id + '/pagar', {
      method: 'PUT',
      body: { monto_pagado: monto, fecha_pagado: pagoFecha, tipo: 'abono_extracto', moneda: pagoMoneda }
    });
    setShowPagoModal(false);
    loadExtractos(); loadPagos();
    if (onDataChange) onDataChange();
    if (pagoMoneda === 'USD') {
      var nuevoTotalUsd = (pagoExtracto.monto_pagado_usd || 0) + monto;
      toast(nuevoTotalUsd >= (pagoExtracto.pago_minimo_usd || 0) ? 'Pago USD completado' : 'Abono USD registrado');
    } else {
      var nuevoTotal = (pagoExtracto.monto_pagado || 0) + monto;
      toast(nuevoTotal >= pagoExtracto.pago_minimo ? 'Pago minimo COP completado' : 'Abono COP registrado');
    }
  }


  function fmtCiclo(c) { const [y, m] = c.split('-'); const meses = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic']; return meses[parseInt(m)-1] + ' ' + y; }

  const hoy = todayISO();
  const totalPagado = pagos.reduce((s, p) => s + p.monto, 0);
  // Ciclo "actual" para agrupar la tabla = ciclo vigente consciente del corte adelantado (viene del
  // backend); si el banco ya cortó junio, el actual es julio y junio baja a "Por pagar". Fallback al
  // cálculo local (sin corte) solo si el backend no lo envió. cicloAct alimenta el DISPLAY de la
  // vista Pagos (Ciclo Actual / Por pagar); los candados de edición viven en CompraForm (isCicloCerrado).
  const cicloAct = tarjeta.ciclo_vigente || cicloVigente(tarjeta.dia_corte);
  const extCicloActual = extractos.find(x => x.ciclo === cicloAct);
  const extFaltaPagar = extractos.filter(x => x.ciclo !== cicloAct && x.estado === 'pendiente' && x.fecha_corte <= hoy).sort((a, b) => a.ciclo.localeCompare(b.ciclo));
  const extProximosCiclos = extractos.filter(x => x.ciclo !== cicloAct && x.estado === 'pendiente' && x.fecha_corte > hoy).sort((a, b) => a.ciclo.localeCompare(b.ciclo));
  const extHistoricosPagados = extractos.filter(x => x.estado === 'pagado').sort((a, b) => b.ciclo.localeCompare(a.ciclo));

  const [expandedExt, setExpandedExt] = useState(null);

  function renderExtractoRows(ext) {
    const vencido = ext.estado === 'pendiente' && ext.fecha_pago < hoy;
    const isExpanded = expandedExt === ext.id;
    const hasDetail = (ext.compras > 0 || (ext.detalle_avances && ext.detalle_avances.length > 0) || (ext.detalle_diferidas && ext.detalle_diferidas.length > 0));
    const rows = [];
    // Soporte dual COP/USD: solo cuando la tarjeta es dual y el extracto tiene saldo USD.
    const tieneUsd = !!(ext.dual_extracto && (ext.pago_minimo_usd || 0) > 0);
    const usdPagado = ext.estado_usd === 'pagado';
    const copPagado = ext.estado === 'pagado';
    const cerradoCompleto = copPagado && (usdPagado || ext.estado_usd === 'no_aplica' || !tieneUsd);
    const hayPendiente = !copPagado || (tieneUsd && !usdPagado);
    const fmtUsd = (n) => 'USD $' + new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(n || 0);

    rows.push(e('tr', {
      key: ext.id,
      style: Object.assign({}, cerradoCompleto ? { background: 'rgba(52,211,153,0.08)' } : vencido ? { background: 'rgba(239,68,68,0.08)' } : {}, hasDetail ? { cursor: 'pointer' } : {}),
      onClick: hasDetail ? () => setExpandedExt(isExpanded ? null : ext.id) : undefined
    },
      e('td', { style: { fontWeight: 600 } }, hasDetail ? (isExpanded ? '\u25BC ' : '\u25B6 ') : '  ', fmtCiclo(ext.ciclo)),
      e('td', null, fmtDate(ext.fecha_corte),
        ext.es_corte_adelantado && e('span', { style: { fontSize: 9, marginLeft: 6, color: 'var(--accent)', fontWeight: 700, letterSpacing: 0.3 }, title: ext.fecha_corte_auto ? 'Corte te\u00F3rico: ' + fmtDate(ext.fecha_corte_auto) : undefined }, '(ADELANTADO)')),
      e('td', { style: { color: vencido ? 'var(--danger)' : '' } },
        fmtDate(ext.fecha_pago),
        ext.es_fecha_pago_manual && e('span', { style: { fontSize: 9, marginLeft: 6, color: 'var(--accent)', fontWeight: 700, letterSpacing: 0.3 } }, '(MANUAL)'),
        vencido && e('span', { style: { color: 'var(--danger)', fontSize: 11, marginLeft: 6 } }, 'VENCIDO')
      ),
      e('td', { className: 'text-right text-mono' },
        fmtCOP(ext.pago_minimo),
        tieneUsd && e('div', { style: { fontSize: 11, color: '#4FC3F7', fontWeight: 700 } }, fmtUsd(ext.pago_minimo_usd))
      ),
      e('td', { className: 'text-right text-mono' },
        fmtCOP(ext.pago_total),
        tieneUsd && e('div', { style: { fontSize: 11, color: '#4FC3F7', fontWeight: 700 } }, fmtUsd(ext.pago_total_usd || ext.pago_minimo_usd))
      ),
      e('td', { className: 'text-right text-mono', style: { fontSize: 12, color: ext.intereses_intl > 0 ? '#14b8a6' : 'var(--text-muted)', fontWeight: ext.intereses_intl > 0 ? 600 : 400 } },
        ext.intereses_intl > 0 ? fmtCOP(ext.intereses_intl) : '\u2014'
      ),
      e('td', { className: 'text-right text-mono', style: { fontWeight: 700, color: ext.monto_pagado > 0 ? 'var(--success)' : '' } },
        ext.monto_pagado > 0 ? e('span', null, fmtCOP(ext.monto_pagado),
          ext.estado === 'pendiente' && ext.monto_pagado < ext.pago_minimo
            ? e('div', { style: { fontSize: 10, color: 'var(--text-muted)', fontWeight: 400 } }, 'Falta: ' + fmtCOP(ext.pago_minimo - ext.monto_pagado))
            : null
        ) : '-',
        tieneUsd && (ext.monto_pagado_usd || 0) > 0 && e('div', { style: { fontSize: 11, color: '#4FC3F7', fontWeight: 700 } }, fmtUsd(ext.monto_pagado_usd))
      ),
      e('td', null,
        // Para tarjetas duales con USD: dos badges apilados (COP + USD).
        tieneUsd
          ? e('div', { style: { display: 'flex', flexDirection: 'column', gap: 4, alignItems: 'flex-start' } },
              copPagado
                ? e('span', { className: 'badge badge-pagado', style: { fontSize: 10 } }, 'COP PAGADO')
                : ext.monto_pagado > 0 && ext.monto_pagado < ext.pago_minimo
                  ? e('span', { className: 'badge', style: { background: 'rgba(251,191,36,0.15)', color: 'var(--warning)', fontSize: 10 } }, 'COP ABONADO')
                  : vencido
                    ? e('span', { className: 'badge badge-vencido', style: { fontSize: 10 } }, 'COP VENCIDO')
                    : e('span', { className: 'badge badge-pendiente', style: { fontSize: 10 } }, 'COP PENDIENTE'),
              usdPagado
                ? e('span', { className: 'badge badge-pagado', style: { fontSize: 10, background: 'rgba(79,195,247,0.15)', color: '#4FC3F7' } }, 'USD PAGADO')
                : (ext.monto_pagado_usd || 0) > 0 && (ext.monto_pagado_usd || 0) < (ext.pago_minimo_usd || 0)
                  ? e('span', { className: 'badge', style: { background: 'rgba(251,191,36,0.15)', color: 'var(--warning)', fontSize: 10 } }, 'USD ABONADO')
                  : e('span', { className: 'badge badge-pendiente', style: { fontSize: 10 } }, 'USD PENDIENTE')
            )
          // Tarjetas no-duales o ciclos sin USD: badge \u00FAnico como antes.
          : copPagado
            ? e('span', { className: 'badge badge-pagado' }, 'PAGADO')
            : ext.monto_pagado > 0 && ext.monto_pagado < ext.pago_minimo
              ? e('span', { className: 'badge', style: { background: 'rgba(251,191,36,0.15)', color: 'var(--warning)' } }, 'ABONADO')
              : vencido
                ? e('span', { className: 'badge badge-vencido' }, 'VENCIDO')
                : e('span', { className: 'badge badge-pendiente' }, 'PENDIENTE')
      ),
      e('td', { onClick: ev => ev.stopPropagation() },
        hayPendiente
          ? e('button', { className: 'btn btn-sm btn-success', onClick: () => openPagar(ext) }, e(Ico, { name: 'dollar', size: 14 }),
              ext.monto_pagado > 0 || (ext.monto_pagado_usd || 0) > 0 ? ' Abonar' : ' Pagar')
          : null
      )
    ));

    if (isExpanded) {
      var cellStyle = { padding: '6px 8px', borderBottom: '1px solid rgba(255,255,255,0.06)' };
      var cellR = Object.assign({}, cellStyle, { textAlign: 'right' });
      var headerStyle = { padding: '8px', fontWeight: 700, fontSize: 12, borderBottom: '1px solid var(--border)', color: 'var(--text-secondary)' };
      var subRowStyle = { padding: '4px 8px 4px 24px', borderBottom: '1px solid rgba(255,255,255,0.04)', fontSize: 12, color: 'var(--text-secondary)' };
      var subRowR = Object.assign({}, subRowStyle, { textAlign: 'right' });

      var desgloseRows = [];

      // Merge all items into one chronological list. Compras divididas (con grupo_id) se agrupan en un item padre.
      var allItems = [];
      if (ext.detalle_compras) {
        var gruposCompras = {};
        var singlesCompras = [];
        ext.detalle_compras.forEach(function(c) {
          if (c.grupo_id) {
            if (!gruposCompras[c.grupo_id]) gruposCompras[c.grupo_id] = [];
            gruposCompras[c.grupo_id].push(c);
          } else {
            singlesCompras.push(c);
          }
        });
        singlesCompras.forEach(function(c) {
          var intl = c.interes_intl || 0;
          allItems.push({ tipo: 'compra', fecha: c.fecha || '', _ordenId: c.id, nombre: c.descripcion, capital: c.total, interes: intl, total: c.total + intl, valor_usd: c.valor_usd, tasa_usd: c.tasa_usd, es_internacional: c.es_internacional });
        });
        Object.keys(gruposCompras).forEach(function(gid) {
          var partes = gruposCompras[gid];
          if (partes.length > 1) {
            var first = partes[0];
            var capitalGrupo = partes.reduce(function(s, p) { return s + p.total; }, 0);
            var interesGrupo = partes.reduce(function(s, p) { return s + (p.interes_intl || 0); }, 0);
            allItems.push({
              tipo: 'compra_grupo', fecha: first.fecha || '', nombre: first.descripcion,
              // _ordenId = menor id de las partes (nacimiento de la compra dividida), igual que
              // purchaseRows en la tabla principal — desempate cronológico por fecha igual.
              _ordenId: Math.min.apply(null, partes.map(function(p) { return p.id; })),
              capital: capitalGrupo, interes: interesGrupo, total: capitalGrupo + interesGrupo,
              valor_usd: first.valor_usd, tasa_usd: first.tasa_usd, partes: partes
            });
          } else {
            var c = partes[0];
            var intlSingle = c.interes_intl || 0;
            allItems.push({ tipo: 'compra', fecha: c.fecha || '', _ordenId: c.id, nombre: c.descripcion, capital: c.total, interes: intlSingle, total: c.total + intlSingle, valor_usd: c.valor_usd, tasa_usd: c.tasa_usd, es_internacional: c.es_internacional });
          }
        });
      }
      if (ext.detalle_avances) ext.detalle_avances.forEach(function(a) {
        allItems.push({ tipo: 'avance', fecha: a.fecha || '', nombre: a.etiqueta, capital: a.capital, interes: a.interes, total: a.total, valor_usd: null });
      });
      if (ext.detalle_diferidas) {
        // Agrupar diferidas divididas por grupo_id (proveniente de la compra vinculada).
        var gruposDif = {};
        var singlesDif = [];
        ext.detalle_diferidas.forEach(function(d) {
          if (d.grupo_id) {
            if (!gruposDif[d.grupo_id]) gruposDif[d.grupo_id] = [];
            gruposDif[d.grupo_id].push(d);
          } else {
            singlesDif.push(d);
          }
        });
        singlesDif.forEach(function(d) {
          allItems.push({ tipo: 'diferida', fecha: d.fecha || '', nombre: d.etiqueta, capital: d.capital, interes: d.interes, total: d.total, valor_usd: null });
        });
        Object.keys(gruposDif).forEach(function(gid) {
          var partes = gruposDif[gid];
          if (partes.length > 1) {
            var first = partes[0];
            var capitalGrupo = partes.reduce(function(s, p) { return s + p.capital; }, 0);
            var interesGrupo = partes.reduce(function(s, p) { return s + p.interes; }, 0);
            var totalGrupo = partes.reduce(function(s, p) { return s + p.total; }, 0);
            allItems.push({
              tipo: 'diferida_grupo', fecha: first.fecha || '', nombre: first.etiqueta,
              capital: capitalGrupo, interes: interesGrupo, total: totalGrupo, partes: partes
            });
          } else {
            var d = partes[0];
            allItems.push({ tipo: 'diferida', fecha: d.fecha || '', nombre: d.etiqueta, capital: d.capital, interes: d.interes, total: d.total, valor_usd: null });
          }
        });
      }
      // Orden ASCENDENTE (cronológico, viejo→nuevo) con desempate por id: ante misma fecha, la
      // compra registrada antes va primero — mismo criterio que la tabla principal pero en sentido
      // inverso. Solo las compras exponen _ordenId; avances/diferidas (sin id comparable entre
      // tablas) caen a 0 y conservan su orden estable.
      allItems.sort(function(a, b) {
        var byFecha = a.fecha.localeCompare(b.fecha);
        if (byFecha !== 0) return byFecha;
        return (a._ordenId || 0) - (b._ordenId || 0);
      });

      var tipoLabel = { compra: 'Compra', avance: 'Avance', diferida: 'Diferida' };
      var tipoColor = { compra: 'var(--text-secondary)', avance: 'var(--danger)', diferida: 'var(--purple)' };

      allItems.forEach(function(item, i) {
        if (item.tipo === 'compra_grupo') {
          // Fila padre del grupo
          desgloseRows.push(e('tr', { key: 'item-grp-' + i, style: { background: 'rgba(99,102,241,0.06)' } },
            e('td', { style: subRowStyle }, item.fecha ? fmtDate(item.fecha) : '-'),
            e('td', { style: Object.assign({}, subRowStyle, { fontWeight: 700 }) },
              e('span', { style: { color: tipoColor.compra, fontSize: 10, fontWeight: 700, marginRight: 6, textTransform: 'uppercase' } }, tipoLabel.compra),
              item.nombre,
              e('span', { style: { fontSize: 10, color: 'var(--accent)', marginLeft: 8, fontWeight: 600 } }, 'Dividida ' + item.partes.length + ' partes')
            ),
            e('td', { style: subRowR, className: 'text-mono' }, item.capital ? fmtCOP(item.capital) : '-'),
            e('td', { style: Object.assign({}, subRowR, item.interes ? { color: '#14b8a6', fontWeight: 600 } : null), className: 'text-mono' }, item.interes ? fmtCOP(item.interes) : '-'),
            e('td', { style: subRowR, className: 'text-mono' }, item.valor_usd ? 'USD $' + new Intl.NumberFormat('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }).format(item.valor_usd) : 'COP'),
            e('td', { style: Object.assign({}, subRowR, { fontWeight: 700 }), className: 'text-mono' }, fmtCOP(item.total))
          ));
          // Filas hijas (cada parte / persona)
          item.partes.forEach(function(p, j) {
            var pIntl = p.interes_intl || 0;
            desgloseRows.push(e('tr', { key: 'item-grp-' + i + '-' + j, style: { background: 'rgba(99,102,241,0.03)' } },
              e('td', { style: subRowStyle }),
              e('td', { style: Object.assign({}, subRowStyle, { paddingLeft: 40, fontSize: 12, color: 'var(--text-secondary)' }) },
                e('span', { style: { background: p.persona_id ? (p.persona_color || '#666') : '#666', width: 8, height: 8, display: 'inline-block', borderRadius: '50%', marginRight: 6, verticalAlign: 'middle' } }),
                p.persona_id ? p.persona_nombre : 'Personal'
              ),
              e('td', { style: subRowR, className: 'text-mono' }, fmtCOP(p.total)),
              e('td', { style: Object.assign({}, subRowR, pIntl > 0 ? { color: '#14b8a6', fontWeight: 600 } : null), className: 'text-mono' }, pIntl > 0 ? fmtCOP(pIntl) : '-'),
              e('td', { style: subRowR, className: 'text-mono' }, '-'),
              e('td', { style: subRowR, className: 'text-mono' }, fmtCOP(p.total + pIntl))
            ));
          });
        } else if (item.tipo === 'diferida_grupo') {
          // Fila padre del grupo de diferidas
          desgloseRows.push(e('tr', { key: 'item-difgrp-' + i, style: { background: 'rgba(168,85,247,0.06)' } },
            e('td', { style: subRowStyle }, item.fecha ? fmtDate(item.fecha) : '-'),
            e('td', { style: Object.assign({}, subRowStyle, { fontWeight: 700 }) },
              e('span', { style: { color: tipoColor.diferida, fontSize: 10, fontWeight: 700, marginRight: 6, textTransform: 'uppercase' } }, tipoLabel.diferida),
              item.nombre,
              e('span', { style: { fontSize: 10, color: 'var(--accent)', marginLeft: 8, fontWeight: 600 } }, 'Dividida ' + item.partes.length + ' partes')
            ),
            e('td', { style: subRowR, className: 'text-mono' }, item.capital ? fmtCOP(item.capital) : '-'),
            e('td', { style: subRowR, className: 'text-mono' }, item.interes ? fmtCOP(item.interes) : '-'),
            e('td', { style: subRowR, className: 'text-mono' }, 'COP'),
            e('td', { style: Object.assign({}, subRowR, { fontWeight: 700 }), className: 'text-mono' }, fmtCOP(item.total))
          ));
          // Filas hijas (cada parte / persona)
          item.partes.forEach(function(p, j) {
            desgloseRows.push(e('tr', { key: 'item-difgrp-' + i + '-' + j, style: { background: 'rgba(168,85,247,0.03)' } },
              e('td', { style: subRowStyle }),
              e('td', { style: Object.assign({}, subRowStyle, { paddingLeft: 40, fontSize: 12, color: 'var(--text-secondary)' }) },
                e('span', { style: { background: p.persona_id ? (p.persona_color || '#666') : '#666', width: 8, height: 8, display: 'inline-block', borderRadius: '50%', marginRight: 6, verticalAlign: 'middle' } }),
                p.persona_id ? p.persona_nombre : 'Personal'
              ),
              e('td', { style: subRowR, className: 'text-mono' }, p.capital ? fmtCOP(p.capital) : '-'),
              e('td', { style: subRowR, className: 'text-mono' }, p.interes ? fmtCOP(p.interes) : '-'),
              e('td', { style: subRowR, className: 'text-mono' }, '-'),
              e('td', { style: subRowR, className: 'text-mono' }, fmtCOP(p.total))
            ));
          });
        } else {
          // Para compras individuales con interés intl, resaltar el rubro en teal.
          var esIntlRow = item.tipo === 'compra' && item.interes > 0;
          desgloseRows.push(e('tr', { key: 'item' + i },
            e('td', { style: subRowStyle }, item.fecha ? fmtDate(item.fecha) : '-'),
            e('td', { style: subRowStyle },

// CALCULADORA
// ═══════════════════════════════════════════════════════════════════
function Calculadora({ tarjetas }) {
  const [tipo, setTipo] = useState('avance');
  const [tarjetaId, setTarjetaId] = useState('');
  const [monto, setMonto] = useState('');
  const [plazo, setPlazo] = useState('24');
  const [tasaMv, setTasaMv] = useState('');
  const [fecha, setFecha] = useState(todayISO());
  const [diaCorte, setDiaCorte] = useState('30');
  const [comision, setComision] = useState('');
  const [resultado, setResultado] = useState(null);
  const [loading, setLoading] = useState(false);
  const [bancoSel, setBancoSel] = useState('');

  function onTarjetaChange(id) {
    setTarjetaId(id); setResultado(null);
    if (!id) { setBancoSel(''); return; }
    const tj = tarjetas.find(t => String(t.id) === id);
    if (!tj) return;
    setTasaMv(((tipo === 'avance' ? tj.tasa_mv_avances : tj.tasa_mv_diferidas) * 100).toFixed(4));
    setDiaCorte(String(tj.dia_corte));
    setBancoSel(tj.banco || '');
  }

  function onTipoChange(t) {
    setTipo(t); setResultado(null);
    if (t === 'avance') setPlazo('24');
    if (tarjetaId) {
      const tj = tarjetas.find(tj => String(tj.id) === tarjetaId);
      if (tj) setTasaMv(((t === 'avance' ? tj.tasa_mv_avances : tj.tasa_mv_diferidas) * 100).toFixed(4));
    }
  }

  async function calcular(ev) {
    ev.preventDefault();
    const m = parseFloat(String(monto).replace(/\./g, '').replace(',', '.'));
    if (!m || m <= 0) { toastErr('Ingresa un monto válido'); return; }
    const p = parseInt(plazo);
    if (!p || p < 1 || p > 120) { toastErr('Cuotas debe ser entre 1 y 120'); return; }
    const t = parseFloat(tasaMv);
    if (!t || t <= 0) { toastErr('Tasa MV inválida'); return; }
    setLoading(true);
    try {
      const res = await api('/calculadora', {
        method: 'POST',
        body: { tipo, monto: m, tasa_mv: t, plazo: p, fecha, dia_corte: parseInt(diaCorte) || 30, comision: parseFloat(comision) || 0, tarjeta_id: tarjetaId || null }
      });
      if (res.error) toastErr(res.error); else setResultado(res);
    } catch(e) { toastErr('Error al calcular'); }
    setLoading(false);
  }

  const isNu = bancoSel && bancoSel.toLowerCase().includes('nu');
  const tarjetasActivas = (tarjetas || []).filter(t => t.estado === 'activa');

  var totalPagar = 0, totalIntereses = 0, primeraCuota = 0, ultimaCuota = 0;
  if (resultado && resultado.tabla && resultado.tabla.length > 0) {
    const col = tipo === 'avance' ? 'totalExtracto' : 'totalPagar';
    totalPagar = resultado.tabla.reduce((s, r) => s + r[col], 0);
    totalIntereses = resultado.resumen.totalIntereses;
    primeraCuota = resultado.tabla[0][col];
    ultimaCuota = resultado.tabla[resultado.tabla.length - 1][col];
  }

  return e('div', null,
    e('div', { className: 'section-title' }, e(Ico, { name: 'calculator', size: 20, color: 'var(--accent)' }), ' Calculadora'),
    e('div', { style: { fontSize: 13, color: 'var(--text-muted)', marginBottom: 20 } },
      'Simula la amortización de un avance o compra diferida. No afecta ningún registro.'
    ),

    // Selector de tipo
    e('div', { style: { display: 'flex', gap: 12, marginBottom: 28 } },
      e('div', {
        onClick: () => onTipoChange('avance'),
        style: { flex: 1, cursor: 'pointer', borderRadius: 14, padding: '18px 20px', border: '2px solid ' + (tipo === 'avance' ? 'var(--accent)' : 'var(--border)'), background: tipo === 'avance' ? 'var(--accent-bg)' : 'var(--bg-card)', transition: 'all 0.15s' }
      },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 14 } },
          e(Ico, { name: 'dollar', size: 28, color: tipo === 'avance' ? 'var(--accent)' : 'var(--text-muted)' }),
          e('div', null,
            e('div', { style: { fontWeight: 700, fontSize: 15, color: tipo === 'avance' ? 'var(--accent)' : 'var(--text-primary)' } }, 'Avance de Dinero'),
            e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 3 } }, 'Efectivo a cuotas · interés desde cuota 1')
          )
        )
      ),
      e('div', {
        onClick: () => onTipoChange('diferida'),
        style: { flex: 1, cursor: 'pointer', borderRadius: 14, padding: '18px 20px', border: '2px solid ' + (tipo === 'diferida' ? 'var(--accent)' : 'var(--border)'), background: tipo === 'diferida' ? 'var(--accent-bg)' : 'var(--bg-card)', transition: 'all 0.15s' }
      },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 14 } },
          e(Ico, { name: 'credit-card', size: 28, color: tipo === 'diferida' ? 'var(--accent)' : 'var(--text-muted)' }),
          e('div', null,
            e('div', { style: { fontWeight: 700, fontSize: 15, color: tipo === 'diferida' ? 'var(--accent)' : 'var(--text-primary)' } }, 'Compra Diferida'),
            e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginTop: 3 } }, 'Pago en cuotas desde la fecha de compra')
          )
        )
      )
    ),

    // Formulario
    e('form', { onSubmit: calcular },
      // Tarjeta selector
      e('div', { style: { marginBottom: 16, maxWidth: 440 } },
        e('label', { className: 'form-label' }, 'Tarjeta'),
        e('select', { className: 'form-input', value: tarjetaId, onChange: ev => onTarjetaChange(ev.target.value) },
          e('option', { value: '' }, '— Seleccionar tarjeta —'),
          tarjetasActivas.map(t => e('option', { key: t.id, value: String(t.id) }, t.nombre + (t.banco ? ' · ' + t.banco : '')))
        )
      ),

      // Info auto-filled (visible solo cuando hay tarjeta seleccionada)
      tarjetaId && e('div', { style: { display: 'flex', gap: 10, marginBottom: 20, flexWrap: 'wrap' } },
        e('div', { style: { background: 'var(--bg-tertiary)', border: '1px solid var(--border)', borderRadius: 10, padding: '8px 16px', minWidth: 90 } },
          e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.5 } }, 'Tasa MV'),
          e('div', { style: { fontSize: 15, fontWeight: 700, color: 'var(--accent)', fontFamily: 'monospace', marginTop: 2 } }, tasaMv + '%')
        ),
        e('div', { style: { background: 'var(--bg-tertiary)', border: '1px solid var(--border)', borderRadius: 10, padding: '8px 16px', minWidth: 90 } },
          e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.5 } }, 'Día de corte'),
          e('div', { style: { fontSize: 15, fontWeight: 700, color: 'var(--text-primary)', fontFamily: 'monospace', marginTop: 2 } }, diaCorte)
        ),
        tipo === 'avance' && e('div', { style: { background: 'var(--bg-tertiary)', border: '1px solid var(--border)', borderRadius: 10, padding: '8px 16px', minWidth: 90 } },
          e('div', { style: { fontSize: 10, color: 'var(--text-muted)', textTransform: 'uppercase', letterSpacing: 0.5 } }, 'Cuotas'),
          e('div', { style: { fontSize: 15, fontWeight: 700, color: 'var(--text-primary)', fontFamily: 'monospace', marginTop: 2 } }, '24')
        ),
        isNu && tipo === 'diferida' && e('div', { style: { background: 'var(--accent-bg)', border: '1px solid var(--accent)', borderRadius: 10, padding: '8px 16px' } },
          e('div', { style: { fontSize: 10, color: 'var(--accent)', textTransform: 'uppercase', letterSpacing: 0.5 } }, 'Nu Colombia'),
          e('div', { style: { fontSize: 13, fontWeight: 600, color: 'var(--accent)', marginTop: 2 } }, 'Cuota 1 sin intereses')
        )
      ),

      // Inputs del usuario
      e('div', { className: 'cards-row', style: { marginBottom: 20 } },
        // Monto
        e('div', { className: 'card', style: { flex: '1 1 160px' } },
          e('label', { className: 'form-label' }, 'Monto'),
          e('input', { className: 'form-input', type: 'text', inputMode: 'numeric',
            value: monto ? parseInt(monto, 10).toLocaleString('es-CO') : '',
            onChange: ev => { const raw = ev.target.value.replace(/\D/g, ''); setMonto(raw); setResultado(null); },
            placeholder: '5.000.000', required: true })
        ),
        // Fecha
        e('div', { className: 'card', style: { flex: '1 1 160px' } },
          e('label', { className: 'form-label' }, tipo === 'avance' ? 'Fecha desembolso' : 'Fecha de compra'),
          e('input', { className: 'form-input', type: 'date', value: fecha, onChange: ev => { setFecha(ev.target.value); setResultado(null); }, required: true })
        ),
        // Cuotas solo para diferidas
        tipo === 'diferida' && e('div', { className: 'card', style: { flex: '0 1 130px' } },
          e('label', { className: 'form-label' }, 'Nº cuotas'),
          e('input', { className: 'form-input', type: 'number', value: plazo, onChange: ev => { setPlazo(ev.target.value); setResultado(null); }, min: 1, max: 120, required: true })
        ),
        // Comisión (solo avances)
        tipo === 'avance' && e('div', { className: 'card', style: { flex: '0 1 160px' } },
          e('label', { className: 'form-label' }, 'Comisión (opcional)'),
          e('input', { className: 'form-input', type: 'number', value: comision, onChange: ev => { setComision(ev.target.value); setResultado(null); }, placeholder: '0', min: 0 }),
          e('div', { className: 'form-hint' }, 'Se suma a la 1ª cuota')
        )
      ),
      e('button', { className: 'btn btn-primary', type: 'submit', disabled: loading || !tarjetaId },
        loading ? 'Calculando...' : !tarjetaId ? 'Selecciona una tarjeta primero' : 'Calcular amortización'
      )
    ),

    // Resultado
    resultado && resultado.tabla && e('div', { style: { marginTop: 32 } },
      // Encabezado resultado
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16, borderTop: '1px solid var(--border)', paddingTop: 24 } },
        e('div', { className: 'section-title', style: { margin: 0 } }, 'Resultado'),
        e('div', { style: { fontSize: 12, color: 'var(--text-muted)', background: 'var(--bg-tertiary)', borderRadius: 8, padding: '3px 10px' } },
          (tipo === 'avance' ? 'Avance' : 'Diferida') + ' · ' + resultado.tabla.length + ' cuotas · ' + tasaMv + '% MV · corte día ' + diaCorte
        )
      ),

      // Cards resumen
      e('div', { className: 'cards-row', style: { marginBottom: 24 } },

        ),

              e('div', { style: { fontSize: 12, color: 'var(--text-primary)', fontWeight: 600, fontFamily: 'monospace' } }, fmtCOP(Math.round(ultimaCuota)))
            )

        )),

// HISTORIAL (Log de acciones)
// ═══════════════════════════════════════════════════════════════════
function Historial() {
  const [logs, setLogs] = useState([]);
  const [total, setTotal] = useState(0);
  const [page, setPage] = useState(0);
  const pageSize = 30;

  function loadLogs(p) {
    api('/log?limit=' + pageSize + '&offset=' + (p * pageSize)).then(data => {
      setLogs(data.rows);
      setTotal(data.total);
    });
  }

  useEffect(() => { loadLogs(page); }, [page]);

  async function clearLog() {
    const ok = await confirmDialog('Eliminar todo el historial?');
    if (!ok) return;
    api('/log', { method: 'DELETE' }).then(() => { setLogs([]); setTotal(0); setPage(0); toast('Historial limpiado'); });
  }

  const accionIcons = { crear: 'plus', editar: 'edit', eliminar: 'trash', pago: 'dollar', revertir: 'refresh' };
  const totalPages = Math.ceil(total / pageSize);

  return e('div', null,
    e('div', { className: 'section-title', style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center' } },
      e('span', null, e(Ico, { name: 'activity', size: 18, color: 'var(--accent)' }), ' Historial de Acciones'),
      e('div', { style: { display: 'flex', alignItems: 'center', gap: 10 } },
        e('span', { style: { fontSize: 12, color: 'var(--text-muted)', fontWeight: 400 } }, total + ' registro' + (total !== 1 ? 's' : '')),
        total > 0 && e('button', { onClick: clearLog, className: 'btn btn-sm btn-danger', style: { fontSize: 11, padding: '4px 10px' } }, 'Limpiar')
      )
    ),
    logs.length === 0
      ? e('div', { style: { textAlign: 'center', padding: 40, color: 'var(--text-muted)' } }, 'No hay registros aun')
      : e('div', { style: { display: 'flex', flexDirection: 'column', gap: 2 } },
          logs.map(l =>
            e('div', { key: l.id, style: { display: 'flex', alignItems: 'center', gap: 10, padding: '8px 12px', background: 'var(--bg-card)', borderRadius: 8, fontSize: 13 } },
              e('span', { style: { width: 22, textAlign: 'center', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' } }, e(Ico, { name: accionIcons[l.accion] || 'clipboard', size: 14, color: l.accion === 'crear' ? 'var(--success)' : l.accion === 'eliminar' ? 'var(--danger)' : 'var(--text-secondary)' })),
              e('div', { style: { flex: 1, minWidth: 0 } },
                e('div', { style: { color: 'var(--text-primary)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, l.descripcion),
                l.detalles && e('div', { style: { fontSize: 11, color: 'var(--text-muted)', marginTop: 2 } }, l.detalles)
              ),
              e('div', { style: { fontSize: 11, color: 'var(--text-muted)', flexShrink: 0, textAlign: 'right', minWidth: 110 } },
                e('div', null, l.fecha.slice(0, 10)),
                e('div', null, l.fecha.slice(11, 16))
              )
            )
          ),
          totalPages > 1 && e('div', { style: { display: 'flex', justifyContent: 'center', gap: 8, marginTop: 12 } },
            e('button', { disabled: page <= 0, onClick: () => setPage(p => p - 1), style: { padding: '4px 12px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--bg-card)', color: 'var(--text-primary)', cursor: page <= 0 ? 'default' : 'pointer', opacity: page <= 0 ? 0.4 : 1, fontFamily: 'inherit' } }, '\u2190'),
            e('span', { style: { fontSize: 12, color: 'var(--text-muted)', alignSelf: 'center' } }, (page + 1) + ' / ' + totalPages),
            e('button', { disabled: page >= totalPages - 1, onClick: () => setPage(p => p + 1), style: { padding: '4px 12px', borderRadius: 6, border: '1px solid var(--border)', background: 'var(--bg-card)', color: 'var(--text-primary)', cursor: page >= totalPages - 1 ? 'default' : 'pointer', opacity: page >= totalPages - 1 ? 0.4 : 1, fontFamily: 'inherit' } }, '\u2192')
          )
        )
  );
}

// CONFIGURACION
// ═══════════════════════════════════════════════════════════════════
function BancosUrlsConfig() {
  const [urls, setUrls] = useState([]);
  const [saved, setSaved] = useState(true);
  const [newBanco, setNewBanco] = useState('');

  useEffect(() => {
    api('/config').then(cfg => {
      // Empezamos siempre desde los presets canónicos (DEFAULT_BANCO_URLS) para que
      // si el usuario en algún momento borró un built-in, se reaparezca solo.
      let list = BANCOS_PRESETS.map(b => ({ nombre: b.nombre, url: b.url, nota: b.nota || '', color: b.color, builtin: true }));
      if (cfg.bancos_urls) {
        try {
          const savedData = JSON.parse(cfg.bancos_urls);
          // Sobrescribir URLs de los built-in con las personalizadas del usuario.
          // Si el usuario guardó string vacío, conservamos la URL default (no quedaría
          // sin fallback nunca). Esto hace que la URL del built-in sea "irrompible".
          list = list.map(b => {
            const s = savedData.find(x => x.nombre === b.nombre);
            const overrideUrl = s && s.url && s.url.trim() ? s.url.trim() : null;
            return overrideUrl ? { ...b, url: overrideUrl } : b;
          });
          // Agregar bancos personalizados (no built-in) creados por el usuario.
          savedData.filter(s => !BANCOS_PRESETS.find(p => p.nombre === s.nombre)).forEach(s => {
            list.push({ nombre: s.nombre, url: s.url || '', nota: '', color: s.color || '#666', builtin: false });
          });
          // Sincronizar BANCOS_PRESETS in-memory con los overrides (sin tocar built-ins
          // si el override está vacío — la URL por defecto se mantiene).
          savedData.forEach(s => {
            const preset = BANCOS_PRESETS.find(p => p.nombre === s.nombre);
            if (preset && s.url && s.url.trim()) preset.url = s.url.trim();
          });
        } catch (e) {}
      }
      setUrls(list);
    });
  }, []);

  function updateUrl(i, val) {
    const next = [...urls];
    next[i] = { ...next[i], url: val };
    setUrls(next);
    setSaved(false);
    // Solo mutamos BANCOS_PRESETS para bancos custom (no built-in). Los built-in
    // mantienen su URL canónica viva en memoria — si el usuario guarda string
    // vacío, al recargar la app la URL default se restaura automáticamente.
    const preset = BANCOS_PRESETS.find(p => p.nombre === next[i].nombre);
    if (preset && !next[i].builtin && val && val.trim()) preset.url = val.trim();
    if (preset && next[i].builtin && val && val.trim()) preset.url = val.trim();
  }

  async function resetToDefault(i) {
    const b = urls[i];
    const defaultUrl = DEFAULT_BANCO_URLS[b.nombre];
    if (!defaultUrl) return;
    const next = [...urls];
    next[i] = { ...next[i], url: defaultUrl };
    setUrls(next);
    setSaved(false);
    const preset = BANCOS_PRESETS.find(p => p.nombre === b.nombre);
    if (preset) preset.url = defaultUrl;
    // Propagar la URL canónica también a las tarjetas individuales con ese banco
    // para evitar el caso "el preset está bien pero la tarjeta sigue con URL vieja".
    try {
      const r = await api('/config/sync-bank-url', { method: 'POST', body: { banco: b.nombre, url: defaultUrl } });
      if (r && r.tarjetasActualizadas > 0) {
        toast('URL restaurada y propagada a ' + r.tarjetasActualizadas + ' tarjeta(s)');
      } else {
        toast('URL del preset restaurada');
      }
    } catch (e) {
      toastErr('URL restaurada en preset, pero no se pudo propagar a tarjetas: ' + e.message);
    }
  }

  function addBanco() {
    const name = newBanco.trim();
    if (!name) return;
    if (urls.find(b => b.nombre.toLowerCase() === name.toLowerCase())) { toastErr('Ese banco ya existe'); return; }
    setUrls([...urls, { nombre: name, url: '', nota: '', color: '#666', builtin: false }]);
    BANCOS_PRESETS.push({ nombre: name, url: '', color: '#666' });
    setNewBanco('');
    setSaved(false);
  }

  async function removeBanco(i) {
    const b = urls[i];
    // Los built-in (Bancolombia, Nu, RappiCard) NO se pueden eliminar — solo
    // pueden ser reseteados a su URL canónica. Esto garantiza que el sistema
    // automático de scraping nunca pierda el fallback.
    if (b.builtin) {
      const ok = await confirmDialog(
        '"' + b.nombre + '" es un banco predefinido y no puede eliminarse.\n\n¿Quieres restaurar su URL al valor por defecto?',
        { confirmText: 'Restaurar URL' }
      );
      if (ok) resetToDefault(i);
      return;
    }
    if (!await confirmDialog('Eliminar "' + b.nombre + '" de la lista de bancos?', { confirmText: 'Eliminar' })) return;
    const next = urls.filter((_, j) => j !== i);
    setUrls(next);
    const pi = BANCOS_PRESETS.findIndex(p => p.nombre === b.nombre);
    if (pi >= 0) BANCOS_PRESETS.splice(pi, 1);
    setSaved(false);
  }

  function save() {
    // Include custom (non-builtin) banks too
    const allData = urls.map(b => ({ nombre: b.nombre, url: b.url, color: b.color, builtin: b.builtin }));
    api('/config/bancos_urls', { method: 'PUT', body: { value: JSON.stringify(allData) } }).then(() => { setSaved(true); toast('URLs guardadas'); });
  }

  return e('div', { className: 'config-section' },
    e('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 } },
      e('div', { className: 'config-section-title', style: { margin: 0 } }, 'URLs de Tasas por Banco'),
      !saved && e('button', { className: 'btn btn-sm btn-primary', onClick: save }, 'Guardar')
    ),
    e('div', { style: { fontSize: 12, color: 'var(--text-muted)', marginBottom: 12 } }, 'Configura los enlaces donde cada banco publica sus tasas.'),
    urls.map((b, i) => {
      const defaultUrl = DEFAULT_BANCO_URLS[b.nombre];
      const isModified = b.builtin && defaultUrl && b.url !== defaultUrl;
      return e('div', { key: b.nombre + i, style: { marginBottom: 10 } },
        e('div', { style: { display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 } },
          e('label', { style: { fontSize: 12, fontWeight: 600, color: 'var(--text-secondary)', flex: 1 } },
            b.nombre,
            b.builtin && e('span', { style: { fontSize: 10, color: 'var(--text-muted)', marginLeft: 6, fontWeight: 400 } }, '(predefinido)')
          ),
          isModified && e('button', { className: 'btn btn-sm', onClick: () => resetToDefault(i), style: { padding: '2px 10px', fontSize: 11 }, title: 'Restaurar a la URL oficial por defecto' }, 'Restaurar'),
          e('button', { className: 'btn btn-sm btn-danger', onClick: () => removeBanco(i), style: { padding: '2px 8px', fontSize: 11 } }, '\u2715')
        ),
        b.nota
          ? e('div', { style: { fontSize: 11, color: 'var(--text-muted)', fontStyle: 'italic', padding: '6px 10px', background: 'var(--bg-main)', borderRadius: 8 } }, b.nota)
          : e('input', { type: 'url', className: 'form-input', value: b.url, onChange: ev => updateUrl(i, ev.target.value), placeholder: defaultUrl || 'https://...', style: { fontSize: 12 } })
      );
    }),
    e('div', { style: { display: 'flex', gap: 8, marginTop: 12 } },
      e('input', { type: 'text', className: 'form-input', value: newBanco, onChange: ev => setNewBanco(ev.target.value), placeholder: 'Nombre del nuevo banco', style: { fontSize: 12, flex: 1 }, onKeyDown: ev => ev.key === 'Enter' && (ev.preventDefault(), addBanco()) }),
      e('button', { type: 'button', className: 'btn btn-sm btn-primary', onClick: addBanco }, '+ Agregar')
    )
  );
}

// Celda "Tasa" para las tablas de Compras/Terceros: muestra la tasa efectiva de interés intl de la
// compra. Congelada (tasa_intl) → texto normal; fallback a la tasa global viva → itálica/gris (señal
// de "actualízala desde el extracto"). En blanco si la compra no es internacional.
function tasaIntlTd(c, tarjeta) {
  // Celda vacía → guion gris, igual que la columna "Valor USD" (consistencia visual).
  const dash = e('td', { className: 'text-right text-mono', style: { fontSize: 12 } }, e('span', { style: { color: 'var(--text-muted)' } }, '—'));
  const esIntl = !!(c.es_internacional || (c.valor_usd && c.valor_usd > 0));
  if (!esIntl) return dash;
  const frozen = (c.tasa_intl != null);
  const tasa = frozen ? c.tasa_intl : (tarjeta && tarjeta.tasa_mv_avances ? tarjeta.tasa_mv_avances : 0);
  if (!tasa) return dash;
  return e('td', {
    className: 'text-right text-mono',
    style: Object.assign({ fontSize: 12 }, frozen ? {} : { fontStyle: 'italic', color: 'var(--text-muted)' }),
    title: frozen ? 'Tasa congelada de esta compra (la del extracto)' : 'Usando la tasa ACTUAL de la tarjeta (no congelada). Edita la compra y fija la del extracto.'
  }, (Number(tasa) * 100).toFixed(4) + '%');
}

// Color del estado real de una compra (para bordes/acentos). Mismas correspondencias que .badge-*.
function estadoColor(estado) {
  return estado === 'bolsillo' ? 'var(--success)'
    : estado === 'bolsillo_parcial' ? 'var(--purple)'
    : estado === 'pagado' ? 'var(--success)'
    : estado === 'pendiente' ? 'var(--warning)'
    : estado === 'vencido' ? 'var(--danger)'
    : 'var(--border)';
}

// ── Render del resultado de conciliación + aplicar acciones con 1 clic (Fase 4) ──
function IaResultado({ resultado, isMock, tarjetaId, ciclo, onAplicada, onReanalizar, reanalizando }) {
  const c = (resultado && resultado.conciliacion_pago_minimo) || {};
  const disc = Array.isArray(resultado && resultado.discrepancias) ? resultado.discrepancias : [];
  const pagos = Array.isArray(resultado && resultado.pagos_detectados) ? resultado.pagos_detectados : [];
  const sevColor = (s) => s === 'alta' ? '#f87171' : (s === 'media' ? 'var(--warning)' : 'var(--text-muted)');
  const [accionSel, setAccionSel] = useState(null);   // { d, idx }
  const [aplicando, setAplicando] = useState(false);
  const [aplicadas, setAplicadas] = useState({});
  const [errAplicar, setErrAplicar] = useState('');
  const [contextoUser, setContextoUser] = useState('');
  // Compras de la tarjeta: se cargan para detectar si una discrepancia apunta a una compra DIVIDIDA
  // (grupo). Una acción por compra_id no puede operar sobre un grupo (causaba PUT /api/compras/null).
  const [comprasTj, setComprasTj] = useState([]);
  useEffect(() => {
    if (!tarjetaId) { setComprasTj([]); return; }
    api('/compras?tarjeta_id=' + Number(tarjetaId)).then(l => setComprasTj(Array.isArray(l) ? l : [])).catch(() => setComprasTj([]));
  }, [tarjetaId]);
  // Operaciones que la app puede aplicar automaticamente (mapean a endpoints existentes).
  const AUTO = { crear_compra: 1, editar_valor: 1, mover_ciclo: 1, reprogramar_cuotas: 1, convertir_a_diferida: 1, crear_diferida_omitida: 1, actualizar_tasa_intl: 1, actualizar_fecha_pago: 1, reversar_compra: 1, registrar_pago: 1 };

  // Formatea una tasa mensual decimal a porcentaje colombiano (0.020849 -> "2,0849%").
  const fmtPct = (x) => (x == null || x === '') ? '—' : (Number(x) * 100).toFixed(4).replace('.', ',') + '%';
  // Título legible del tipo de discrepancia (no mostrar el slug crudo del JSON). Mapa para los
  // tipos conocidos (con tildes/palabras de enlace) + fallback genérico: "_" → espacio y mayúscula inicial.
  const fmtTipoDiscrepancia = (tipo) => {
    if (!tipo) return 'Discrepancia';
    const map = {
      compra_omitida: 'Compra omitida', monto_erroneo: 'Monto erróneo',
      clasificacion_incorrecta: 'Clasificación incorrecta', cuota_reprogramada: 'Cuota reprogramada',
      tasa_intl_incorrecta: 'Tasa internacional incorrecta', fecha_pago_movida: 'Fecha de pago movida',
      reverso_detectado: 'Reverso detectado', mover_ciclo: 'Mover de ciclo', diferida_omitida: 'Diferida omitida',
      pago_omitido: 'Pago no registrado', otro: 'Otra discrepancia'
    };
    if (map[tipo]) return map[tipo];
    const s = String(tipo).replace(/_/g, ' ').trim();
    return s.charAt(0).toUpperCase() + s.slice(1);
  };
  // Título legible de la operación de la acción sugerida (mismo criterio que los tipos).
  const fmtOperacion = (op) => {
    if (!op) return '';
    const map = {
      crear_compra: 'Crear compra', editar_valor: 'Editar valor', mover_ciclo: 'Mover de ciclo',
      reprogramar_cuotas: 'Reprogramar cuotas', actualizar_tasa_intl: 'Actualizar tasa internacional',
      actualizar_fecha_pago: 'Actualizar fecha de pago', fecha_corte_movida: 'Aplicar corte adelantado',
      convertir_a_diferida: 'Convertir a diferida', crear_diferida_omitida: 'Crear diferida omitida', reversar_compra: 'Reversar compra',
      registrar_pago: 'Registrar pago', ninguna: 'Sin acción'
    };
    if (map[op]) return map[op];
    const s = String(op).replace(/_/g, ' ').trim();
    return s.charAt(0).toUpperCase() + s.slice(1);
  };
  function paramsDe(d) { return (d.accion_sugerida && d.accion_sugerida.parametros) || {}; }
  // ¿La discrepancia apunta a una compra DIVIDIDA (grupo)? Las acciones por compra_id (editar_valor,
  // mover_ciclo, reprogramar, convertir) no pueden operar sobre un grupo: cada parte es una compra
  // distinta y no hay un id único (la IA a veces devuelve compra_id null → PUT /api/compras/null).
  // Detección: (a) la compra objetivo tiene grupo_id, o (b) su descripción cruza con compras agrupadas.
  function afectaGrupo(d) {
    // Las acciones que CREAN un recurso nuevo (no operan sobre una compra existente por id) nunca
    // afectan un grupo: crear_diferida_omitida (diferida standalone) y crear_compra (compra nueva). Sin
    // este corte, la rama por descripción bloquearía de más si el nombre coincide con un grupo de otro ciclo.
    const opAG = d.accion_sugerida ? d.accion_sugerida.operacion : '';
    if (opAG === 'crear_diferida_omitida' || opAG === 'crear_compra' || opAG === 'registrar_pago') return false;
    const p = paramsDe(d);
    const cid = p.compra_id != null ? p.compra_id : d.compra_id;
    if (cid != null && String(cid) !== 'null') {
      const t = comprasTj.find(x => String(x.id) === String(cid));
      if (t && t.grupo_id) return true;
    }
    const desc = String((p.descripcion != null ? p.descripcion : d.descripcion) || '').toLowerCase().trim();
    if (desc.length >= 3 && comprasTj.some(x => x.grupo_id && String(x.descripcion || '').toLowerCase().trim() === desc)) return true;
    return false;
  }
  function resumenAccion(d) {
    const op = d.accion_sugerida ? d.accion_sugerida.operacion : 'ninguna';
    const p = paramsDe(d);
    const cid = p.compra_id != null ? p.compra_id : d.compra_id;
    if (op === 'crear_compra') return { titulo: 'Crear compra nueva', endpoint: 'POST /api/compras', filas: [['Descripcion', p.descripcion || d.descripcion || ''], ['Valor', fmtCOP(p.valor_cop != null ? p.valor_cop : d.valor_extracto)], ['Ciclo', ciclo], ['Fecha', p.fecha || (ciclo + '-15')]] };
    if (op === 'editar_valor') return { titulo: 'Editar valor de la compra', endpoint: 'PUT /api/compras/' + cid, filas: [['Compra', '#' + cid], ['Valor actual (app)', fmtCOP(d.valor_app)], ['Nuevo valor (extracto)', fmtCOP(p.valor_cop != null ? p.valor_cop : d.valor_extracto)]] };
    if (op === 'mover_ciclo') return { titulo: 'Reasignar al ciclo (manual)', endpoint: 'PUT /api/compras/' + cid, filas: [['Compra', '#' + cid], ['Nuevo ciclo', p.ciclo || ciclo], ['Conserva su fecha real', 'si']] };
    if (op === 'reprogramar_cuotas') {
      const esDividir = Array.isArray(p.cuotas) && p.cuotas.length > 0;
      if (esDividir) return { titulo: 'Reprogramar dividiendo en cuotas', endpoint: 'POST /api/compras/' + cid + '/dividir-cuotas', filas: [['Compra', '#' + cid], ['Cuotas (irregulares)', String(p.cuotas.length)], ['Detalle', p.cuotas.map(q => q.ciclo + ': ' + fmtCOP(q.monto)).join('   |   ')]] };
      return { titulo: 'Reprogramar número de cuotas', endpoint: 'POST /api/diferidas/(de #' + cid + ')/reprogramar', filas: [['Compra', '#' + cid], ['Nuevo total de cuotas', String(p.num_cuotas || '')], ['Regenera la proyección', 'si']] };
    }
    if (op === 'convertir_a_diferida') return { titulo: 'Convertir compra de contado a cuotas (diferida)', endpoint: 'POST /api/compras/' + cid + '/convertir-a-diferida', filas: [['Compra', '#' + cid], ['Pasa de', '1 cuota (contado)'], ['Nuevo total de cuotas', String(p.num_cuotas || '')], ['Cobra intereses', (p.cobrar_intereses === false ? 'no' : 'si')], ['Conserva su fecha real', 'si']] };
    if (op === 'actualizar_tasa_intl') {
      const grupos = Array.isArray(p.grupos) ? p.grupos : (p.tasa_intl != null ? [{ tasa_intl: p.tasa_intl, compra_ids: p.compra_ids || [] }] : []);
      const nTotal = grupos.reduce((s, g) => s + ((g.compra_ids || []).length), 0);
      const filas = [['Tasas a aplicar (una por mes)', String(grupos.length)], ['Compras a actualizar', String(nTotal)], ['Ciclo', ciclo]];
      grupos.forEach((g, i) => filas.push(['Tasa ' + (i + 1), fmtPct(g.tasa_intl) + ' · ' + ((g.compra_ids || []).length) + ' compra(s)']));
      return { titulo: 'Sincronizar tasa internacional con el extracto', endpoint: 'POST /api/compras/aplicar-tasa-intl', filas };
    }
    if (op === 'actualizar_fecha_pago') {
      const fp = p.fecha_pago != null ? p.fecha_pago : d.fecha_extracto;
      return { titulo: 'Ajustar la fecha de pago de este ciclo', endpoint: 'PUT /api/extractos/fecha-pago-custom',
        filas: [['Fecha en la app', fmtDate(d.fecha_app)], ['Fecha del extracto', fmtDate(fp)], ['Ciclo', ciclo], ['Alcance', 'solo cambia lo que ves; no afecta intereses ni pago minimo']] };
    }
    if (op === 'fecha_corte_movida') {
      const fc = p.fecha_corte != null ? p.fecha_corte : d.fecha_extracto;
      return { titulo: 'Fijar el corte adelantado de este ciclo', endpoint: 'POST /api/compras/aplicar-corte-ciclo',
        filas: [['Corte que calculo la app', fmtDate(d.fecha_app)], ['Corte real del extracto', fmtDate(fc)], ['Ciclo', p.ciclo || ciclo], ['Efecto', 'las compras posteriores al corte pasan al ciclo siguiente (ahora y a futuro)']] };
    }
    if (op === 'reversar_compra') {
      const rv = d.reverso || {};
      const filas = [['Compra', '#' + cid + '  ' + (rv.compra_descripcion || '')],
        ['Movimiento del extracto', (rv.concepto_extracto || '') + '  ' + fmtCOP(rv.monto != null ? rv.monto : Math.abs(Number(d.valor_extracto) || 0))],
        ['Efecto', 'la compra deja de contar como deuda (su valor histórico se conserva)']];
      if (rv.es_tercero) filas.push(['Saldo a favor', 'se crea ' + fmtCOP(rv.reembolso) + ' a favor del tercero (ya te había reembolsado)']);
      return { titulo: 'Reversar compra (devolución del banco)', endpoint: 'POST /api/compras/' + cid + '/reversar', filas };
    }
    if (op === 'crear_diferida_omitida') {
      const M = Number(p.num_cuotas) || 0, N = Number(p.cuota_actual) || 1, cap = Number(p.capital) || 0;
      const total = Math.round(cap * M);
      // Ciclo de origen = ciclo conciliado - (N-1) meses (solo para el preview; el backend re-deriva).
      let co = ciclo;
      try { const pr = String(ciclo).split('-'); let y = Number(pr[0]), mm = Number(pr[1]) - (N - 1); while (mm < 1) { mm += 12; y -= 1; } co = y + '-' + String(mm).padStart(2, '0'); } catch (e) {}
      return { titulo: 'Crear diferida omitida (compra a cuotas que la app no tiene)', endpoint: 'POST /api/diferidas/crear-omitida', filas: [
        ['Descripcion', p.descripcion || d.descripcion || ''],
        ['Capital por cuota (extracto)', fmtCOP(cap)],
        ['Numero de cuotas', String(M)],
        ['Valor total (capital x cuotas)', fmtCOP(total)],
        ['Ciclo de origen (calculado)', co],
        ['Cobra intereses', (p.cobrar_intereses === false ? 'no' : 'si')]
      ] };
    }
    if (op === 'registrar_pago') {
      const pg = d.pago || {};
      const mo = p.monto != null ? p.monto : pg.monto;
      return { titulo: 'Registrar el pago del extracto anterior', endpoint: 'POST /api/extractos/registrar-pago', filas: [
        ['Ciclo que se salda', p.ciclo || pg.ciclo || ''],
        ['Monto del pago', fmtCOP(mo)],
        ['Tipo', pg.tipo_pago === 'total' ? 'Pago total' : 'Pago minimo'],
        ['Fecha', p.fecha || pg.fecha || 'hoy'],
        ['Efecto', 'marca ese extracto como pagado y lo asienta en el historial de Pagos']
      ] };
    }
    return { titulo: op, endpoint: '', filas: [] };
  }

  async function ejecutarAccion() {
    if (!accionSel) return;
    const d = accionSel.d, idx = accionSel.idx;
    const op = d.accion_sugerida ? d.accion_sugerida.operacion : '';
    const p = paramsDe(d);
    // Modo Demo: el análisis es un EJEMPLO fabricado (mock, sin API key). NUNCA escribir en la BD real
    // aunque el usuario confirme (evita sembrar datos de ejemplo como "SUSCRIPCION DEMO" en su tarjeta).
    if (isMock) { toast('Modo Demo: este es un resultado de ejemplo; las acciones no se aplican.'); setAccionSel(null); return; }
    setAplicando(true); setErrAplicar('');
    try {
      if (!tarjetaId) throw new Error('No hay tarjeta seleccionada.');
      if (op === 'crear_compra') {
        // desde_conciliacion: exime del candado de "ciclo cerrado" del POST (la IA registra compras
        // que el extracto YA facturado trae y la app no tiene); el de ciclos PAGADOS sigue aplicando.
        const body = { tarjeta_id: Number(tarjetaId), ciclo: ciclo, ciclo_manual: 1, fecha: p.fecha || (ciclo + '-15'), descripcion: p.descripcion || d.descripcion || 'Compra (conciliacion)', valor_cop: Number(p.valor_cop != null ? p.valor_cop : d.valor_extracto) || 0, es_internacional: p.es_internacional ? 1 : 0, desde_conciliacion: true };
        const r = await api('/compras', { method: 'POST', body });
        if (r && r.error) throw new Error(r.error);
      } else if (op === 'editar_valor' || op === 'mover_ciclo') {
        const cid = p.compra_id != null ? p.compra_id : d.compra_id;
        if (!cid) throw new Error('No se identifico la compra a modificar.');
        // Traer la compra actual completa: el PUT reemplaza TODOS los campos, asi que mergeamos.
        const lista = await api('/compras?tarjeta_id=' + Number(tarjetaId));
        const a = Array.isArray(lista) ? lista.find(x => String(x.id) === String(cid)) : null;
        if (!a) throw new Error('No se encontro la compra #' + cid + ' en la tarjeta.');
        // desde_conciliacion: exime del candado de "ciclo cerrado" del PUT (la IA corrige valores y
        // ciclos de extractos YA facturados); el candado de ciclos PAGADOS sigue aplicando.
        const body = { tarjeta_id: a.tarjeta_id, fecha: a.fecha, descripcion: a.descripcion, valor_cop: a.valor_cop, valor_usd: a.valor_usd, tasa_usd: a.tasa_usd, persona_id: a.persona_id, estado: a.estado, notas: a.notas, monto_bolsillo: a.monto_bolsillo, es_internacional: a.es_internacional, ciclo: a.ciclo, ciclo_manual: a.ciclo_manual, desde_conciliacion: true };
        if (op === 'editar_valor') body.valor_cop = Number(p.valor_cop != null ? p.valor_cop : d.valor_extracto) || a.valor_cop;
        else { body.ciclo = p.ciclo || ciclo; body.ciclo_manual = 1; }
        const r = await api('/compras/' + cid, { method: 'PUT', body });
        if (r && r.error) throw new Error(r.error);
      } else if (op === 'reprogramar_cuotas') {
        const cid = p.compra_id != null ? p.compra_id : d.compra_id;
        if (!cid) throw new Error('No se identifico la compra a reprogramar.');
        if (Array.isArray(p.cuotas) && p.cuotas.length > 0) {
          // Ruta C: cuotas irregulares → dividir en compras de 1 cuota. desde_conciliacion exime
          // del candado de "ciclo cerrado" (reprogramaciones que el banco hizo en extractos pasados).
          const r = await api('/compras/' + cid + '/dividir-cuotas', { method: 'POST', body: { cuotas: p.cuotas, desde_conciliacion: true } });
          if (r && r.error) throw new Error(r.error);
        } else {
          // Ruta A: reprogramacion uniforme → cambiar num_cuotas de la diferida vinculada.
          if (!(Number(p.num_cuotas) > 0)) throw new Error('Falta el nuevo numero de cuotas.');
          const lista = await api('/compras?tarjeta_id=' + Number(tarjetaId));
          const a = Array.isArray(lista) ? lista.find(x => String(x.id) === String(cid)) : null;
          if (!a) throw new Error('No se encontro la compra #' + cid + ' en la tarjeta.');
          if (!a.diferida_id) throw new Error('La compra #' + cid + ' no es una compra a cuotas (diferida).');
          // desde_conciliacion: exime del candado de "ciclo cerrado" (la IA corrige planes que el
          // banco YA reprogramó en extractos pasados); el candado de ciclos PAGADOS sigue aplicando.
          const r = await api('/diferidas/' + a.diferida_id + '/reprogramar', { method: 'POST', body: { num_cuotas: Number(p.num_cuotas), desde_conciliacion: true } });
          if (r && r.error) throw new Error(r.error);
        }
      } else if (op === 'convertir_a_diferida') {
        const cid = p.compra_id != null ? p.compra_id : d.compra_id;
        if (!cid) throw new Error('No se identifico la compra a convertir.');
        if (!(Number(p.num_cuotas) >= 2)) throw new Error('Falta el numero de cuotas (2 o mas).');
        // desde_conciliacion: exime del candado de "ciclo cerrado" (la IA convierte a cuotas una compra
        // que el banco diferio en un extracto YA facturado); el candado de ciclos PAGADOS sigue aplicando.
        const r = await api('/compras/' + cid + '/convertir-a-diferida', { method: 'POST', body: { num_cuotas: Number(p.num_cuotas), cobrar_intereses: p.cobrar_intereses !== false, desde_conciliacion: true } });
        if (r && r.error) throw new Error(r.error);
      } else if (op === 'actualizar_tasa_intl') {
        const grupos = Array.isArray(p.grupos) ? p.grupos : (p.tasa_intl != null ? [{ tasa_intl: p.tasa_intl, compra_ids: p.compra_ids || [] }] : []);
        const limpios = grupos.filter(g => Number(g.tasa_intl) > 0 && Array.isArray(g.compra_ids) && g.compra_ids.length);
        if (!limpios.length) throw new Error('No hay tasas internacionales validas para aplicar.');
        const r = await api('/compras/aplicar-tasa-intl', { method: 'POST', body: { tarjeta_id: Number(tarjetaId), ciclo: ciclo, grupos: limpios } });
        if (r && r.error) throw new Error(r.error);
      } else if (op === 'actualizar_fecha_pago') {
        const fp = p.fecha_pago != null ? p.fecha_pago : d.fecha_extracto;
        if (!fp) throw new Error('No hay una fecha de pago para aplicar.');
        const r = await api('/extractos/fecha-pago-custom', { method: 'PUT', body: { tarjeta_id: Number(tarjetaId), ciclo: ciclo, fecha_pago: fp } });
        if (r && r.error) throw new Error(r.error);
      } else if (op === 'fecha_corte_movida') {
        // Persiste el corte adelantado (cortes_custom) y reubica las compras de la ventana.
        const fc = p.fecha_corte != null ? p.fecha_corte : d.fecha_extracto;
        if (!fc) throw new Error('No hay una fecha de corte para aplicar.');
        const r = await api('/compras/aplicar-corte-ciclo', { method: 'POST', body: { tarjeta_id: Number(tarjetaId), ciclo: (p.ciclo || ciclo), fecha_corte: fc } });
        if (r && r.error) throw new Error(r.error);
      } else if (op === 'reversar_compra') {
        // Reverso (devolución del banco): neutraliza la compra y, si es de un tercero que ya reembolsó,
        // crea el saldo a favor. El endpoint es idempotente (409 si ya está reversada).
        const cid = p.compra_id != null ? p.compra_id : d.compra_id;
        if (!cid) throw new Error('No se identifico la compra a reversar.');
        const r = await api('/compras/' + cid + '/reversar', { method: 'POST' });
        if (r && r.error) throw new Error(r.error);
      } else if (op === 'crear_diferida_omitida') {
        // Diferida OMITIDA: crea una diferida standalone. El backend deriva total (capital x cuotas),
        // ciclo y fechas de origen; desde_conciliacion por consistencia (no hay candado que eximir).
        const cap = Number(p.capital);
        if (!(Number(p.num_cuotas) >= 2)) throw new Error('Falta el numero de cuotas (2 o mas).');
        if (!(Number(p.cuota_actual) >= 1)) throw new Error('Falta la cuota actual (N de M).');
        if (!(cap > 0)) throw new Error('Falta el capital de la cuota.');

// ── IA Asistente — Conciliación de extractos (config, extracción y análisis) ──
function IaAsistente({ iaConfig, onIaConfigChange, tarjetas, onGoConfig, demoMode, onActivarDemo, onSalirDemo, onRefrescarTarjetas }) {
  const cfg = iaConfig || { provider: null, model: '', hasKey: false };
  const hasKey = !!cfg.hasKey;
  const isMock = !!demoMode && !hasKey;            // Demo solo aplica si no hay key real
  const operativo = hasKey || isMock;
  const MESES_IA = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
  const cicloLabel = (c) => { const a = String(c).split('-'); return (MESES_IA[Number(a[1]) - 1] || a[1]) + ' ' + a[0]; };
  const cicloAnterior = (c) => { const a = String(c).split('-'); let y = Number(a[0]); let m = Number(a[1]) - 1; if (m < 1) { m = 12; y -= 1; } return y + '-' + String(m).padStart(2, '0'); };
  const activas = (tarjetas || []).filter(t => t.estado === 'activa');

  const [tarjetaId, setTarjetaId] = useState('');
  const [ciclo, setCiclo] = useState('');
  const [ciclosTarjeta, setCiclosTarjeta] = useState([]);
  const [loadingCiclos, setLoadingCiclos] = useState(false);
  const [pdfName, setPdfName] = useState('');
  const [pdfFile, setPdfFile] = useState(null);
  const fileRef = useRef(null);
  const fetchSeq = useRef(0);
  const [analizando, setAnalizando] = useState(false);
  const [preview, setPreview] = useState(null);
  const [needPassword, setNeedPassword] = useState(false);
  const [pdfPassword, setPdfPassword] = useState('');
  const [passwordError, setPasswordError] = useState(false);
  const [extraerError, setExtraerError] = useState('');
  const [analizandoIA, setAnalizandoIA] = useState(false);
  const [resultado, setResultado] = useState(null);
  const [errorIA, setErrorIA] = useState('');
  // Modelo seleccionable para este análisis (default = el configurado o el por defecto del proveedor).
  const [modeloSel, setModeloSel] = useState('');
  useEffect(() => { setModeloSel(cfg.model || iaProviderDefaultModel(cfg.provider)); }, [cfg.provider, cfg.model]);

  // Dep estable: solo cambia si cambia el conjunto de tarjetas activas (no en cada
  // render de App, que recrearia el array y dispararia el efecto de mas).
  const activasIds = activas.map(t => t.id).join(',');

  // Auto-selecciona la primera tarjeta activa; respeta una seleccion manual valida.
  useEffect(() => {
    if (activas.length && !activas.some(t => String(t.id) === String(tarjetaId))) {
      setTarjetaId(String(activas[0].id));
    }
  }, [activasIds]);

  // Periodos = historial REAL de la tarjeta seleccionada (sus extractos hasta el ciclo
  // vigente) + el ciclo vigente. Al cambiar de tarjeta se LIMPIA de inmediato y se
  // refetchea solo para ese tarjeta_id. fetchSeq descarta respuestas obsoletas (sin mezclas).
  useEffect(() => {
    const card = (tarjetas || []).find(t => String(t.id) === String(tarjetaId));
    if (!card) { setCiclosTarjeta([]); setCiclo(''); setLoadingCiclos(false); return; }
    // Vigente consciente del corte (del backend): si el banco ya cortó, avanza al mes siguiente y
    // el mes que cerró pasa a ser un "cerrado" más en la lista (sin rótulo de "en curso").
    const vig = card.ciclo_vigente || cicloVigente(card.dia_corte);
    const seq = ++fetchSeq.current;
    setLoadingCiclos(true);
    setCiclosTarjeta([]);   // limpia ya: nunca quedan visibles los de otra tarjeta
    setCiclo('');
    // Ciclos cerrados (r.ciclo < vig) + SIEMPRE el ciclo vigente (en curso) como primera opción:
    // el banco puede ADELANTAR el corte (fin de semana/festivo) y emitir el extracto antes de la
    // fecha teórica, así que el usuario debe poder conciliar el mes en curso aunque "matemáticamente"
    // no haya cerrado. El default sigue siendo el último cerrado (caso normal); el vigente queda
    // disponible y rotulado aparte. La conciliación confía en las fechas REALES del PDF.
    api('/extractos?tarjeta_id=' + card.id).then(rows => {
      if (seq !== fetchSeq.current) return;   // respuesta de una tarjeta anterior → descartar
      const set = {};
      (Array.isArray(rows) ? rows : []).forEach(r => { if (r && r.ciclo && r.ciclo < vig) set[r.ciclo] = 1; });
      const cerrados = Object.keys(set).sort().reverse();
      const ciclos = [vig, ...cerrados];
      setCiclosTarjeta(ciclos);
      setCiclo(cerrados[0] || vig);   // default: último cerrado; si no hay ninguno, el vigente
      setLoadingCiclos(false);
    }).catch(() => {
      if (seq !== fetchSeq.current) return;
      const prev = cicloAnterior(vig);   // fallback offline: ultimo cerrado por calendario
      setCiclosTarjeta([vig, prev]); setCiclo(prev); setLoadingCiclos(false);
    });
  }, [tarjetaId]);

  // Al cambiar tarjeta / periodo / archivo, descarta cualquier vista previa o estado de contraseña previos.
  useEffect(() => { setPreview(null); setNeedPassword(false); setPasswordError(false); setExtraerError(''); setPdfPassword(''); setResultado(null); setErrorIA(''); }, [tarjetaId, ciclo, pdfName]);

  function openLink(url) { if (window.electronAPI && window.electronAPI.openExternal) window.electronAPI.openExternal(url); }
  function onPickFile(ev) { const f = ev.target.files && ev.target.files[0]; setPdfFile(f || null); setPdfName(f ? f.name : ''); }
  function quitarPdf() { setPdfFile(null); setPdfName(''); if (fileRef.current) fileRef.current.value = ''; }
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {

    api('/terceros?tarjeta_id=' + tarjeta.id).then(setCompras);
    api('/saldos-favor').then(setSaldosFavor).catch(() => {});
  }, [tarjeta.id]);
